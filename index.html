}
/* ==== データ追加ページ（メニューから） ==== */
function renderData(){
  refClose();   /* 【P24】単語一覧を離れたら最下部の帯を戻す */
  session = null;
  const posOptions = ["自動","他動","名","形","副","句動","熟"];
  app.innerHTML = `
  <header><div><h1>単語を追加</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>
  <div class="panel"><div class="inner">
    <p class="note">入力欄に単語を1つずつ入れて追加できます。ログイン中なら、承認を経て全員に共有できます。</p>
    <div class="setting-row"><span>英単語</span>
      <input type="text" id="fwWord" placeholder="例：achieve" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
    <div class="setting-row"><span>品詞</span>
      <select id="fwPos">${posOptions.map(p=>`<option value="${p}">${p}</option>`).join("")}</select></div>
    <div class="setting-row"><span>難易度（1やさしい〜5むずかしい）</span>
      <select id="fwLevel">${[1,2,3,4,5].map(n=>`<option value="${n}" ${n===3?"selected":""}>${n}</option>`).join("")}</select></div>
    <div style="margin:4px 0 6px"><span class="note">意味（訳）</span>
      <div id="fwMeanings">
        <div class="fw-mrow" style="display:flex;gap:6px;margin-bottom:6px">
          <input type="text" class="fw-mean" placeholder="例：〜を達成する" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="flex:1 1 auto;min-width:0">
        </div>
      </div>
      <button class="btn-sub" id="fwAddMean" style="margin-top:0">＋意味を追加</button></div>
    <div style="margin:8px 0 6px"><span class="note">語源・コアイメージ（任意）</span>
      <textarea id="fwCore" placeholder="例：ad-(〜へ)+... ※任意" style="width:100%;min-height:52px;box-sizing:border-box;font-size:16px;padding:6px 8px;border:1px solid var(--line);border-radius:6px"></textarea></div>
    <div id="fwPreview" style="margin:10px 0"></div>
    <button class="btn-primary" id="fwSubmit">この内容で送信</button>
    <span class="msg" id="fwMsg"></span>
  </div></div>

  <div class="panel" id="mySubsPanel" style="display:none"><div class="inner">
    <h2 style="margin-top:0">あなたが追加した単語の審査状況</h2>
    <div id="mySubsBody"><p class="note">読み込み中…</p></div>
  </div></div>

  <details class="panel">
    <summary>上級者向け：JSONで一括追加・バックアップ</summary>
    <div class="inner">
    <p class="note">以下の形式の JSON 配列を貼り付けると語彙を拡張できます（<code>i</code> は省略可・自動採番、<code>c</code> はコアイメージで省略可）。区分ラベルは <code>自動／他動／名／形／副／句動／熟</code>。訳は文字列、または熟語パターン付きなら <code>[["run out of A","Aを切らす"], "訳"]</code> 形式の配列（パターンは原形で記述）。</p>
    <textarea id="importBox" placeholder='[{"w":"...","l":3,"e":[["他動","..."]]}]'></textarea>
    <button class="btn-sub" id="importBtn">単語を追加</button>
    <button class="btn-sub" id="exportBtn">バックアップを書き出す</button>
    <button class="btn-sub" id="restoreBtn">バックアップから復元</button>
    <span class="msg" id="dataMsg"></span>
    </div>
  </details>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  /* ==== 初心者向けフォーム（P32-A）==== */
  bindWordForm();
  /* ==== 自分の投稿の審査状況（P32-C）==== */
  loadMySubmissions();
  markMySubmissionsRead();   /* 開いた瞬間に全件既読（お問い合わせと同じ「開いたら消える」） */
  document.getElementById("importBtn").onclick = async ()=>{
    const box = document.getElementById("importBox"), msg = document.getElementById("dataMsg");
    try{
      const arr = JSON.parse(box.value);
      if(!Array.isArray(arr)) throw new Error("配列ではありません");
      let nextId = nextCustomId();   /* 【第4バッチ】allWords() ではなくカスタム専用レンジから採番する */
      let added = 0;
      const toSubmit = [];
      const existing = new Set(allWords().map(w=>w.w.toLowerCase()));
      for(const o of arr){
        if(typeof o.w!=="string" || !Array.isArray(o.e)) throw new Error("形式エラー: "+JSON.stringify(o).slice(0,40));
        if(existing.has(o.w.toLowerCase())) continue;
        const entry = { i:nextId++, w:o.w, l:Math.max(1,Math.min(5,o.l||3)), e:o.e };
        if(o.c) entry.c = o.c;
        state.custom.push(entry);
        toSubmit.push({ word:o.w, level:entry.l, core:(o.c||null), entries:o.e });
        existing.add(o.w.toLowerCase()); added++;
      }
      await saveState();
      let extra = "";
      if(sb && currentUser && toSubmit.length){
        try{
          const rows = toSubmit.map(s => Object.assign({}, s, { submitted_by: currentUser.id, submitter_email: currentUser.email || null, submitter_nickname: (state.settings.nickname||null) }));
          const { error } = await sb.from("word_submissions").insert(rows);
          extra = error ? "（共有申請の送信に失敗しました）" : "。承認され次第、全員に反映されます";
        }catch(_){ extra = "（共有申請の送信に失敗しました）"; }
      } else if(added){
        extra = "（ログインすると、全員への共有を申請できます）";
      }
      msg.className="msg"; msg.textContent = `${added} 語を追加しました（重複は除外）${extra}`;
    }catch(e){ msg.className="msg err"; msg.textContent = "読み込み失敗: "+e.message; }
  };
  document.getElementById("exportBtn").onclick = ()=>{
    document.getElementById("importBox").value = JSON.stringify({state});
    const msg=document.getElementById("dataMsg"); msg.className="msg";
    msg.textContent = "上の欄の内容をコピーして保管してください";
  };
  document.getElementById("restoreBtn").onclick = async ()=>{
    const msg=document.getElementById("dataMsg");
    try{
      const o = JSON.parse(document.getElementById("importBox").value);
      if(!o.state || typeof o.state.words!=="object") throw new Error("バックアップ形式ではありません");
      state = o.state;
      if(!Array.isArray(state.custom)) state.custom = [];
      state.settings = Object.assign({newPerDay:30,rate:0.95,difficulty:1,posChunk:30,blankCount:"auto"}, state.settings||{});
      if(state.settings.dailyNew == null) state.settings.dailyNew = state.settings.newPerDay;  /* 【P33是正B】バックアップ復元でも newPerDay を dailyNew の既定に */
      if(typeof state.settings.difficulty === "string"){
        state.settings.difficulty = ({easy:1,mid:2,hard:3})[state.settings.difficulty] || 1;
      }
      delete state.settings.modes;
      migrateCustomIds();   /* 【第4バッチ】復元はリロードを伴わないため、ここでも旧IDを移行しておく */
      await saveState();
      msg.className="msg"; msg.textContent="復元しました";
      setTimeout(renderHome, 600);
    }catch(e){ msg.className="msg err"; msg.textContent="復元失敗: "+e.message; }
  };
}

/* ==== 初心者向け単語追加フォーム（P32-A）==== */
/* 入力欄から意味（訳）の文字列配列を集める（trim・空除外） */
function fwCollectMeanings(){
  return Array.from(document.querySelectorAll("#fwMeanings .fw-mean"))
    .map(el=>el.value.trim()).filter(Boolean);
}
/* プレビューを組み上げて表示（見出し語＋品詞＋訳一覧＋あれば語源） */
function fwRenderPreview(){
  const box = document.getElementById("fwPreview");
  if(!box) return;
  const w = (document.getElementById("fwWord").value||"").trim();
  const pos = document.getElementById("fwPos").value;
  const means = fwCollectMeanings();
  const core = (document.getElementById("fwCore").value||"").trim();
  if(!w && means.length===0){ box.innerHTML = ""; return; }
  box.innerHTML = `<div class="ref-item" style="margin:0">
    <div class="ref-head"><span class="ref-word">${esc(w||"（英単語）")}</span></div>
    ${core ? `<div class="ref-core">${esc(core)}</div>` : ""}
    <div class="ref-ent"><span class="pos-badge">${esc(pos)}</span><span class="meaning">${means.length?esc(means.join("／")):"（意味）"}</span></div>
  </div>`;
}
/* フォームを初期化（次の1語を入れやすく） */
function fwResetForm(){
  document.getElementById("fwWord").value = "";
  document.getElementById("fwPos").selectedIndex = 0;
  document.getElementById("fwLevel").value = "3";
  document.getElementById("fwCore").value = "";
  const wrap = document.getElementById("fwMeanings");
  wrap.innerHTML = `<div class="fw-mrow" style="display:flex;gap:6px;margin-bottom:6px">
    <input type="text" class="fw-mean" placeholder="例：〜を達成する" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="flex:1 1 auto;min-width:0"></div>`;
  wrap.querySelectorAll(".fw-mean").forEach(el=>el.oninput = fwRenderPreview);
  fwRenderPreview();
}
function bindWordForm(){
  const wordEl = document.getElementById("fwWord");
  if(!wordEl) return;   // renderData 以外では何もしない
  wordEl.oninput = fwRenderPreview;
  document.getElementById("fwPos").onchange = fwRenderPreview;
  document.getElementById("fwCore").oninput = fwRenderPreview;
  document.querySelectorAll("#fwMeanings .fw-mean").forEach(el=>el.oninput = fwRenderPreview);
  /* ＋意味を追加 */
  document.getElementById("fwAddMean").onclick = ()=>{
    const wrap = document.getElementById("fwMeanings");
    const row = document.createElement("div");
    row.className = "fw-mrow";
    row.style = "display:flex;gap:6px;margin-bottom:6px";
    row.innerHTML = `<input type="text" class="fw-mean" placeholder="例：〜を成し遂げる" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="flex:1 1 auto;min-width:0">
      <button class="btn-sub fw-mdel" style="margin:0;flex:0 0 auto">×</button>`;
    wrap.appendChild(row);
    row.querySelector(".fw-mean").oninput = fwRenderPreview;
    row.querySelector(".fw-mdel").onclick = ()=>{ row.remove(); fwRenderPreview(); };
    row.querySelector(".fw-mean").focus();
  };
  /* 送信 */
  document.getElementById("fwSubmit").onclick = async ()=>{
    const msg = document.getElementById("fwMsg");
    const w = (document.getElementById("fwWord").value||"").trim();
    const pos = document.getElementById("fwPos").value;
    const level = Math.max(1, Math.min(5, parseInt(document.getElementById("fwLevel").value)||3));
    const core = (document.getElementById("fwCore").value||"").trim();
    const means = fwCollectMeanings();
    /* 必須検証（送信前に止める） */
    if(!w){ msg.className="msg err"; msg.textContent="英単語を入力してください"; return; }
    if(means.length===0){ msg.className="msg err"; msg.textContent="意味を1つ以上入力してください"; return; }
    if(new Set(allWords().map(x=>x.w.toLowerCase())).has(w.toLowerCase())){
      msg.className="msg err"; msg.textContent="その単語はすでに登録されています"; return;
    }
    /* 組み上げ：entries = [[品詞, [訳1,訳2,...]]]（1品詞） */
    const entries = [[pos, means]];
    const entry = { i:nextCustomId(), w:w, l:level, e:entries };   /* 【第4バッチ】カスタム専用レンジから採番 */
    if(core) entry.c = core;
    state.custom.push(entry);
    await saveState();
    /* ログイン中なら word_submissions に insert（既存スキーマに厳密に合わせる） */
    if(sb && currentUser){
      try{
        const row = { word:w, level:level, core:(core||null), entries:entries,
          submitted_by: currentUser.id, submitter_email: currentUser.email||null,
          submitter_nickname: (state.settings.nickname||null) };
        const { error } = await sb.from("word_submissions").insert([row]);
        if(error){ msg.className="msg err"; msg.textContent="共有申請の送信に失敗しました"; }
        else{ msg.className="msg"; msg.textContent="送信しました。承認され次第、全員に反映されます"; }
      }catch(_){ msg.className="msg err"; msg.textContent="共有申請の送信に失敗しました"; }
    }else{
      msg.className="msg"; msg.textContent="この単語はあなたの端末に追加しました（ログインすると全員への共有を申請できます）";
    }
    fwResetForm();
  };
  fwRenderPreview();
}

/* ==== 自分の投稿の審査状況（P32-C）==== */
/* status → 表示ラベルとクラス */
function subStatusBadge(status){
  if(status === "approved") return `<span class="sub-badge sub-ok">承認済み</span>`;
  if(status === "rejected") return `<span class="sub-badge sub-ng">却下</span>`;
  return `<span class="sub-badge sub-wait">審査待ち</span>`;   /* pending もしくは未知 */
}
async function loadMySubmissions(){
  const panel = document.getElementById("mySubsPanel");
  const body = document.getElementById("mySubsBody");
  if(!panel || !body) return;
  /* 未ログインなら節を出さない（案内は初心者フォーム側の説明で足りるため非表示） */
  if(!(sb && currentUser)){ panel.style.display = "none"; return; }
  panel.style.display = "";
  try{
    const { data, error } = await sb.from("word_submissions")
      .select("id, word, status, created_at, reviewed_at")
      .eq("submitted_by", currentUser.id)
      .order("created_at", { ascending:false });
    if(error) throw error;
    const rows = data || [];
    if(!rows.length){ body.innerHTML = `<p class="note">まだ投稿はありません。上の欄から単語を追加すると、ここに審査の状況が表示されます。</p>`; return; }
    body.innerHTML = rows.map(r=>`
      <div class="sub-row">
        <span class="sub-word">${esc(r.word||"")}</span>
        ${subStatusBadge(r.status)}
      </div>`).join("");
  }catch(_){
    body.innerHTML = `<p class="note">審査状況を読み込めませんでした。時間をおいて開き直してください。</p>`;
  }
}


/* ==== 学習カレンダー（P34：ログインスタンプ＋連続日数）==== */
let calViewYM = null;   // 表示中の月 "YYYY-MM"（null＝今月）
function renderCalendar(){
  refClose();
  session = null;
  const now = new Date();
  if(!calViewYM) calViewYM = todayStr(now).slice(0,7);   // 初回は今月
  const [vy, vm] = calViewYM.split("-").map(n=>parseInt(n));   // vm: 1〜12
  const first = new Date(vy, vm-1, 1);
  const startDow = first.getDay();                 // 0=日 … 6=土（日曜始まり）
  const daysInMonth = new Date(vy, vm, 0).getDate();
  const stamps = state.log || {};   /* 【修正】学習カレンダーはホームと同じ state.log（学習した日）を基準にする */
  const todayS = todayStr(now);
  const pad2 = n => String(n).padStart(2,"0");
  const cur = streak();   /* 【修正】ホーム画面と同じ streak() を使い、連続日数を一致させる */
  const longest = stampStreakLongest();
  const dow = ["日","月","火","水","木","金","土"];
  /* セル配列を組む（先頭の空白＋各日） */
  let cells = "";
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${vy}-${pad2(vm)}-${pad2(d)}`;
    const isStamp = !!stamps[key];
    const isToday = (key === todayS);
    const cls = "cal-cell" + (isStamp ? " cal-stamp" : "") + (isToday ? " cal-today" : "");
    cells += `<div class="${cls}">${d}</div>`;
  }
  const monthLabel = `${vy}年${vm}月`;
  app.innerHTML = `
  <header><div><h1>学習カレンダー</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>
  <div class="panel"><div class="inner">
    <div class="cal-streaks">
      <div class="cal-streak-box"><div class="num">${cur}</div><div class="lbl">現在の連続</div></div>
      <div class="cal-streak-box"><div class="num">${longest}</div><div class="lbl">最長の連続</div></div>
    </div>
    <div class="cal-nav">
      <button class="btn-sub" id="calPrev" style="margin:0">◀ 前の月</button>
      <span class="cal-month">${monthLabel}</span>
      <button class="btn-sub" id="calNext" style="margin:0">次の月 ▶</button>
    </div>
    <div class="cal-grid cal-dow">${dow.map(x=>`<div class="cal-dowcell">${x}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
    <p class="note" style="margin-top:10px">「学習」を始めた日にスタンプが付きます（1問も解かずに始めた日も含みます）。苦手モードと品詞モードだけの日は付きません。連続日数はホーム画面と同じ数え方です。</p>
  </div></div>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); calViewYM=null; renderHome(); };
  document.getElementById("calPrev").onclick = ()=>{ let y=vy, m=vm-1; if(m<1){m=12;y--;} calViewYM=`${y}-${pad2(m)}`; renderCalendar(); };
  document.getElementById("calNext").onclick = ()=>{ let y=vy, m=vm+1; if(m>12){m=1;y++;} calViewYM=`${y}-${pad2(m)}`; renderCalendar(); };
}

/* ==== お知らせ（P43）==== */
/* 日時を「YYYY-MM-DD」で表示（既存の todayStr と同じローカル日付基準） */
function noticeDate(iso){
  try{ return todayStr(new Date(iso)); }catch(_){ return ""; }
}
/* 本文は改行を活かして表示（HTMLはエスケープ） */
function noticeBodyHtml(body){
  return esc(body || "").replace(/\n/g, "<br>");
}
async function renderNotices(){
  refClose();
  session = null;
  app.innerHTML = `
  <header><div><h1>お知らせ</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>
  <div class="panel"><div class="inner" id="noticeBody"><p class="note">読み込み中…</p></div></div>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  const box = document.getElementById("noticeBody");
  if(!sb){ box.innerHTML = `<p class="note">クラウド未接続のため、お知らせを読み込めません。</p>`; return; }
  let rows = [];
  try{ rows = await fetchVisibleNotices(); }
  catch(_){ box.innerHTML = `<p class="note">お知らせを読み込めませんでした。時間をおいて開き直してください。</p>`; return; }
  if(!rows.length){ box.innerHTML = `<p class="note">まだお知らせはありません。</p>`; }
  else{
    const section = (label, list)=>{
      if(!list.length) return "";
      return `<h2 style="margin-top:0">${label}</h2>` + list.map(r=>`
        <div class="notice-item">
          <div class="notice-head"><span class="notice-title">${esc(r.title||"")}</span><span class="notice-date">${noticeDate(r.created_at)}</span></div>
          <div class="notice-body">${noticeBodyHtml(r.body)}</div>
        </div>`).join("");
    };
    const notices = rows.filter(r=> r.kind !== "update");   /* 既定 'notice'。未知値もお知らせ側へ */
    const updates = rows.filter(r=> r.kind === "update");
    let html = section("お知らせ", notices);
    if(updates.length) html += `<div style="margin-top:16px">${section("アップデート情報", updates)}</div>`;
    box.innerHTML = html;
  }
  /* 【P43】一覧を実際に開いたときだけ、その時点で表示された分を既読にする（P37の前例）。 */
  addReadNotices(rows.map(r=>r.id));
  notifNotice = false;
  reflectNotifDots();
}

/* ==== ご要望・お問い合わせ（誰でも送信可・オーナーにのみ届く） ==== */
function renderFeedback(){
  refClose();
  session = null;
  app.innerHTML = `
  <header><div><h1>ご要望・お問い合わせ</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>
  <div class="panel"><div class="inner">
    <p class="note">ご要望・不具合の報告などをお送りください。内容は開発者にのみ届きます。スクリーンショット等の添付も可能です（1ファイル2MBまで）。</p>
    ${currentUser ? "" : `<div class="fb-login-note">
      <div class="t">送信にはログインが必要です</div>

  const fbLoginBtn = document.getElementById("fbLogin");
  if(fbLoginBtn) fbLoginBtn.onclick = ()=>openAuthModal();
  document.getElementById("fbSend").onclick = async ()=>{

        attData = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error("読込失敗")); r.readAsDataURL(f); });
        attName = f.name; attType = f.type || null;
      }catch(_){ msg.className="msg err"; msg.textContent="添付の読み込みに失敗しました"; return; }

/* B消灯：自分宛ての返信/既読をまとめて既読にする。

     SECURITY DEFINER の RPC が唯一の正しい経路。 */
async function markMyFeedbackRead(){

/* 【P32-C】自分の投稿の審査結果を全件既読化（「単語を追加」を開いた瞬間・引数なしRPC）。

async function refreshOwnFeedbackHistory(){
  const box = document.getElementById("fbHistory");
  if(!box) return;
  if(!sb || !currentUser){ box.innerHTML = `<p class="note">ログインすると、過去の送信内容と返信をここで確認できます。</p>`; return; }

  box.innerHTML = `<h2 style="margin-top:0">過去の送信・返信</h2>` + rows.map(r=>{
    const when = String(r.created_at||"").replace("T"," ").slice(0,16);
    /* 【P16】利用者側の履歴表示。従来は r.reply の有無しか見ておらず、
       「既読ボタンだけ押された」状態（reply は空・admin_read_at のみ入る）を表示できなかった。
       その結果、赤ドットは点くのに画面には「まだ返信はありません」としか出ず、
       利用者が何の通知か分からなかった。3条件に分岐させて是正する。
       点灯式 tmax(replied_at, admin_read_at) > user_read_at と、
       消灯（画面を開いた時の rpc mark_my_feedback_read）には一切触れない。 */
    let reply;
    if(r.reply){
      reply = `<div class="inbox-item"><div class="note">開発者からの返信（${String(r.replied_at||"").replace("T"," ").slice(0,16)}）</div><div style="white-space:pre-wrap">${esc(String(r.reply))}</div></div>`;
    }else if(r.admin_read_at){
      reply = `<p class="note">開発者が確認しました（${String(r.admin_read_at).replace("T"," ").slice(0,16)}）。返信をお待ちください。</p>`;
    }else{
      reply = `<p class="note">まだ返信はありません。</p>`;
    }
    return `<div class="inbox-item">
      <div class="note">${when}</div>
      <div style="white-space:pre-wrap">${esc(String(r.message||""))}</div>
      ${reply}
    </div>`;
  }).join("");
}

/* ==== 受信箱（オーナー専用：単語の承認 ＋ ご要望の閲覧） ==== */
async function renderInbox(){
  refClose();
  session = null;
  if(!isOwner()){ renderHome(); return; }
  app.innerHTML = `
  <header><div><h1>受信箱</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>
  <div class="panel"><div class="inner" id="inboxBody"><p class="note">読み込み中…</p></div></div>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  await refreshInbox();
  /* 【WP16】受信箱を開いただけでは既読にしない（＝送信者へ通知を飛ばさない）。
     admin_read_at は「既読にする」ボタンまたは返信の時にのみ書く。
     markInboxSeen() は非破壊のため定義のみ残置し、ここからは呼ばない。
     await markInboxSeen();  ← 廃止 */
  await refreshNotifDots();  /* 開いた時点では点灯状態を再計算するだけ（書き込みなし） */
}
/* A消灯：未読（admin_read_at が null、または created_at より古い）の行だけ admin_read_at を now() にする。
   オーナーの直接UPDATE権は従来どおり有効。既存の is_read 系UPDATEには触れない。 */
async function markInboxSeen(){
  if(!sb || !isOwner()) return;
  try{
    const { data } = await sb.from("feedback").select("id, created_at, admin_read_at");
    const now = new Date().toISOString();
    const unread = (data || []).filter(r=> !r.admin_read_at || r.created_at > r.admin_read_at);
    for(const r of unread){
      await sb.from("feedback").update({ admin_read_at: now }).eq("id", r.id);
    }
    notifInbox = false;
    reflectNotifDots();
  }catch(_){ /* 失敗しても画面は壊さない */ }
}
async function refreshInbox(){
  const body = document.getElementById("inboxBody");
  if(!body) return;
  if(!sb){ body.innerHTML = `<p class="msg err">クラウド未接続</p>`; return; }
  let subs = [], fbs = [];
  try{ const r1 = await sb.from("word_submissions").select("*").eq("status","pending").order("created_at",{ascending:true}); subs = r1.data || []; }catch(_){}
  try{ const r2 = await sb.from("feedback").select("*").order("created_at",{ascending:false}); fbs = r2.data || []; }catch(_){}
  let html = `<h2 style="margin-top:0">単語の承認待ち（${subs.length}）</h2>`;
  if(!subs.length){ html += `<p class="note">承認待ちの単語はありません。</p>`; }
  else{
    for(const s of subs){
      const preview = Array.isArray(s.entries) ? esc(JSON.stringify(s.entries)).slice(0,140) : "";
      const who = s.submitter_nickname ? esc(String(s.submitter_nickname)) : (s.submitter_email?esc(String(s.submitter_email)):"（匿名）");
      html += `<div class="inbox-item">
        <div><b>${esc(String(s.word))}</b>（Lv.${s.level}）${s.core?("　"+esc(String(s.core))):""}</div>
        <div class="note" style="word-break:break-all">${preview}</div>
        <div class="note">${who}</div>
        <div><button class="btn-sub sub-approve" data-id="${s.id}">承認</button>
             <button class="btn-sub sub-reject" data-id="${s.id}">却下</button></div>
      </div>`;
    }
  }
  html += `<h2>ご要望・お問い合わせ（${fbs.length}）</h2>`;
  if(!fbs.length){ html += `<p class="note">お問い合わせはありません。</p>`; }
  else{
    for(const f of fbs){
      const when = String(f.created_at||"").replace("T"," ").slice(0,16);
      const who = f.submitter_nickname ? esc(String(f.submitter_nickname)) : (f.submitter_email?esc(String(f.submitter_email)):"（匿名）");
      /* 添付は「許可した形式に一致したときだけ」hrefに出す（ホワイトリスト方式）。
         利用者が投稿した文字列はREST APIから直接insertできるため、画面側の入力制限は防御にならない。 */
      const attRaw = String(f.attachment_data || "");
      const attOk = /^data:(image\/(png|jpe?g|gif|webp)|application\/pdf);base64,[A-Za-z0-9+\/=]+$/.test(attRaw);
      const attName = esc(String(f.attachment_name || ""));
      const att = !f.attachment_data ? ""
        : (attOk
            ? `<div><a href="${esc(attRaw)}" download="${esc(String(f.attachment_name||"attachment"))}">添付を開く（${attName}）</a></div>`
            : `<div class="note">添付を開けません（形式が不正です）：${attName}</div>`);
      const existingReply = f.reply ? `<div class="note">返信済み（${String(f.replied_at||"").replace("T"," ").slice(0,16)}）：${esc(String(f.reply))}</div>` : "";
      const canReply = !!f.submitted_by; // 匿名投稿には返信を届けられない
      html += `<div class="inbox-item ${f.is_read?"read":""}">
        <div class="note">${when}　${who}${f.is_read?"　[既読]":""}${f.user_read_at?"　[利用者が既読]":""}</div>
        <div style="white-space:pre-wrap">${esc(String(f.message||""))}</div>
        ${att}
        ${existingReply}
        ${canReply ? `<textarea class="fb-reply-box" data-id="${f.id}" placeholder="返信を書く">${f.reply?esc(String(f.reply)):""}</textarea>
        <button class="btn-sub fb-reply-send" data-id="${f.id}">返信を送信</button>` : `<p class="note">匿名送信のため返信は届けられません。</p>`}
        <div>${f.is_read?"":`<button class="btn-sub fb-read" data-id="${f.id}">既読にする</button>`}
             <button class="btn-sub fb-del" data-id="${f.id}">削除</button></div>
      </div>`;
    }
  }
  body.innerHTML = html;
  body.querySelectorAll(".sub-approve").forEach(b=> b.onclick = ()=>approveSubmission(b.dataset.id));
  body.querySelectorAll(".sub-reject").forEach(b=> b.onclick = ()=>rejectSubmission(b.dataset.id));
  body.querySelectorAll(".fb-read").forEach(b=> b.onclick = ()=>markFeedbackRead(b.dataset.id));
  body.querySelectorAll(".fb-del").forEach(b=> b.onclick = ()=>deleteFeedback(b.dataset.id));
  body.querySelectorAll(".fb-reply-send").forEach(b=> b.onclick = ()=>{
    const box = body.querySelector(`.fb-reply-box[data-id="${b.dataset.id}"]`);
    replyToFeedback(b.dataset.id, box ? box.value : "");
  });
}
async function replyToFeedback(id, text){
  if(!sb) return;
  const t = String(text||"").trim();
  if(!t){ alert("返信内容を入力してください"); return; }
  /* 【WP16】返信は「管理者が明示的に処理した」瞬間。ここで admin_read_at も確定させる。
     利用者側の点灯判定 max(replied_at, admin_read_at) > user_read_at は不変。 */
  const now = new Date().toISOString();
  try{ await sb.from("feedback").update({ reply:t, replied_at:now, admin_read_at:now, is_read:true }).eq("id", id); }catch(_){}
  await refreshInbox();
  await refreshNotifDots();
}
async function approveSubmission(id){
  if(!sb) return;
  try{
    const { data } = await sb.from("word_submissions").select("*").eq("id", id).maybeSingle();
    if(data){
      const ins = await sb.from("shared_words").insert({ word:data.word, level:data.level, core:data.core, entries:data.entries });
      if(ins.error){ alert("承認に失敗: "+ins.error.message); return; }
      await sb.from("word_submissions").update({ status:"approved", reviewed_at:new Date().toISOString() }).eq("id", id);   /* P32-C：DELETEせず承認済みとして残す（利用者に審査状況を見せる） */
      await loadSharedWords();
    }
  }catch(e){ alert("承認に失敗: "+e.message); }
  await refreshInbox();
}
async function rejectSubmission(id){
  if(!sb) return;
  try{ await sb.from("word_submissions").update({ status:"rejected", reviewed_at:new Date().toISOString() }).eq("id", id); }catch(_){}   /* P32-C：DELETEせず却下として残す */
  await refreshInbox();
}
async function markFeedbackRead(id){
  if(!sb) return;
  /* 【WP16】管理者が意図的に「既読にする」を押したときに限り admin_read_at を書く。
     これにより送信者側の赤ドットが点灯する（返信保留中であることを伝える）。 */
  try{ await sb.from("feedback").update({ is_read:true, admin_read_at:new Date().toISOString() }).eq("id", id); }catch(_){}
  await refreshInbox();
  await refreshNotifDots();
}
async function deleteFeedback(id){
  if(!sb) return;
  if(!confirm("削除しますか？")) return;
  try{ await sb.from("feedback").delete().eq("id", id); }catch(_){}
  await refreshInbox();
  await refreshNotifDots();  /* 【WP16】未処理件数が減るので点灯状態を再計算 */
}

/* ---- セッション ----
   各語を選択式→(誤答/スキップ時のみ確認)→記述式→判定 の順で処理する。
   判定(SRSの間隔更新)は記述式の結果のみで行う。 */
/* 【P23-C】苦手語の判定。従来はホーム画面のカウントと buildQueue の2箇所に
   同じ式が別々に書かれており、片方だけ直すとズレる構造だった。1箇所に集約する。
   オーナー裁定により、しきい値を「正答率 80%未満」から【50%以下】へ変更。
   出題順がランダム化された（P23-B）ことで、順序を覚えて正解していた語があぶり出され、
   本当に苦手な語だけが50%以下に沈む。 */
const WEAK_THRESHOLD = 0.5;
function weakRate(st){
  const cr = (st.cSeen) ? st.cCorrect/st.cSeen : 1;   /* 選択式の正答率 */
  const wr = (st.wSeen) ? st.wCorrect/st.wSeen : 1;   /* 記述式の正答率 */
  return Math.min(cr, wr);                            /* 低いほうを採る */

function isWeakWord(w){
  const st = state.words[w.i];
  if(!st || st.mastered) return false;
  if(((st.cSeen||0)+(st.wSeen||0)) === 0) return false;   /* 一度も出ていない語は対象外（従来どおり） */
  return weakRate(st) <= WEAK_THRESHOLD;

/* 【P26】ホーム画面に追加された状態（PWA／スタンドアロン）で開いているか */

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
/* --- 語義データの正規化（新旧両構造を吸収）---
   新: [品詞, [候補,...]]  候補 = "日本語" | ["原形パターン","日本語訳"]
   旧: [品詞, "訳；訳"]
   返り値: [{pos, ja:[日本語訳...], cands:[表示用候補...]}]
   ja: 選択式の正解候補（日本語のみ）  cands: 確認・単語一覧用の全表示 */
const POS_ORDER = {"自動":0,"他動":1,"名":2,"形":3,"副":4,"句動":5,"熟":6};
function normEntries(w){
  const arr = w.e.map(ent=>{
    const pos = ent[0];
    const raw = ent[1];
    if(Array.isArray(raw)){
      const items = raw.map(c=>Array.isArray(c)?{ja:c[1], pat:c[0]}:{ja:c, pat:null});
      const ja = items.map(x=>x.ja);
      const cands = items.map(x=>x.pat?(x.pat+"："+x.ja):x.ja);
      return {pos, ja, cands, items};
    }else{
      const parts = String(raw).split("；").map(s=>s.trim()).filter(Boolean);
      const jaArr = parts.length?parts:[String(raw)];
      return {pos, ja:jaArr, cands:[String(raw)], items:jaArr.map(j=>({ja:j, pat:null}))};
    }
  });
  /* 品詞順に安定ソート（自動→他動→名→形→副→句動→熟） */
  return arr.map((e,idx)=>({e,idx})).sort((a,b)=>{
    const pa = POS_ORDER[a.e.pos]??99, pb = POS_ORDER[b.e.pos]??99;
    return (pa-pb) || (a.idx-b.idx);
  }).map(x=>x.e);
}
/* 確認・記述式で表示する全訳リスト（品詞ラベル＋全候補） */
function fullEntriesHtml(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`
  ).join("");
}
function promptEntries(w){
  return fullEntriesHtml(w);
}
/* 記述式の問題文用：英熟語パターンを出さず、日本語訳のみを表示 */
function jaOnlyEntries(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.ja.join("／"))}</span></div>`
  ).join("");
}
/* 空欄数を復習段階(revStage)で決める。
   revStage 0(初回): 1個以上 かつ 全区分の25%未満
   revStage 1(復習1回目): 25%以上75%未満
   revStage 2(2回目以降): 75%以上
   範囲内は個数ランダム。最低1個は絶対。 */
function blankCountByStage(posCount, revStage){
  if(posCount <= 1) return 1;
  const lo25 = posCount*0.25, hi75 = posCount*0.75;
  let min, max;
  if(revStage <= 0){          // 25%未満
    min = 1; max = Math.max(1, Math.ceil(lo25) - 1);
    if(lo25 === Math.floor(lo25)) max = Math.max(1, lo25 - 1); // ちょうど25%は含めない
    max = Math.min(max, posCount);
  }else if(revStage === 1){    // 25%以上75%未満
    min = Math.max(1, Math.ceil(lo25));
    max = Math.max(min, Math.ceil(hi75) - 1);
    if(hi75 === Math.floor(hi75)) max = Math.max(min, hi75 - 1);
    max = Math.min(max, posCount);
  }else{                       // 75%以上
    min = Math.max(1, Math.ceil(hi75));
    max = posCount;
  }
  if(min > max) min = max;
  return min + Math.floor(Math.random()*(max - min + 1)); // 範囲内ランダム
}
/* チャンク（今回出題される語群）の難易度☆(1〜5)＝設定difficulty */
function chunkStars(){
  return Math.max(1, Math.min(5, state.settings.difficulty||1));
}
function starHtml(d){
  d = Math.max(1, Math.min(5, d));
  let s = '<svg class="stars-svg" viewBox="0 0 '+(5*15)+' 15" aria-hidden="true">';
  for(let i=0;i<5;i++){
    const cx=i*15+7.5;
    const pts=starPoints(cx,7.5,6.5);
    s += '<polygon points="'+pts+'" class="'+(i<d?"star-fill":"star-empty")+'"/>';
  }
  return s+'</svg>';
}
function starPoints(cx,cy,r){
  const ri=r*0.42; let p=[];
  for(let k=0;k<10;k++){ const ang=-Math.PI/2 + k*Math.PI/5; const rad=(k%2===0)?r:ri;
    p.push((cx+rad*Math.cos(ang)).toFixed(2)+','+(cy+rad*Math.sin(ang)).toFixed(2)); }
  return p.join(' ');
}
/* 品詞ごとの訳プールを作る（誤答肢の品詞統一用）。品詞 -> [訳,...] */
function jaPoolByPos(excludeId, sameLv){
  const pool = {};
  for(const x of allWords()){
    if(x.i === excludeId) continue;
    if(sameLv!=null && (x.l===sameLv) !== true) continue;
    for(const e of normEntries(x)){
      (pool[e.pos] = pool[e.pos] || []).push(...e.ja);
    }
  }
  return pool;
}
/* 選択式の問題を生成：
   各区分から候補(items)を1つランダムに選んで正解とし、
   誤答肢3つは「同じ品詞」の他語の訳から（不足時は他品詞で補充）。
   正解候補がパターン付きなら、そのパターンを問題文表示用に保持 */
/* 訳語文字列を「意味の単位」に分解する（「・」「；」区切り＋先頭の〜／助詞を除去）。
   誤答選択肢が正解と同じ意味を含んでいないかを判定するために使う。 */
function coreSegments(str){
  return String(str).split(/[・;；]/)
    .map(s=>s.replace(/^[〜～]/,"").replace(/^(を|は|が|に|と|も)/,"").trim())
    .filter(Boolean);
}
/* 【P28】訳語の「意味核」どうしが重なるかを判定する。完全一致に加え、
   3文字以上の断片が相手にすっぽり含まれる場合も「重なり」とみなす
   （例：「重要な」⊂「決定的に重要な」、「評価する」⊂「高く評価する」）。
   これにより、正解と見分けのつかない誤答肢（正しく答えても不正解になる罠）を防ぐ。
   ただし差分が否定接頭辞（不・非・未・無・反）で終わる場合は、意味が正反対なので
   重なりとみなさない（「適切な」と「不適切な」は良い誤答肢のペアとして残す）。 */
const P28_NEG_HEAD = /[不非未無反]$/;
function p28SegContains(longer, shorter){   // longer が shorter を含み、その差分が否定接頭辞でない
  const idx = longer.indexOf(shorter);
  if(idx < 0) return false;
  const head = longer.slice(0, idx);
  return !(head.length > 0 && P28_NEG_HEAD.test(head));
}
function p28SegOverlap1(a, b){
  if(a === b) return true;
  if(a.length >= 3 && p28SegContains(b, a)) return true;
  if(b.length >= 3 && p28SegContains(a, b)) return true;
  return false;
}
function sensesOverlap(aSegs, bSegs){
  for(const a of aSegs){ for(const b of bSegs){ if(p28SegOverlap1(a, b)) return true; } }
  return false;
}
function makePosQuiz(w){
  const norm = normEntries(w);
  const st = state.words[w.i];
  const revStage = st ? (st.revStage||0) : 0;
  /* 複数選択の個数：設定 blankCount が "auto" のときだけ従来の revStage ベース（挙動不変）。
     数値指定時はその個数を品詞数(norm.length)でクランプ（品詞1つの語は必ず1＝単一選択）。 */
  const bc = (state.settings && state.settings.blankCount) || "auto";
  const nBlank = (bc === "auto")
    ? blankCountByStage(norm.length, revStage)
    : Math.min(parseInt(bc), norm.length);
  const idxs = shuffle(norm.map((_,k)=>k)).slice(0, nBlank).sort((a,b)=>a-b);
  const ownJa = new Set(norm.flatMap(e=>e.ja));
  const poolSameLv = jaPoolByPos(w.i, w.l);
  const poolAll = jaPoolByPos(w.i, null);
  const quizzes = {};   // k -> {correct, pat, opts:[...]}
  for(const k of idxs){
    const pos = norm[k].pos;
    const it = norm[k].items[Math.floor(Math.random()*norm[k].items.length)]; // 候補を1つ
    const correct = it.ja;
    const correctSegs = coreSegments(correct);
    /* 【P28】自分（この単語）の全語義の意味核。別語義に含まれる訳が誤答肢に出るのを防ぐ。
       例：run に別語義「Aに衝突する」があるとき、「走る」の誤答肢に「衝突する」を出さない。 */
    const ownSegs = [...new Set([...ownJa].flatMap(coreSegments))];
    /* 誤答肢：同品詞・同レベル → 同品詞・全レベル → 全品詞、の順で補充。
       正解や自分の別語義と意味が重なる候補は、他の単語の訳であっても誤答として出さない。
       重なりは完全一致だけでなく包含関係も見る（sensesOverlap）。 */
    const distractors = [];
    const tryPush = (arr)=>{
      for(const cand of shuffle(arr.slice())){
        if(distractors.length >= 3) break;
        if(cand === correct || ownJa.has(cand) || distractors.includes(cand)) continue;
        const candSegs = coreSegments(cand);
        if(sensesOverlap(candSegs, correctSegs)) continue;   /* 正解との包含（value「〜を高く評価する」に「〜を評価する」を出さない）*/
        if(sensesOverlap(candSegs, ownSegs)) continue;       /* 自語義との包含（run「走る」に「衝突する」を出さない）*/
        distractors.push(cand);
      }
    };
    tryPush(poolSameLv[pos] || []);
    if(distractors.length < 3) tryPush(poolAll[pos] || []);
    if(distractors.length < 3){ // 最終フォールバック：全品詞から
      const flat = Object.values(poolAll).flat();
      tryPush(flat);
    }
    quizzes[k] = { correct, pat: it.pat || null, opts: shuffle([correct].concat(distractors)) };
  }
  return { blanks:idxs, quizzes };
}
/* セッションのキュー要素を1つ作る（choice→write の初期状態）。buildQueue と buildChunk で共用。 */
function makeQueueItem(id){
  const w = byId(id);
  if(!w) return null;   /* 【第4バッチ】解決できないid（承認で同じ綴りの共有語が現れ、カスタム語が一覧から落ちた等）。呼び出し側で除去する */
  return {
    id,
    quiz: makePosQuiz(w),
    stage:"quiz", picks:{}, confirmed:{}, choiceDone:false, choiceOk:null,
    cTries:0, cPassed:false, cFailed:false,
    answeredWrite:false, writeOk:null,
    wTries:0, wPassed:false, wFailed:false
  };
}
function buildQueue(mode){
  let ids;
  if(mode === "weak"){
    /* 【P23-C】判定は isWeakWord() に集約（ホーム画面のカウントと必ず一致する）。
       並び順は startSession() でシャッフルされるため、ここでのソートは行わない
       （オーナー裁定：苦手モードも苦手語のなかでランダム）。 */
    ids = allWords().filter(isWeakWord).map(w=>({id:w.i}));
  }else{
    ids = dueReviews().map(w=>({id:w.i}));
  }
  return ids.map(x=>makeQueueItem(x.id));
}
/* 【P33是正C】プール制：1日の総量（プール）＝その日の復習due（全部）＋新規M語（固定・1日1回投入）。
   プールはその日の最初のチャンク開始時に確定し、日付キーで保持（state.log[t].pool / .cursor）。
   プール順は優先度順（弱点→通常due→新規）。翌日は日付が変われば作り直す。 */
function ensureTodayPool(){
  const t = todayStr();
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  if(Array.isArray(state.log[t].pool)) return state.log[t];   // 既に今日のプール確定済み（冪等）
  const ids = [];
  const seen = new Set();
  const push = id => { if(!seen.has(id)){ seen.add(id); ids.push(id); } };
  /* ① 弱点（苦手）を優先 */
  for(const w of allWords().filter(isWeakWord)) push(w.i);
  /* ② 通常の復習due（弱点以外）。dueReviews は既に優先度順。 */
  for(const w of dueReviews()) push(w.i);
  /* ③ 新規Mを1回だけ投入（M＝dailyNew。未設定は newPerDay を既定）。stockFill 直後 due<=today で拾える。 */
  const M = state.settings.dailyNew!=null ? state.settings.dailyNew : (state.settings.newPerDay||30);
  if(M > 0){
    stockFill(M);
    for(const w of dueReviews()) push(w.i);   // ストック直後の新規が加わる（既存は seen でスキップ）
  }
  state.log[t].pool = ids;
  state.log[t].cursor = 0;
  saveState();
  return state.log[t];
}
/* 【P33是正C】チャンク＝プールの [cursor, cursor+N) を切り出し、cursor を進める。もう1チャンク＝続きの N 問。 */
function buildChunk(){
  const t = todayStr();
  const lg = ensureTodayPool();
  const N = Math.max(1, state.settings.newPerDay || 30);
  const pool = lg.pool || [];
  const start = lg.cursor || 0;
  const slice = pool.slice(start, start + N);
  lg.cursor = start + slice.length;   // 実際に出した数だけ進める
  saveState();
  return slice.map(id=>makeQueueItem(id));
}
/* 【P33是正D】その日のプールに未消化が残っているか（完了画面の「もう1チャンク」出し分け用・残数の数字は出さない）。 */
function chunkRemaining(){
  const t = todayStr();
  const lg = state.log[t];
  if(!lg || !Array.isArray(lg.pool)) return anyChunkableToday();
  return (lg.cursor || 0) < lg.pool.length;
}
/* まだ今日のプールを作っていない段階での「出せる語があるか」判定（ホームの開始ボタン／穏やかな案内の出し分け）。 */
function anyChunkableToday(){
  const t = todayStr();
  const lg = state.log[t];
  if(lg && Array.isArray(lg.pool)) return (lg.cursor||0) < lg.pool.length;
  const M = state.settings.dailyNew!=null ? state.settings.dailyNew : (state.settings.newPerDay||30);
  return dueReviews().length > 0 || (M > 0 && anyStockableWords());
}
function startSession(mode){
  const m = mode || "review";
  /* 【P33】通常学習(review)はプール制チャンク。苦手モード(weak)は従来どおり全弱点をキュー化。 */
  const queue = ((m === "weak") ? buildQueue("weak") : buildChunk()).filter(it => it);   /* 【第4バッチ】解決できないidを除去（buildChunk は当日プールの id を使うため、承認直後は未解決が混じりうる） */
  if(queue.length===0) return;
  /* block: choice→write。各ブロックで phase: "main"(全語1回目)→"retry"(間違えた語の2回目) */
  /* 【P23-B】出題順を完全シャッフルする（オーナー裁定＝案2）。 */
  session = { queue, block:"choice", phase:"main", order:shuffle(queue.map((_,i)=>i)), pos:0,
              retry:[], mode:m, counts:{ok:0,ng:0} };
  saveSession();
  renderCard();
}
/* セッションの途中状態を保存／復元（完全復元用） */
function curItem(){
  const s = session;
  if(!s || s.pos >= s.order.length) return null;
  return s.queue[s.order[s.pos]];
}
/* 現ブロック・フェーズを1つ進める。フェーズ/ブロックの遷移も処理 */
function advance(){
  const s = session;
  s.pos++;
  if(s.pos < s.order.length){ saveSession(); return renderCard(); }
  /* order を消化しきった */
  if(s.phase === "main"){
    if(s.retry.length){
      s.phase = "retry"; s.order = shuffle(s.retry.slice()); s.retry = []; s.pos = 0;  /* 【P23-B】やり直しも順序を固定しない */
      saveSession(); return renderCard();
    }
    // retry無し → 次ブロックへ
    return nextBlock();
  }else{ // retryフェーズ終了
    return nextBlock();
  }
}
function nextBlock(){
  const s = session;
  if(s.block === "choice"){
    s.block = "write"; s.phase = "main";
    s.order = s.queue.map((_,i)=>i); s.retry = []; s.pos = 0;
    saveSession(); return renderCard();
  }
  /* 記述式も終了 → 全語の最終判定 */
  finalizeSession();
}
/* 全語の定着/未定着を確定し、SRSへ反映 */
function finalizeSession(){
  const s = session;
  const t = todayStr();
  for(const item of s.queue){
    const both = item.cPassed && item.wPassed;
    if(s.mode === "review"){
      const st = state.words[item.id];
      /* 【P33是正A】その日初回のチャンクでのみ成績(復習間隔・定着・苦手)を進める。
         同日の「もう1チャンク」以降の再出題は gradedOn===today なので finalizeWord を呼ばず、純粋な反復練習にする。
         finalizeWord の判定式そのものは不変（変えるのは「いつ呼ぶか」だけ）。 */
      if(st && st.gradedOn !== t){
        finalizeWord(item.id, item.cPassed, item.wPassed);
        st.gradedOn = t;
      }
    }
    /* 【P54】「その日もう数えた」印はモードを問わず立てる（苦手モードもここを通る）。
       gradedOn（SRSを進めたか）と分けるのは、苦手モードのあとに復習チャンクが来ても
       finalizeWord が呼ばれるようにするため。1本にすると復習が進まなくなる。
       return は書かない＝以降の集計・描画は従来どおり実行される。 */
    const stc = state.words[item.id];
    if(stc) stc.countedOn = t;
    if(both) s.counts.ok++; else s.counts.ng++;
  }
  renderDone();
}
function saveSession(){
  state.activeSession = session ? {
    queue: session.queue, block: session.block, phase: session.phase,
    order: session.order, pos: session.pos, retry: session.retry,
    mode: session.mode, counts: session.counts
  } : null;
  scheduleSave();
}
function resumeSession(){
  const a = state.activeSession;

  const q = Array.isArray(a.queue) ? a.queue : [];
  const map = {}; const queue = [];
  for(let i=0;i<q.length;i++){
    const it = q[i];
    if(it && byId(it.id)){ map[i] = queue.length; queue.push(it); }
  }
  const dropped = (queue.length !== q.length);
  const oldOrder = (Array.isArray(a.order) && a.order.length) ? a.order : q.map((_,i)=>i);
  const order = oldOrder.filter(i=>map[i]!==undefined).map(i=>map[i]);
  const retry = (Array.isArray(a.retry) ? a.retry : []).filter(i=>map[i]!==undefined).map(i=>map[i]);

  const oldPos = Math.min(a.pos||0, oldOrder.length);
  for(let k=0;k<oldPos;k++){ if(map[oldOrder[k]] !== undefined) pos++; }
  if(!queue.length || !order.length || pos >= order.length){
    /* 出せる語が残っていない → 黙って固まらせず、中断を終了扱いにしてホームへ戻す（記録は消さない）。 */
    state.activeSession = null; session = null; saveState();
    if(dropped) alert("前回の続きに入っていた単語が表示できなくなったため、中断を終了しました。学習の記録は残っています。");
    renderHome();
    return false;
  }
  session = { queue, block:a.block||"choice", phase:a.phase||"main",
              order, pos, retry,
              mode:a.mode||"review", counts:a.counts||{ok:0,ng:0} };
  if(dropped) saveSession();   /* 落としたぶんを保存にも反映する */
  renderCard();
  return true;
}
function renderCard(){
  refClose();
  const s = session;
  const item = curItem();
  if(!item){ return; }
  if(!item.confirmed) item.confirmed = {};   // 旧セッション復元時の保険
  /* 旧セッション復元時の stage 補完（新規アイテムは buildQueue で "quiz"） */
  if(item.stage === undefined){
    if(item.choiceDone) item.stage = item.choiceOk ? "explain" : "marked";
    else if(item.answeredWrite) item.stage = "explain";
    else item.stage = "quiz";
  }
  const w = byId(item.id);
  if(!w){ session = null; renderHome(); return; }   /* 【第4バッチ】最後の保険。activeSession は残すので、次の「続きから」で resumeSession が未解決idを除去する */
  const retryTag = s.phase==="retry" ? "（2回目）" : "";
  const blockLabel = (s.block==="choice" ? "① 選択式" : "② 記述式") + retryTag;
  const pct = Math.round(s.pos / Math.max(1,s.order.length) * 100);

  let body = "";
  if(item.stage === "explain"){
    body = renderExplain(item, w, s.block==="choice" ? "choiceNext" : "writeNext");
  }else if(s.block === "choice"){
    body = renderChoiceBody(item, w);   // "quiz"（回答中）／"marked"（誤答の色分け＋Next）
  }else{
    body = renderWriteBody(item, w);    // "quiz"（入力中）
  }

  const modeTag = s.mode==="weak" ? '<span class="tag" style="background:var(--shu)">苦手</span>' : '';

  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-act="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${s.pos+1} / ${s.order.length}</span>
      <span class="tag mode">${blockLabel}</span>
    </div>
    <div class="progress-track"><div class="p" style="width:${pct}%"></div></div>
    <div class="wcard">
      <div class="card-meta">
        <span class="diff-stars" title="難易度">${starHtml(chunkStars())}</span>
        ${accStatsHtml(item.id)}
        <span style="margin-left:auto"></span>${modeTag}
      </div>
      ${body}
    </div>`;

  app.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick = (ev)=>{ ev.preventDefault(); handleAct(el.dataset.act, el); };
  });
  const win = document.getElementById("writeIn");
  if(win && !item.answeredWrite){
    win.focus();
    win.onkeydown = e=>{
      if(e.key!=="Enter") return;
      /* IME変換確定のEnterには一切触れない（preventDefaultもしない）＝日本語の確定を邪魔しない */
      if(e.isComposing || e.keyCode===229) return;
      /* 変換を経由しない“本物のEnter”だけ既定動作を抑えて判定へ */
      e.preventDefault();
      handleAct("writeCheck");
    };
  }
}

/* ---- 結果テキスト（ラベルを外し、内容だけを示す：バッチJ 4-4） ---- */
function choiceResultHtml(item){
  const q = item.quiz;
  if(item.choiceOk){
    /* J-①：正解の訳を「／」で並記（正答は確認目的なので簡潔に） */
    const corrects = q.blanks.map(k=>esc(q.quizzes[k].correct)).join("／");
    return `<div class="dict-result ok">${corrects}</div>`;
  }
  /* 誤答の空欄ごとに「あなたの選択→正解訳」 */
  const lines = q.blanks
    .filter(k=>item.picks[k] !== q.quizzes[k].correct)
    .map(k=>`<div class="sub-line">${esc(item.picks[k]||"（未選択）")}→${esc(q.quizzes[k].correct)}</div>`).join("");
  return `<div class="dict-result ng">${lines}</div>`;
}
function writeResultHtml(item, w){
  const yourAnswer = item.lastInput ? esc(item.lastInput) : "（スキップ）";
  if(item.writeOk){
    return `<div class="dict-result ok">${esc(w.w)}</div>`;   // 正解の英単語のみ
  }
  /* J-②：補助行は残すが前向き・中立の文言に */
  const secondFail = session && session.mode==="review" && item.wTries>=2;
  const sub = secondFail ? "明日もう一度出題されます" : "確認しよう";
  return `<div class="dict-result ng">${yourAnswer}→${esc(w.w)}<div class="sub-line">${sub}</div></div>`;
}

/* ---- 解説画面（独立画面）本体：結果／コア／訳一覧／🔊発音／Next ---- */
function renderExplain(item, w, nextAct){
  const isChoice = (nextAct === "choiceNext");
  const resultHtml = isChoice ? choiceResultHtml(item) : writeResultHtml(item, w);
  /* J-③：選択式の解説にのみ見出し語 w.w を小さく添える（記述式は結果に ×× が出るので不要） */
  const head = isChoice ? `<div class="explain-word">${esc(w.w)}</div>` : "";
  return `${head}
    ${resultHtml}
    ${w.c ? `<div class="core-line"><span class="core-label">コア</span>${esc(w.c)}</div>` : ""}
    <div class="prompt-zone">${promptEntries(w)}</div>
    <button class="audio-btn" data-act="speak">🔊 発音を確認</button>
    <div class="reveal-next"><button class="btn-primary" data-act="${nextAct}">Next</button></div>`;
}

/* ---- 選択式（品詞別・訳選択）の本体 ---- */
function renderChoiceBody(item, w){
  const q = item.quiz;
  const norm = normEntries(w);
  const rows = norm.map((e,k)=>{
    const isBlank = q.blanks.includes(k);
    if(!isBlank){
      return `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.ja.join("／"))}</span></div>`;
    }
    const picked = item.picks[k];
    const confirmed = !!item.confirmed[k];
    const correct = q.quizzes[k].correct;
    const optHtml = q.quizzes[k].opts.map((o,oi)=>{
      let cls = "opt-btn";
      /* P31 C-2：語全体の採点後(choiceDone)だけでなく、そのブランクを個別確定(confirmed)した時点でも正誤色分けする */
      if(item.choiceDone || confirmed){
        if(o===correct) cls += " correct";
        else if(o===picked) cls += " wrong";
      }else if(o===picked){ cls += " picked"; }
      const dis = (item.choiceDone || confirmed) ? "disabled" : "";
      return `<button class="${cls}" data-act="pick" data-k="${k}" data-val="${esc(o)}" ${dis}><span class="opt-num">${oi+1}</span>${esc(o)}</button>`;
    }).join("");
    let slot, blockExtra;
    if(item.choiceDone || confirmed){
      /* P31 C-2：語全体の採点後だけでなく、個別確定(confirmed)時点でも正誤で色分け表示する */
      const ok = (picked === correct);
      slot = `${ok ? "✓" : "✕"} ${picked ? esc(picked) : "（未選択）"}`;
      blockExtra = ok ? " correct" : " wrong";
    }else{
      slot = picked ? esc(picked) : "〔　？　〕";
      blockExtra = "";
    }
    const label = `<span class="pos-badge">${esc(e.pos)}</span>`;
    return `<div class="blank-block${blockExtra}">
      <div class="entry">${label}<span class="meaning blank-slot">${slot}</span></div>
      <div class="opt-list">${optHtml}</div>
    </div>`;
  }).join("");

  /* marked 画面（誤答時のみ到達）：色分けグリッド＋Next（→解説画面 choiceReveal） */
  if(item.choiceDone){
    return `<div class="word-display">${esc(w.w)}</div>
      <div class="prompt-zone">${rows}</div>
      <div class="reveal-next"><button class="btn-primary" data-act="choiceReveal">Next</button></div>`;
  }

  /* quiz 画面（回答中） */
  const multi = q.blanks.length >= 2;
  const allPicked = q.blanks.every(k=>item.picks[k]);   // 地雷#17回避：都度評価（フラグに焼き付けない）
  const hint = multi
    ? `<div class="hint choice-hint">各項目を1つずつ選び、すべて選ぶと出る「回答」で確定（同じ項目をもう一度タップしても確定）。PCは数字キーで1項目ずつその場で確定します</div>`
    : `<div class="hint choice-hint">選択肢を2回タップで確定（PCは数字キーを1回押すと、その場で確定します）</div>`;
  const submitBtn = (multi && allPicked)
    ? `<div class="reveal-next"><button class="btn-primary" data-act="choiceSubmit">回答</button></div>`
    : ``;
  return `<div class="word-display">${esc(w.w)}</div>
    ${hint}
    <div class="prompt-zone">${rows}</div>
    ${submitBtn}`;
}

/* 複数選択：全空欄をまとめて確定して採点入口 gradeChoice へ合流する共通ヘルパー。
   回答ボタン（handleAct の choiceSubmit）とダブルタップ（choiceSelect）の両方から呼ぶ。 */
function choiceSubmitAll(){
  const item = curItem(); if(!item || item.choiceDone) return;
  const q = item.quiz;
  if(q.blanks.length < 2) return;                 // 単一選択には無い
  if(!q.blanks.every(k=>item.picks[k])) return;   // 全選択でなければ no-op（stale DOM対策）
  q.blanks.forEach(k=>{ item.confirmed[k] = true; });
  gradeChoice();                                  // 既存の採点入口へ合流（新経路は作らない）
}
/* ---- 選択式：2タップ確定ロジック（クリック／キーボード共通） ---- */
function choiceSelect(k, o){
  const item = curItem();
  if(!item || item.choiceDone) return;
  if(!item.confirmed) item.confirmed = {};
  if(item.confirmed[k]) return;            // 確定済みブランクは触れない
  const q = item.quiz;
  const multi = q.blanks.length >= 2;
  if(item.picks[k] === o){                 // 同じ肢を再タップ
    /* P31 C-1：単一・複数を問わず「そのブランク単独を個別確定」に統一。
       choiceConfirmBlank は未選択を弾き、全ブランク確定で gradeChoice へ合流する。 */
    choiceConfirmBlank(k);
    return;
  }
  // 別の肢／初回 → 選択（乗り換え）。仕様B：この描画のみスクロール位置を保持して跳ねを防ぐ
  item.picks[k] = o;
  saveSession();
  const _y = window.scrollY; const _pz = document.querySelector(".prompt-zone"); const _pt = _pz ? _pz.scrollTop : 0;
  renderCard();
  requestAnimationFrame(()=>{ window.scrollTo(0, _y); const z = document.querySelector(".prompt-zone"); if(z) z.scrollTop = _pt; });  /* P31症状A：ページ全体＋選択肢枠(.prompt-zone)のスクロール位置をレイアウト確定後に復元 */
}
function choiceConfirmBlank(k){
  const item = curItem();
  if(!item || item.choiceDone) return;
  if(!item.picks[k]) return;               // 何も選んでいなければ確定不可
  item.confirmed[k] = true;
  const q = item.quiz;
  if(q.blanks.every(b=>item.confirmed[b])){ // 全ブランク確定 → 採点
    gradeChoice();
  }else{
    /* P31 C-5：個別確定後の再描画でもスクロール位置を保持（複数選択で他ブランクへ移る際の跳ね対策） */
    saveSession();
    const _y = window.scrollY; const _pz = document.querySelector(".prompt-zone"); const _pt = _pz ? _pz.scrollTop : 0;
    renderCard();
    requestAnimationFrame(()=>{ window.scrollTo(0, _y); const z = document.querySelector(".prompt-zone"); if(z) z.scrollTop = _pt; });  /* P31症状A：ページ全体＋選択肢枠(.prompt-zone)のスクロール位置をレイアウト確定後に復元 */
  }
}
function gradeChoice(){
  const item = curItem();
  if(!item) return;
  if(item.choiceDone) return;   // P31 C-4：採点済みなら no-op（個別確定／回答ボタン／ダブルタップの一度だけ合流を保証）
  const q = item.quiz;
  const w = byId(item.id);
  item.choiceDone = true;
  item.choiceOk = q.blanks.every(k=>item.picks[k] === q.quizzes[k].correct);
  item.cTries++;
  recordAnswer(item.id, "c", item.choiceOk);   // 回答回数に必ずカウント（リトライ含む）
  if(item.choiceOk) item.cPassed = true;
  else if(item.cTries >= 2) item.cFailed = true;
  /* 全問正解→解説画面へ直行／誤答→色分け画面(marked)で一旦止める */
  item.stage = item.choiceOk ? "explain" : "marked";
  saveSession();
  renderCard();
  speak(w.w);
}
/* 【P58】可視のモーダルがあるか。存在ではなく【可視】で見る（3つとも動的生成され、
   隠すのはクラス auth-hidden / merge-hidden / pr-hidden。開くときは className 全置換
   （at:7719）か classList.remove（at:7972）で外す。classList.contains は両方式に効く）。
   未生成なら getElementById が null ＝「開いていない」。 */
function modalOpen(){
  const m = [["authmodal","auth-hidden"],["mergeModal","merge-hidden"],["pwresetmodal","pr-hidden"]];
  return m.some(([id,cls])=>{ const el = document.getElementById(id); return !!el && !el.classList.contains(cls); });
}
/* 【P58】PCキーボード：数字キー(1〜9)で選択肢をその場で確定、Enterは解説／色分け画面で「次へ」。
   ガードの並びが要点。修飾キー・IME・自動リピートは【入口】で弾き、
   stage 分岐（Enterで次へ）は choiceDone と .opt-list の【前】に置く
   （解説画面 renderExplain には .opt-list が無いため、後ろに置くと Enter が死ぬ＝地雷#22）。
   数字キーは従来どおり選択式だけ。Enterの「次へ」だけが記述式とも共通。 */
function choiceKeydown(e){
  /* 【P58-1】同じEnterの二度打ち防止。記述式は入力欄の中でEnterを受けて「判定」まで走り、
     画面が解説へ入れ替わってから、その【同じイベント】がここまで上がってくる。
     このとき元の入力欄はすでに破棄されており（isConnected===false）、
     document.activeElement も body に戻っているため入力欄ガードを素通りしてしまう。
     結果、1回のEnterで「判定」と「次へ」が連続して走り、解説が飛ばされる。
     キーを受け取った要素が画面から消えている＝そのキーは既に処理済み、とみなして無視する。 */
  if(e.target && e.target.isConnected === false) return;
  if(e.defaultPrevented) return;                   /* 既定動作を止めた側が処理済み（記述式の判定など） */
  if(e.ctrlKey || e.metaKey || e.altKey) return;   /* 【P58】Ctrl+数字（タブ切替）や ⌘+数字を奪わない。e.key は修飾併用でも "1" のまま */
  if(e.isComposing || e.keyCode === 229) return;   /* 【P58】日本語変換中は無反応（記述式の入力欄 at:6569 と同じ形） */
  if(e.repeat) return;                             /* 【P58】押しっぱなしの自動リピートで2問飛ばさない */
  const s = session;
  if(!s) return;
  const ae = document.activeElement;
  if(ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return; // 入力欄フォーカス中は無反応
  if(modalOpen()) return;                          /* 【P58】出題画面の上にモーダルが重なっている間は無反応 */
  const item = curItem();
  if(!item) return;
  /* 【P58】採点後（解説／色分け）は Enter で画面に出ている主ボタンを押す。
     関数を直接呼ばず click() するのは、ボタンが無い画面では何も起きない＝画面と挙動がズレないため。
     3つが同時に出ることはない（marked＝choiceReveal のみ／解説＝ブロックに応じて choiceNext か writeNext のみ）。 */
  if(item.stage === "explain" || item.stage === "marked"){
    if(e.key === "Enter"){
      const btn = app.querySelector('[data-act="choiceNext"], [data-act="choiceReveal"], [data-act="writeNext"]');
      if(btn){ e.preventDefault(); btn.click(); }
    }
    return;
  }
  if(s.block !== "choice") return;                 /* 【P58】ここから下は選択式の回答中だけ（記述式の回答中は数字キーもEnterも走らせない） */
  if(item.choiceDone) return;
  if(!app.querySelector(".opt-list")) return;      // 選択式カード表示中のみ
  if(!item.confirmed) item.confirmed = {};
  const q = item.quiz;
  /* 【P58】対象ブランクの求め方を単一・複数で統一。!picks ではなく !confirmed を見るのは、
     タップで選んだだけ（picks あり・confirmed なし）の欄を飛ばして次の欄を確定してしまわないため。 */
  const activeK = q.blanks.find(k=>!item.confirmed[k]);
  if(activeK === undefined) return;
  if(e.key === "Enter"){
    /* Enter の意味は従来どおり：複数は「全部選び終えているときだけ回答」、単一は「選んである肢を確定」。
       数字キーがその場で確定するようになったため、キーボードだけで進めるとこの経路には到達しない
       （到達するのは、タップで全部選んでから Enter を押す混在操作のときだけ）。 */
    if(q.blanks.length >= 2){
      if(q.blanks.every(k=>item.picks[k])){ e.preventDefault(); choiceSubmitAll(); }
    }else if(item.picks[activeK]){ e.preventDefault(); choiceConfirmBlank(activeK); }
    return;
  }
  if(/^[1-9]$/.test(e.key)){
    const idx = parseInt(e.key, 10) - 1;
    const opts = q.quizzes[activeK].opts;
    if(idx < opts.length){
      e.preventDefault();
      /* 【P58】ワンタップ確定：選択と確定を1回で。choiceSelect（2段構え）は使わない。
         choiceConfirmBlank は全ブランク確定で gradeChoice へ合流する（採点の入口は1本のまま）。 */
      item.picks[activeK] = opts[idx];
      choiceConfirmBlank(activeK);
    }
  }
}

/* ---- 確認カード共通本体 ---- */
function confirmCardBody(w, wrongHtml){
  const a = accuracy(w.i);
  const accLine = a ? `<div class="acc-line">出題 ${a.reps}回　選択式 ${a.cRate!=null?a.cRate+"%":"−"}　記述式 ${a.wRate!=null?a.wRate+"%":"−"}</div>` : "";
  return `<div class="word-display" style="font-size:1.7rem">${esc(w.w)}</div>
    ${accLine}
    ${wrongHtml||""}
    ${w.c ? `<div class="core-line"><span class="core-label">コア</span>${esc(w.c)}</div>` : ""}
    <button class="audio-btn" data-act="speak">🔊 発音を聞く</button>
    <div class="prompt-zone">${promptEntries(w)}</div>`;
}

/* ---- 記述式の本体（回答中のみ。判定後は解説画面 renderExplain へ） ---- */
function renderWriteBody(item, w){
  return `<div class="hint">意味に合う英単語をスペルまで正確に入力（Enterで判定）</div>
    <div class="prompt-zone">${jaOnlyEntries(w)}</div>
    <div class="dict-row">
      <input id="writeIn" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" placeholder="英単語を入力">
      <button class="btn-sub" data-act="writeCheck">判定</button>
      <button class="btn-sub" data-act="writeSkip">スキップ</button>
    </div>`;
}
function handleAct(act, el){
  const s = session;
  const item = curItem();
  if(!item) return;
  const w = byId(item.id);
  if(!w){ session = null; renderHome(); return; }   /* 【第4バッチ】最後の保険 */
  if(act==="speak"){ speak(w.w); return; }
  if(act==="exit"){ saveSession(); flushSave(); renderHome(); return; }

  /* ==== ブロックA：選択式（2タップ確定） ==== */
  if(act==="pick"){
    choiceSelect(parseInt(el.dataset.k), el.dataset.val);
    return;
  }
  if(act==="choiceSubmit"){ // 複数選択：回答ボタン → 共通ヘルパーで確定・採点
    choiceSubmitAll();
    return;
  }
  if(act==="choiceReveal"){ // marked（色分け）→ 解説画面へ
    item.stage = "explain";
    saveSession();
    renderCard();
    return;
  }
  if(act==="choiceNext"){
    /* 選択式の1問終了。誤答かつ1回目(main)なら retry に積む */
    if(!item.choiceOk && s.phase==="main" && !item.cPassed){
      s.retry.push(s.order[s.pos]);
    }
    // 次問へ進む前に、選択式の状態をリセット（2回目再挑戦に備える）
    item.stage = "quiz"; item.choiceDone = false; item.choiceOk = null; item.picks = {}; item.confirmed = {};
    if(s.phase==="retry"){ item.quiz = makePosQuiz(w); } // 2回目は新しい問題を作る
    advance();
    return;
  }

  /* ==== ブロックB：記述式 ==== */
  if(act==="writeCheck"){ // 「判定」
    if(item.answeredWrite) return; // キーボード経由の二重発火に対する保険
    const v = (document.getElementById("writeIn").value||"").trim().toLowerCase();
    if(!v) return;
    item.answeredWrite = true;
    item.writeOk = (v === w.w.toLowerCase());
    item.lastInput = v;
    item.wTries++;
    recordAnswer(item.id, "w", item.writeOk);
    if(item.writeOk) item.wPassed = true;
    else if(item.wTries >= 2) item.wFailed = true;
    item.stage = "explain";   // 記述式は正誤とも解説画面へ直行
    saveSession();
    renderCard();
    speak(w.w);
    return;
  }
  if(act==="writeSkip"){
    if(item.answeredWrite) return;
    item.answeredWrite = true;
    item.writeOk = false;
    item.lastInput = "";
    item.wTries++;
    recordAnswer(item.id, "w", false);
    if(item.wTries >= 2) item.wFailed = true;
    item.stage = "explain";   // スキップも解説画面へ
    saveSession();
    renderCard();
    return;
  }
  if(act==="writeNext"){
    if(!item.writeOk && s.phase==="main" && !item.wPassed){
      s.retry.push(s.order[s.pos]);
    }
    item.stage = "quiz"; item.answeredWrite = false; item.writeOk = null;
    advance();
    return;
  }
}

/* ---- 単語一覧（判定に一切関与しない全単語の閲覧）---- */
let refFilter = { lv:"all", q:"", sort:"alpha" };  /* 【WP17】番号順(std)を廃止し、読み順(alpha)を既定にする */
function renderReference(){
  session = null;
  const words = allWords().slice().sort((a,b)=>a.i-b.i);
  const q = refFilter.q.trim().toLowerCase();
  let list = words.filter(w=>{
    if(refFilter.lv!=="all" && w.l!==parseInt(refFilter.lv)) return false;
    if(q){
      const hay = (w.w+" "+normEntries(w).flatMap(e=>e.cands).join(" ")+" "+(w.c||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  /* ⑥ 正答率ソート（選択式・記述式の合算）。未回答は末尾 */
  const combined = (w)=>{
    const st=state.words[w.i]; if(!st) return null;
    const seen=(st.cSeen||0)+(st.wSeen||0); if(!seen) return null;
    return Math.round(((st.cCorrect||0)+(st.wCorrect||0))/seen*100);
  };
  if(refFilter.sort==="desc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return rb-ra||a.i-b.i; });
  }else if(refFilter.sort==="asc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return ra-rb||a.i-b.i; });
  }else if(refFilter.sort==="alpha"){
    /* 【WP17】読み順（a→z）。既存3種のロジックには触れない */
    list = list.slice().sort((a,b)=>{ const x=(a.w||"").toLowerCase(), y=(b.w||"").toLowerCase();
      return x<y ? -1 : x>y ? 1 : a.i-b.i; });
  }
  /* 【WP17】読み順のときだけ、頭文字が変わる位置に見出しを差し込む。
     見出しは list から生成するので、該当ゼロの文字は原理的に出ない（絞り込み・検索に自動追従） */
  let _lastSec = null;
  const items = list.map(w=>{
    let secHtml = "";
    if(refFilter.sort==="alpha"){
      const k = (w.w||"").charAt(0).toLowerCase();
      if(/[a-z]/.test(k) && k!==_lastSec){ _lastSec = k; secHtml = `<div class="ref-sec" id="refsec-${k}">${k}</div>`; }
    }
    const [cls,label] = wordStatus(w);
    const a = accuracy(w.i);
    const rate = combined(w);
    const gcol = rate==null ? "transparent" : rate>=80 ? "var(--midori)" : rate>=60 ? "#C9A227" : "var(--shu)";
    const accHtml = a
      ? `<span class="ref-acc">出題${a.reps}回</span>`
        + (a.cRate!=null?`<span class="ref-acc ${a.cRate<60?"low":""}">選 ${a.cRate}%</span>`:"")
        + (a.wRate!=null?`<span class="ref-acc ${a.wRate<60?"low":""}">記 ${a.wRate}%</span>`:"")
      : "";
    return secHtml + `<div class="ref-item">
      <div class="ref-head">
        <span class="ref-lv" style="background:${LV_COLORS[w.l]}">Lv.${w.l}</span>
        <span class="ref-word">${esc(w.w)}</span>
        <button class="ref-play" data-play="${esc(w.w)}">🔊</button>
        <span class="ref-status ${cls}">${label}</span>
      </div>
      <div class="acc-gauge" title="正答率${rate==null?"（未回答）":" "+rate+"%"}"><div class="g" style="width:${rate||0}%;background:${gcol}"></div></div>
      ${accHtml?`<div style="margin:2px 0 6px">${accHtml}</div>`:""}
      ${w.c ? `<div class="ref-core">${esc(w.c)}</div>` : ""}
      ${normEntries(w).map(e=>`<div class="ref-ent"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`).join("")}
    </div>`;
  }).join("");

  /* 【WP17】目次の見出しキー。読み順のときだけ a〜z（該当ゼロは list に無いので自動的に出ない） */
  const secKeys = (refFilter.sort==="alpha")
    ? [...new Set(list.map(w=>(w.w||"").charAt(0).toLowerCase()).filter(c=>/[a-z]/.test(c)))]
    : [];

  app.innerHTML = `
    <header>
      <div><h1>単語一覧</h1>
      <div class="date-line">判定なし・閲覧のみ</div></div>
      <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a>
    </header>
    <div class="panel" id="refPanel">
      <div class="ref-controls">
        <select id="refLv">
          <option value="all" ${refFilter.lv==="all"?"selected":""}>全レベル</option>
          ${[1,2,3,4,5].map(l=>`<option value="${l}" ${refFilter.lv==String(l)?"selected":""}>Lv.${l} のみ</option>`).join("")}
        </select>
        <select id="refSort">
          <option value="alpha" ${refFilter.sort==="alpha"?"selected":""}>読み順（a→z）</option>
          <option value="asc" ${refFilter.sort==="asc"?"selected":""}>正答率が低い順</option>
          <option value="desc" ${refFilter.sort==="desc"?"selected":""}>正答率が高い順</option>
        </select>
        <input id="refQ" placeholder="単語・意味で検索" value="${esc(refFilter.q)}">
      </div>
      <div class="ref-count">該当 ${list.length} 語 / 全 ${words.length} 語</div>
      ${items || `<div class="note">該当する単語がありません。</div>`}
    </div>
    ${refNavHtml(secKeys, list.length)}`;

  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  document.getElementById("refLv").onchange = (e)=>{ refFilter.lv = e.target.value; renderReference(); };
  document.getElementById("refSort").onchange = (e)=>{ refFilter.sort = e.target.value; renderReference(); };
  const qi = document.getElementById("refQ");
  qi.oninput = (e)=>{ refFilter.q = e.target.value; };
  qi.onkeydown = (e)=>{ if(e.key==="Enter") renderReference(); };
  app.querySelectorAll("[data-play]").forEach(b=>{ b.onclick = ()=>speak(b.dataset.play); });
  bindRefNav(secKeys);
  document.body.classList.add("ref-open");                 /* 【P24】最下部の帯を隠す */
  document.body.classList.add("noBounce");                /* 【P25】長大スクロール画面のみバウンド抑止 */
  document.documentElement.classList.add("noBounce");     /*        html にも直接付ける（:has()は使わない） */
}

/* ================= 【WP17】単語一覧のナビゲーション =================
   ・左端：目次バー（読み順のときのみ。a〜z、該当ゼロは非表示）
   ・右端：スクロールバー（全ての並び順。つまみを掴んで滑らかに高速移動）
   ・右下：最上部へ戻るボタン
   ・要素は app.innerHTML の中に置くため、他画面へ遷移すれば自動的に破棄される
   ・位置計算は offsetTop（文書基準）を使う。getBoundingClientRect は使わない。
     理由：見出しを sticky にすると通り過ぎた見出しが top:0 に貼り付き、rect.top が 0 を返して
           「下から上へ飛べない」不具合になる。sticky は廃止したが、計算も rect 非依存にして二重に守る。 */
function refNavHtml(secKeys, total){
  if(total <= 12) return "";
  const idx = secKeys.length
    ? `<div class="idx-bar" id="refIdx">${secKeys.map(k=>`<span data-k="${k}">${k}</span>`).join("")}</div>`
    : "";
  return idx
    + `<div class="scrub" id="refScrub"><div class="scrub-track"></div><div class="scrub-thumb" id="refThumb"></div></div>`
    + `<div class="idx-bubble" id="refBubble"></div>`
    + `<button class="to-top" id="refTop" title="最上部へ戻る" aria-label="最上部へ戻る">▲</button>`;
}
function refMaxScroll(){ return Math.max(1, document.documentElement.scrollHeight - window.innerHeight); }
function refAbsTop(el){ let y=0; while(el){ y += el.offsetTop; el = el.offsetParent; } return y; }

function bindRefNav(secKeys){
  const bub  = document.getElementById("refBubble");
  const bar  = document.getElementById("refIdx");
  const scr  = document.getElementById("refScrub");
  const thumb= document.getElementById("refThumb");
  const top  = document.getElementById("refTop");
  if(!bub) return;

  const showBub = (txt)=>{ bub.textContent = txt; bub.style.display = "block"; };
  const hideBub = ()=>{ bub.style.display = "none"; };

  /* ---- 左端：目次バー（読み順のみ） ---- */
  if(bar && secKeys.length){
    const spans = Array.prototype.slice.call(bar.querySelectorAll("span"));
    const go = (clientY)=>{
      /* 【地雷#17】箱（flexコンテナ）の矩形を項目数で等分してはいけない。
         .idx-bar は justify-content:center ＋ padding を持つため、子要素は箱の中央にだけ
         固まって並ぶ。箱を等分した座標と、文字が実際に並んでいる位置が食い違い、
         端で±1項目ぶんズレる（実測：a→b、z→y）。
         【最初の子の上端〜最後の子の下端】＝文字が実際に占める帯を基準に等分する。
         定数を置かず毎回その場で測るため、将来CSSを変えても壊れない。 */
      if(!spans.length) return;
      const fr = spans[0].getBoundingClientRect();
      const lr = spans[spans.length - 1].getBoundingClientRect();
      const band = lr.bottom - fr.top;
      if(band <= 0) return;
      let i = Math.floor((clientY - fr.top) / (band / spans.length));
      if(i < 0) i = 0;
      if(i > spans.length - 1) i = spans.length - 1;
      const k = spans[i].dataset.k;
      const el = document.getElementById("refsec-" + k);
      if(el) window.scrollTo(0, Math.max(0, Math.min(refMaxScroll(), refAbsTop(el) - 10)));
      showBub(k);
    };
    bar.addEventListener("touchstart",(e)=>{ go(e.touches[0].clientY); e.preventDefault(); },{passive:false});
    bar.addEventListener("touchmove", (e)=>{ go(e.touches[0].clientY); e.preventDefault(); },{passive:false});
    bar.addEventListener("touchend", hideBub);
    bar.addEventListener("touchcancel", hideBub);
    bar.addEventListener("click", (e)=>{ go(e.clientY); setTimeout(hideBub, 700); });
  }

  /* ---- 右端：スクロールバー（滑らかな高速移動。全ての並び順で使える） ---- */
  if(scr && thumb){
    const TH = 46;                      /* つまみの高さ（CSSと一致させる） */
    let dragging = false;

    const trackGeom = ()=>{
      const r = scr.getBoundingClientRect();
      return { top:r.top, travel: Math.max(1, r.height - TH) };
    };
    /* スクロール位置 → つまみの位置 */
    const sync = ()=>{
      if(!document.body.contains(thumb)){ window.removeEventListener("scroll", sync); return; }
      if(dragging) return;
      const g = trackGeom();
      thumb.style.top = Math.round(g.travel * (window.scrollY / refMaxScroll())) + "px";
      if(top) top.style.display = (window.scrollY > 320) ? "block" : "none";
    };
    /* 指の位置 → スクロール位置（つまみの中心が指に追従＝1:1で滑らか） */
    const drag = (clientY)=>{
      const g = trackGeom();
      let y = clientY - g.top - TH / 2;
      if(y < 0) y = 0;
      if(y > g.travel) y = g.travel;
      thumb.style.top = Math.round(y) + "px";
      window.scrollTo(0, Math.round(refMaxScroll() * (y / g.travel)));
      /* 吹き出し：読み順ならいま見えている見出しの文字、それ以外は割合 */
      if(secKeys.length){
        let cur = secKeys[0], best = -1;
        for(const k of secKeys){
          const el = document.getElementById("refsec-" + k);
          if(el){ const t = refAbsTop(el); if(t <= window.scrollY + 60 && t > best){ best = t; cur = k; } }
        }
        showBub(cur);
      }else{
        showBub(Math.round((y / g.travel) * 100) + "%");
      }
    };
    const start = (clientY)=>{ dragging = true; scr.classList.add("on"); drag(clientY); };
    const end   = ()=>{ dragging = false; scr.classList.remove("on"); hideBub(); sync(); };

    scr.addEventListener("touchstart",(e)=>{ start(e.touches[0].clientY); e.preventDefault(); },{passive:false});
    scr.addEventListener("touchmove", (e)=>{ drag(e.touches[0].clientY);  e.preventDefault(); },{passive:false});
    scr.addEventListener("touchend", end);
    scr.addEventListener("touchcancel", end);
    scr.addEventListener("mousedown", (e)=>{ start(e.clientY); e.preventDefault();
      const mv = (ev)=>drag(ev.clientY);
      const up = ()=>{ end(); window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); };
      window.addEventListener("mousemove", mv); window.addEventListener("mouseup", up);
    });
    window.addEventListener("scroll", sync, {passive:true});
    sync();
  }

  /* ---- 右下：最上部へ戻る ---- */
  if(top){
    top.onclick = ()=>{ try{ window.scrollTo({top:0, behavior:"smooth"}); }catch(_){ window.scrollTo(0,0); } };
    top.style.display = (window.scrollY > 320) ? "block" : "none";
  }
}

/* ==== 追加機能：ステータス・格言・品詞モード・設定・説明 ==== */
/* 語の記録を作成/昇格。inReview=true でノルマ（復習候補）入り */
/* 一度きりの移行（旧データ救済・現行スケジュール準拠・冪等）。
   ★既存レコードのみを回す（Object.keys(state.words)）。allWords() を回すと未ストック語に
     レコードを新規作成し全語が復習中になる大事故になるため、絶対に allWords() を使わない。
   既存レコードだけなら ensureWordRecord は昇格分岐のみを通る：
     inReview===false の旧「出題済」語のみ inReview=true にし、due が無い/未来なら todayStr() を付与。
     inReview=true の語は無反応（冪等）。 */
function migrateReviveOldRecords(){
  if(!state || !state.words) return;
  for(const id of Object.keys(state.words)){ ensureWordRecord(id, true); }
}
function ensureWordRecord(id, inReview){
  if(!state.words[id]){
    state.words[id] = { step:0, due:todayStr(), reps:0, lapses:0, mastered:false,
      learnedOn:todayStr(), revStage:0, failStreak:0, okStreak:0,
      cSeen:0, cCorrect:0, wSeen:0, wCorrect:0, inReview:!!inReview };
  }else if(inReview && state.words[id].inReview===false){
    state.words[id].inReview = true;
    if(!state.words[id].due || state.words[id].due > todayStr()) state.words[id].due = todayStr();
  }
  return state.words[id];
}
/* ステータス3段階: 未学習/復習中/定着済
   ・一度も回答していない語は、ストック済みでも「未学習」
   ・復習候補内で回答済み → 復習中
   ・3回連続定着 → 定着済 */
function wordStatus(w){
  const st = state.words[w.i];
  if(!st) return ["n","未学習"];
  if(st.mastered) return ["m","定着済"];
  const answered = ((st.cSeen||0)+(st.wSeen||0)) > 0;
  if(!answered) return ["n","未学習"];      // ストックされただけ＝まだ未学習
  return ["l","復習中"];
}

/* ==== 品詞モード（判定・集計なし） ==== */
const POS5 = ["自動","他動","名","形","副"];
const POS5_LABEL = {"自動":"自動詞","他動":"他動詞","名":"名詞","形":"形容詞","副":"副詞"};
function posEligibleWords(){
  /* メインモードのノルマで既に導入された単語（state.wordsに記録がある語）のみを対象にする。
     未学習（メインモードで一度も出題されていない）語は品詞モードにも出題しない。 */
  return allWords().filter(w=> state.words[w.i] && normEntries(w).some(e=>POS5.includes(e.pos)));
}
function correctPosSet(w){
  const s=new Set();
  normEntries(w).forEach(e=>{ if(POS5.includes(e.pos)) s.add(e.pos); });
  return s;
}
function startPosSession(fresh){
  if(fresh || !state.posSession){
    const n = Math.max(5, Math.min(100, state.settings.posChunk||30));
    const ids = shuffle(posEligibleWords().slice()).slice(0,n).map(w=>w.i);
    state.posSession = { ids, pos:0, sel:[], checked:false, ok:null, confirming:false };
  }
  /* 【第4バッチ】復元した ids のうち解決できないものを除き、pos を詰める（空になれば renderPosCard が完了画面へ回す） */
  {
    const ps = state.posSession;
    if(ps && Array.isArray(ps.ids)){
      const oldIds = ps.ids, oldPos = ps.pos||0, keep = [];
      let np = 0;
      for(let i=0;i<oldIds.length;i++){
        if(byId(oldIds[i])){ if(i < oldPos) np++; keep.push(oldIds[i]); }
      }
      if(keep.length !== oldIds.length){ ps.ids = keep; ps.pos = Math.min(np, keep.length); }
    }
  }
  scheduleSave();
  renderPosCard();
}
function renderPosCard(){
  refClose();   /* 【P24】単語一覧を離れたら最下部の帯を戻す */
  const ps = state.posSession;
  if(!ps || ps.pos >= ps.ids.length){ return renderPosDone(); }
  const w = byId(ps.ids[ps.pos]);
  if(!w) return renderPosDone();   /* 【第4バッチ】最後の保険（renderPosDone が posSession を片付ける） */
  const correct = correctPosSet(w);
  let body="";
  if(ps.confirming){
    const wrongHtml = `<div class="wrong-line">✕ あなたの選択：${ps.sel.length?ps.sel.map(p=>POS5_LABEL[p]).join("・"):"（なし）"}</div>
      <div class="ok-line">正解：${[...correct].map(p=>POS5_LABEL[p]).join("・")}</div>`;
    body = `${confirmCardBody(w, wrongHtml)}
      <button class="btn-primary" data-pact="next">Next</button>`;
  }else{
    const btns = POS5.map(p=>{
      let cls="pos-toggle"+(ps.sel.includes(p)?" on":"");
      if(ps.checked){ if(correct.has(p)) cls+=" correct"; else if(ps.sel.includes(p)) cls+=" wrong"; }
      return `<button class="${cls}" data-pact="tog" data-p="${p}" ${ps.checked?"disabled":""}>${POS5_LABEL[p]}</button>`;
    }).join("");
    let footer;
    if(ps.checked){
      footer = `<div class="dict-result ${ps.ok?"ok":"ng"}">${ps.ok?"◎ 正解":"✕ 不正解"}</div>
        ${ps.ok?`<button class="btn-primary" data-pact="next">Next</button>`:`<button class="btn-primary" data-pact="check">Check</button>`}`;
    }else{
      footer = `<button class="btn-primary" data-pact="ans" ${ps.sel.length?"":"disabled"}>解答</button>`;
    }
    body = `<div class="word-display">${esc(w.w)}</div>
      <div class="hint" style="text-align:center">該当する品詞をすべて選択</div>
      <div class="pos-toggle-row">${btns}</div>
      ${footer}`;
  }
  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-pact="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${ps.pos+1} / ${ps.ids.length}</span>
      <span class="tag mode">品詞モード（判定なし）</span>
    </div>
    <div class="wcard">${body}</div>`;
  app.querySelectorAll("[data-pact]").forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); posHandle(el.dataset.pact, el); }; });
  app.querySelectorAll('[data-act="speak"]').forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); speak(w.w); }; });
}
function posHandle(act, el){
  const ps = state.posSession;
  if(!ps) return;
  const w = byId(ps.ids[ps.pos]);
  if(!w) return renderPosDone();   /* 【第4バッチ】最後の保険 */
  if(act==="exit"){ flushSave(); renderHome(); return; }
  if(act==="tog"){
    if(ps.checked) return;
    const p = el.dataset.p;
    const i = ps.sel.indexOf(p);
    if(i>=0) ps.sel.splice(i,1); else ps.sel.push(p);
    renderPosCard(); return;
  }
  if(act==="ans"){
    if(!ps.sel.length) return;
    const correct = correctPosSet(w);
    ps.checked = true;
    ps.ok = ps.sel.length===correct.size && ps.sel.every(p=>correct.has(p));
    scheduleSave(); renderPosCard(); speak(w.w); return;
  }
  if(act==="check"){ ps.confirming = true; scheduleSave(); renderPosCard(); return; }
  if(act==="next"){
    ps.pos++; ps.sel=[]; ps.checked=false; ps.ok=null; ps.confirming=false;
    scheduleSave(); renderPosCard(); return;
  }
}
function renderPosDone(){
  refClose();   /* 【P24】単語一覧を離れたら最下部の帯を戻す */
  state.posSession = null; saveState();
  app.innerHTML = `<div class="panel done-card"><div class="stamp">完了</div>
    <h2 style="font-family:var(--serif);font-size:1.1rem;margin-bottom:8px">品詞モードが終了</h2>
    <button class="btn-primary" id="homeBtn">ホームに戻る</button></div>`;
  document.getElementById("homeBtn").onclick = renderHome;
}

/* K-2：すべての進捗をリセット（進捗のみ初期化。settings と custom は保持） */
async function resetAllProgress(){
  state.words = {};
  state.log = {};
  state.activeSession = null;
  state.posSession = null;   /* 品詞モードの中断状態。消さないとリセット後も「続きから」が残り、記録の消えた続きを開くことになる */
  state.stamps = {};         /* 【総司令指示】ログイン日スタンプ。表示側から読まれないが書き込みは生きており、リセットでも消えずクラウド保存のたびに乗る死荷重になっていた */
  /* settings（newPerDay等）と custom（追加単語＝資産）は保持する */
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(_){}  /* ローカル明示初期化：backendSetはクラウド成功時にlocalStorageを書かないため、端末間での復活を防ぐ */
  clearPendingState();   /* 【P51】復旧待ちの退避も消す。消さないと「リセット→通信復旧→消したはずの進捗が戻る」が成立する。
                            位置は flushSave より【前】：まだ通信が回復していない場合は直後の flushSave が
                            リセット後の state で退避を書き直すため、リセットが退避側にも残る。 */
  dirty = true;
  try{ await flushSave(); }catch(_){}   /* クラウド(user_data)へ初期化後stateを即時反映 */
  location.reload();
}
/* 二重確認：1回目confirm→2回目に「リセット」入力必須 */
function confirmResetAllProgress(){
  if(!confirm("すべての学習進捗を消去します。元に戻せません。続けますか？")) return;
  const t = prompt('確認のため「リセット」と入力してください。');
  if(t !== "リセット"){ alert("入力が一致しないため中止しました。"); return; }
  resetAllProgress();
}
