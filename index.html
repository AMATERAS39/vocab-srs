            <input id="authCode" inputmode="numeric" autocomplete="one-time-code" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="6" placeholder="メールの6桁コード">
            <button class="send" id="authVerify">コードで確認してログイン</button>
          </div>
        </div>
        <div id="panePw" style="display:none">
          <div id="pwLoginForm">
            <input type="password" id="authPw" autocomplete="current-password" placeholder="パスワード">
            <button class="send" id="pwLoginBtn">パスワードでログイン</button>
            <div class="pwlinks">
              <button class="linkbtn" id="pwToSignup">新規登録</button>
              <button class="linkbtn" id="pwForgot">パスワードを忘れた</button>
            </div>
          </div>
          <div id="pwSignupForm" style="display:none">
            <input type="password" id="authPwNew" autocomplete="new-password" placeholder="新しいパスワード（8文字以上）">
            <button class="send" id="pwSignupBtn">登録する（確認メールが届きます）</button>
            <div class="pwlinks">
              <button class="linkbtn" id="pwToLogin">ログインに戻る</button>
            </div>
          </div>
        </div>
        <div class="msg" id="authMsg"></div>
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById("authClose").onclick = closeAuthModal;
  modal.addEventListener("click", (e)=>{ if(e.target === modal) closeAuthModal(); });

  document.getElementById("authGoogle").onclick = ()=> oauthLogin("google");
  document.getElementById("authSend").onclick   = emailLogin;
  const authVerifyBtn = document.getElementById("authVerify");
  if(authVerifyBtn) authVerifyBtn.onclick = submitOtpCode;
  const authCodeInput = document.getElementById("authCode");
  if(authCodeInput) authCodeInput.addEventListener("keydown", (e)=>{
    if(e.isComposing || e.keyCode === 229) return;   /* IME変換中は確定しない（副作用なしでreturn） */
    if(e.key === "Enter"){ e.preventDefault(); submitOtpCode(); }
  });

  /* --- C-P：方式タブ（コード/リンク ⇄ パスワード）と各サブフォーム --- */
  const paneCode = document.getElementById("paneCode");
  const panePw   = document.getElementById("panePw");
  const tabCode  = document.getElementById("tabCode");
  const tabPw    = document.getElementById("tabPw");
  const pwLoginForm  = document.getElementById("pwLoginForm");
  const pwSignupForm = document.getElementById("pwSignupForm");
  function clearAuthMsg(){ const m = document.getElementById("authMsg"); if(m){ m.textContent = ""; } }
  function showTab(which){
    const codeOn = (which === "code");
    tabCode.classList.toggle("active", codeOn);
    tabPw.classList.toggle("active", !codeOn);
    paneCode.style.display = codeOn ? "" : "none";
    panePw.style.display   = codeOn ? "none" : "";
    clearAuthMsg();
  }
  function showPwForm(which){
    const login = (which === "login");
    pwLoginForm.style.display  = login ? "" : "none";
    pwSignupForm.style.display = login ? "none" : "";
    clearAuthMsg();
  }
  tabCode.onclick = ()=> showTab("code");
  tabPw.onclick   = ()=> showTab("pw");
  document.getElementById("pwToSignup").onclick = ()=> showPwForm("signup");
  document.getElementById("pwToLogin").onclick  = ()=> showPwForm("login");
  document.getElementById("pwLoginBtn").onclick  = passwordLogin;
  document.getElementById("pwSignupBtn").onclick = passwordSignup;
  document.getElementById("pwForgot").onclick    = passwordForgot;
  const pwInput = document.getElementById("authPw");
  if(pwInput) pwInput.addEventListener("keydown", (e)=>{
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === "Enter"){ e.preventDefault(); passwordLogin(); }
  });
  const pwNewInput = document.getElementById("authPwNew");
  if(pwNewInput) pwNewInput.addEventListener("keydown", (e)=>{
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === "Enter"){ e.preventDefault(); passwordSignup(); }
  });
}
function openAuthModal(){
  if(!cloudConfigured()){ alert("クラウド保存は未設定です。SUPABASE_URL と SUPABASE_ANON_KEY を設定すると有効になります。"); return; }
  document.getElementById("authMsg").textContent = "";
  document.getElementById("authmodal").className = "";
}
function closeAuthModal(){ document.getElementById("authmodal").className = "auth-hidden"; }

function redirectTarget(){ return location.href.split("#")[0]; }

async function oauthLogin(provider){
  if(!sb) return;
  await sb.auth.signInWithOAuth({ provider, options:{ redirectTo: redirectTarget() } });
}
let otpEmail = "";
async function emailLogin(){
  if(!sb) return;
  const email = (document.getElementById("authEmail").value || "").trim();
  const msg = document.getElementById("authMsg");
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTarget(), shouldCreateUser: true } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = "送信に失敗しました：" + error.message; return; }
  otpEmail = email;
  const row = document.getElementById("authCodeRow");
  if(row) row.style.display = "";
  msg.style.color = "var(--midori)"; msg.textContent = "メールを送りました。届いたリンクを開くか、メール内の6桁コードを下に入力してください。";
}
/* メールの6桁コードを検証（マジックリンクと併用）。成功で true。 */
async function verifyOtpCode(email, code){
  if(!sb) return false;
  try{
    const r = await sb.auth.verifyOtp({ email, token: code, type: "email" });
    if(r && r.error) throw r.error;
    return true;
  }catch(_){ return false; }
}
async function submitOtpCode(){
  const msg = document.getElementById("authMsg");
  const code = (document.getElementById("authCode").value || "").trim();
  const email = otpEmail || (document.getElementById("authEmail").value || "").trim();
  if(!/^\d{6}$/.test(code)){ msg.style.color = "var(--shu)"; msg.textContent = "6桁の数字コードを入力してください。"; return; }
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "先にメールアドレスを入力し、確認メールを送ってください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "確認中…";
  const ok = await verifyOtpCode(email, code);
  if(ok){ msg.style.color = "var(--midori)"; msg.textContent = "ログインしました。"; closeAuthModal(); }
  else{ msg.style.color = "var(--shu)"; msg.textContent = "コードが正しくないか、期限切れです。もう一度お試しください。"; }
}
/* ==== C-P：メール＋パスワード認証（既存のGoogle/コード方式に併用追加） ==== */
/* Supabaseの英語エラーを日本語に寄せる（未知はそのまま添える） */
function jaAuthError(err){
  const m = (err && err.message) ? String(err.message) : "";
  if(/Invalid login credentials/i.test(m)) return "メールアドレスかパスワードが正しくありません。";
  if(/Email not confirmed/i.test(m)) return "メール確認が未完了です。確認メールのリンクを開いてください。";
  if(/User already registered/i.test(m)) return "このメールアドレスは登録済みです。ログインするか、パスワードをお忘れの場合は再設定してください。";
  if(/Password should be at least/i.test(m)) return "パスワードが短すぎます。8文字以上にしてください。";
  if(/rate limit|too many/i.test(m)) return "回数制限に達しました。しばらく待ってから再度お試しください。";
  return "うまくいきませんでした：" + m;
}
async function passwordLogin(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  const pw = document.getElementById("authPw").value || "";
  if(!email || !pw){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスとパスワードを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "ログイン中…";
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "ログインしました。"; closeAuthModal();
  /* 以降は既存の onAuthStateChange → syncOnAuthChange → maybeMigrateOnLogin に自動で乗る（C-3不変） */
}
async function passwordSignup(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  const pw = document.getElementById("authPwNew").value || "";
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  if(pw.length < 8){ msg.style.color = "var(--shu)"; msg.textContent = "パスワードは8文字以上にしてください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "登録中…";
  const { error } = await sb.auth.signUp({ email, password: pw, options:{ emailRedirectTo: redirectTarget() } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "確認メールを送りました。メール内のリンクで確認するとログインできます。";
}
async function passwordForgot(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してから「パスワードを忘れた」を押してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectTarget() });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "パスワード再設定用のメールを送りました。メール内のリンクを開いてください。";
}
/* P-4：リセットリンクで戻ってきたときの新パスワード入力UI */
function ensurePwResetDom(){
  if(document.getElementById("pwresetmodal")) return;
  const style = document.createElement("style");
  style.textContent = `
    #pwresetmodal{position:fixed;inset:0;z-index:70;background:rgba(31,44,56,.45);
      display:flex;align-items:center;justify-content:center;padding:16px}
    #pwresetmodal.pr-hidden{display:none}
    #pwresetmodal .card{background:var(--card);border:1px solid var(--line);border-radius:12px;width:100%;max-width:340px;padding:22px 20px}
    #pwresetmodal h3{font-family:var(--serif);font-size:1.05rem;margin-bottom:4px}
    #pwresetmodal p.sub{font-size:.74rem;color:var(--sub);margin-bottom:16px}
    #pwresetmodal input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-size:.9rem;margin-bottom:9px;font-family:var(--sans)}
    #pwresetmodal .send{width:100%;padding:11px;border-radius:8px;background:var(--ink);color:#fff;font-weight:700;font-size:.9rem}
    #pwresetmodal .msg{font-size:.74rem;color:var(--midori);margin-top:10px;min-height:1em}
  `;
  document.head.appendChild(style);
  const modal = document.createElement("div");
  modal.id = "pwresetmodal";
  modal.innerHTML = `
    <div class="card">
      <h3>新しいパスワードの設定</h3>
      <p class="sub">再設定リンクから開きました。新しいパスワードを入力してください。</p>
      <input type="password" id="pwResetInput" autocomplete="new-password" placeholder="新しいパスワード（8文字以上）">
      <button class="send" id="pwResetBtn">パスワードを更新する</button>
      <div class="msg" id="pwResetMsg"></div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById("pwResetBtn").onclick = submitPwReset;
  const inp = document.getElementById("pwResetInput");
  inp.addEventListener("keydown", (e)=>{
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === "Enter"){ e.preventDefault(); submitPwReset(); }
  });
}
function openPwResetModal(){ ensurePwResetDom(); const m = document.getElementById("pwresetmodal"); if(m) m.classList.remove("pr-hidden"); }
async function submitPwReset(){
  if(!sb) return;
  const msg = document.getElementById("pwResetMsg");
  const pw = document.getElementById("pwResetInput").value || "";
  if(pw.length < 8){ msg.style.color = "var(--shu)"; msg.textContent = "パスワードは8文字以上にしてください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "更新中…";
  const { error } = await sb.auth.updateUser({ password: pw });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "パスワードを更新しました。ログインします…";
  setTimeout(()=>{ location.reload(); }, 900);   /* 更新後は通常ログインとして進める（reloadでIS_RECOVERYが解け、以降はC-3が通常どおり働く） */
}
async function doLogout(){
  clearLastUid();                 /* C-3：ログアウトで記録を消し、再ログイン時に再度確認できるようにする */
  if(sb) await sb.auth.signOut();
}
/* ログイン／ログアウト時：未ログイン中の進捗をアカウントへ統合 → 読み直して再描画 */
async function syncOnAuthChange(){
  const merged = await maybeMigrateOnLogin();
  state = { settings:{ newPerDay:30, rate:0.95, difficulty:1 }, words:{}, log:{}, custom:[], activeSession:null };
  await loadState();
  if(merged){ state = merged; scheduleSave(); }   /* (A-safe) 統合結果を確実に反映し、失敗時も次回saveでクラウドへ */
  renderHome();
}

/* ---- 起動 ---- */
(async ()=>{
  await initSupabase();
  let merged = null;
  if(!IS_RECOVERY) merged = await maybeMigrateOnLogin();   /* C-3：id変化時だけ確認（リセット到来時は出さない）／統合結果を受け取る */
  await loadSharedWords();
  ensureAuthDom();
  await loadState();
  if(merged){ state = merged; scheduleSave(); }  /* (A-safe) 統合結果を確実に反映し、失敗時も次回saveでクラウドへ */
  renderHome();
  startUpdateWatcher();           // 新バージョン公開の監視を開始
  if(IS_RECOVERY) openPwResetModal();   /* P-4：リセットリンク到来時は新PW入力UIを出す（イベント取りこぼしの保険） */
})();
</script>
