<style>
:root{
  --paper:#EDF0F2;
  --card:#FFFFFF;
  --ink:#1F2C38;
  --sub:#5D6B76;
  --shu:#C8452C;      /* 朱色：赤シート・強調 */
  --shu-soft:#F6E2DD;
  --midori:#2F7D5B;   /* 定着・正解 */
  --line:#D5DBE0;
  --serif:"Shippori Mincho","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
/* B-1：ゴムバンド／連鎖スクロールの抑止（通常のスクロールは阻害しない。高さ固定は行わない） */
/* 【P25】overscroll-behavior:none を全画面に掛けると、ホームのように
   「画面より少しだけ長い」ページ（実測：画面844px／ページ956px＝はみ出し112px）で
   iOS Safari のスクロールが弾かれ、最下部まで辿り着けない（オーナー実機報告）。
   共通規約（§4.4／P10）の趣旨は「引っ張りバウンドの抑止」であり、それが要るのは
   単語一覧のような長大なスクロール画面のみ。そこに限定して適用する。
   ★:has() は iOS Safari の対応が不確実なため使わない。html にも直接クラスを付ける。
   ★このクラスは P24（帯の非表示）とは【別物】にする。1つのフラグに2つの役割を
     兼務させると、片方の都合がもう片方を壊す（統合指示書 地雷#15 と同型）。 */
html,body{overscroll-behavior:auto}
html.noBounce,body.noBounce{overscroll-behavior:none}
/* 【P19】起動演出。アイコンの円を画面中央にフェードイン→保持→フェードアウト（約3秒）。
   ・アプリの初期化とは独立（演出のために起動は遅くならない）
   ・タップでスキップ可
   ・初期化が失敗しても、安全弁のタイマーで必ず消える（操作不能事故の防止） */
#splash{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
  background:var(--paper);animation:splashFade 3s ease forwards}
#splash img{width:min(46vw,190px);height:auto;border-radius:50%;animation:splashPop 3s ease forwards}
@keyframes splashFade{0%{opacity:0}18%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
@keyframes splashPop{0%{transform:scale(.86)}20%{transform:scale(1)}100%{transform:scale(1.05)}}
/* 【P19】未ログイン時の入口画面。アプリ説明を【常設】する（時間でも画面遷移でも消さない）。
   分岐はログイン状態のみで行う。時間による自動非表示は隠しテキスト判定のリスクがあるため禁止。 */
#landing{padding-top:6vh}
#landing h1{font-family:var(--serif);font-size:1.7rem;letter-spacing:.06em;border:none;margin-bottom:2px;text-align:center}
#landing .lead{font-family:var(--serif);font-size:.86rem;color:var(--shu);letter-spacing:.16em;text-align:center;margin-bottom:22px}
#landing .desc p{font-size:.86rem;line-height:1.95;color:var(--ink);margin-bottom:12px}
#landing .desc a{color:var(--shu)}
#landing .acts{margin:22px 0 6px}
#landing .acts .btn-ghost{margin-top:9px}
/* 【P18】未ログイン時のお問い合わせ案内。匿名投稿は submitted_by が null になり、
   開発者が返信を届けられない（返信・既読の通知も受け取れない）ため、送信前にログインを促す。 */
.fb-login-note{background:var(--paper);border:1px solid var(--shu);border-radius:9px;padding:12px 14px;margin-bottom:12px}
/* 【P26】PWA（ホーム画面に追加）への案内。
   iOS Safari では、スクロール時にアドレスバー／ツールバーが伸縮してビューポートの高さが変わり、
   再描画が追いつかず「帯状の塗り残し」「スクロール位置の補正」「引っかかり」が起きる
   （オーナーの実機で、PWAでは同症状が出ないことを確認済み。OS側の描画のためCSSでは解消できない）。
   ホーム画面に追加すればアドレスバーが無くなり、症状が出ない。すでにPWAで使っている人には出さない。 */
.pwa-note{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:14px}
.pwa-note .t{font-weight:700;color:var(--ink);font-size:.88rem;margin-bottom:5px}
.pwa-note .d{font-size:.8rem;color:var(--sub);line-height:1.75}
.pwa-note .d b{color:var(--shu)}
.fb-login-note .t{font-weight:700;color:var(--shu);font-size:.88rem;margin-bottom:5px}
.fb-login-note .d{font-size:.8rem;color:var(--sub);line-height:1.7;margin-bottom:10px}
/* 【P17】起動時の初期表示（SEO用の静的本文）を、ローディング画面として自然に見せる。
   JS起動時に render() が innerHTML で上書きするため、この見た目は一瞬しか出ない。
   画面外へ飛ばす（隠しテキスト）手法は、クローキング扱いのリスクがあるため採らない。 */
#boot{text-align:center;padding:22vh 20px 0}
#boot h1{font-family:var(--serif);font-size:2rem;font-weight:700;letter-spacing:.14em;color:var(--ink);border:none;margin-bottom:6px}
#boot .boot-sub{font-family:var(--serif);font-size:.86rem;color:var(--shu);letter-spacing:.18em;margin-bottom:26px}
#boot .boot-load{font-size:.8rem;color:var(--sub);letter-spacing:.1em}
#boot .boot-seo{margin-top:34px;font-size:.74rem;line-height:1.8;color:var(--sub);opacity:.62;text-align:left;max-width:420px;margin-left:auto;margin-right:auto}
#boot .boot-seo a{color:var(--sub)}
/* 【WP17】ブラウザ純正のスクロールバーを隠す。単語一覧に自前のスクロールバーを置いたため、
   純正のものと二重に見えてしまう。スクロール機能そのものは一切変わらない（見た目だけを消す）。 */
html{scrollbar-width:none;-ms-overflow-style:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none}
/* A-2：ダブルタップ拡大の抑止（ピンチ拡大は残す＝弱視ユーザーの拡大手段を奪わない） */
body{touch-action:manipulation}
/* A-1 安全網：class無しの入力欄が body の clamp(13px…) を継承して16px未満になるのを防ぐ。
   要素セレクタ（詳細度0,0,1）なので、.dict-row input（1.05rem=16.8px）等の既存指定は上書きしない。 */
input,select,textarea{font-size:16px}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.65;min-height:100vh}
.wrap{max-width:580px;margin:0 auto;padding:calc(env(safe-area-inset-top, 0px) + 28px) 16px calc(env(safe-area-inset-bottom, 0px) + 8px)}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---------- ヘッダー ---------- */
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid var(--ink);padding-bottom:10px}
header h1{font-family:var(--serif);font-size:1.25rem;font-weight:700;letter-spacing:.06em}
.date-line{font-size:.78rem;color:var(--sub)}
.streak{font-size:.78rem;color:var(--shu);font-weight:700}

/* ---------- ホーム ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.queue-row{display:flex;gap:12px;margin:12px 0 16px}
.queue-box{flex:1;text-align:center;padding:12px 6px;border:1px solid var(--line);border-radius:8px}
.queue-box .num{font-family:var(--serif);font-size:1.9rem;font-weight:700;line-height:1.2}
.queue-box .lbl{font-size:.72rem;color:var(--sub)}
.queue-box.review .num{color:var(--shu)}
.btn-primary{display:block;width:100%;padding:14px;background:var(--ink);color:#fff;border-radius:8px;font-size:1rem;font-weight:700;letter-spacing:.08em}
.btn-primary:disabled{background:var(--line);color:var(--sub);cursor:default}
.panel h2{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:10px;letter-spacing:.05em}
.lv-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.8rem}
.lv-tab{width:52px;flex:none;text-align:center;color:#fff;border-radius:4px;padding:2px 0;font-weight:700;font-size:.72rem}
.bar{flex:1;height:10px;background:var(--paper);border-radius:5px;overflow:hidden;position:relative}
.bar .fill-learn{position:absolute;left:0;top:0;bottom:0;background:var(--shu);opacity:.45}
.bar .fill-master{position:absolute;left:0;top:0;bottom:0;background:var(--midori)}
.lv-cnt{width:86px;flex:none;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
.legend{font-size:.7rem;color:var(--sub);margin-top:6px}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin:0 3px 0 10px;vertical-align:middle}
details.panel{padding:0}
details.panel summary{padding:14px 18px;font-family:var(--serif);font-weight:700;font-size:.95rem;cursor:pointer;list-style:none}
details.panel summary::before{content:"▸ ";color:var(--shu)}
details.panel[open] summary::before{content:"▾ "}
details.panel .inner{padding:0 18px 18px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;font-size:.85rem}
/* A-1：iOS Safari のフォーカス拡大防止（16px以上）。type=text も含める（setNick対策）。行高増はpaddingで吸収 */
.setting-row select,.setting-row input[type=number],.setting-row input[type=text]{font-family:var(--sans);padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:16px;background:#fff}
/* 【P21】設定行のはみ出し修正。.setting-row は display:flex だが、ラベル（span）に
   縮小の下限が無く、入力欄が広いと（16px化の影響）ラベルが1文字ずつ折り返されて縦に見える。
   ラベルに最小幅を与え、入らない場合は入力欄を次の行に送る。 */
.setting-row{flex-wrap:wrap}
.setting-row>span{flex:1 1 auto;min-width:8.5em}
.setting-row input[type=text]{flex:0 1 170px;min-width:130px;max-width:100%}
.setting-row input[type=number]{flex:0 0 84px}
.setting-row select{flex:0 1 auto;max-width:62%}
textarea{width:100%;min-height:130px;border:1px solid var(--line);border-radius:6px;padding:8px;font-size:16px;font-family:ui-monospace,monospace;background:#fff;color:var(--ink)}
.btn-sub{padding:8px 14px;border:1px solid var(--ink);border-radius:6px;font-size:.82rem;font-weight:500;margin:8px 8px 0 0;background:#fff}
.cal-streaks{display:flex;gap:10px;margin-bottom:14px}
.cal-streak-box{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center}
.cal-streak-box .num{font-family:var(--serif);font-size:1.5rem;font-weight:700;color:var(--shu)}
.cal-streak-box .lbl{font-size:.72rem;color:var(--sub);margin-top:2px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-family:var(--serif);font-weight:700;font-size:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{margin-bottom:4px}
.cal-dowcell{text-align:center;font-size:.72rem;color:var(--sub);padding:2px 0}
.cal-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.82rem;color:var(--ink);background:var(--card);border:1px solid var(--line)}
.cal-cell.cal-empty{background:transparent;border:none}
.cal-cell.cal-stamp{background:var(--midori);color:#fff;font-weight:700;border-color:var(--midori)}
.cal-cell.cal-today{outline:2px solid var(--shu);outline-offset:-2px;font-weight:700}
.sub-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
.sub-row:last-child{border-bottom:none}
.sub-word{font-weight:600;color:var(--ink);word-break:break-word}
.sub-badge{flex:none;font-size:.72rem;font-weight:700;border-radius:4px;padding:2px 8px;line-height:1.5}
.sub-badge.sub-wait{color:var(--sub);border:1.5px solid var(--sub)}
.sub-badge.sub-ok{color:#fff;background:var(--midori);border:1.5px solid var(--midori)}
.sub-badge.sub-ng{color:#fff;background:var(--shu);border:1.5px solid var(--shu)}
.notice-item{padding:10px 0;border-bottom:1px solid var(--line)}
.notice-item:last-child{border-bottom:none}
.notice-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.notice-title{font-weight:700;color:var(--ink);word-break:break-word}
.notice-date{flex:none;font-size:.72rem;color:var(--sub)}
.notice-body{margin-top:4px;font-size:.86rem;line-height:1.7;color:var(--ink);word-break:break-word}
.msg{font-size:.78rem;margin-top:8px;color:var(--midori)}
.msg.err{color:var(--shu)}
.warn-banner{background:var(--shu-soft);border:1px solid var(--shu);color:var(--shu);border-radius:8px;padding:10px 12px;font-size:.78rem;margin-bottom:14px;line-height:1.6}
.save-badge{font-size:.68rem;color:var(--sub)}
.save-badge.err{color:var(--shu);font-weight:700}
/* 【P55】固定表示。右下は #updateFloat と .to-top が占有済みのため左下に置く。
   pointer-events:none ＝タップは必ず素通りする（出題カードの操作を条件ではなく性質で妨げない）。
   position:fixed なのでレイアウトを押し下げない。sticky と座標計算は使わない（地雷#16・#17）。 */
#saveBadge{position:fixed;left:12px;bottom:calc(12px + env(safe-area-inset-bottom, 0px));z-index:45;
  pointer-events:none;max-width:min(78vw,360px);padding:6px 10px;border-radius:999px;
  background:rgba(255,255,255,.94);border:1px solid var(--line);box-shadow:0 2px 8px rgba(0,0,0,.12);
  line-height:1.4}
#saveBadge[hidden]{display:none}
code{background:var(--paper);padding:1px 5px;border-radius:4px;font-size:.78rem}
.note{font-size:.76rem;color:var(--sub);line-height:1.7}
.pw-card{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,#fff, #FAFBFC)}
.pw-card .pw-head{display:flex;align-items:center;gap:7px;font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.pw-card .pw-field{display:flex;gap:8px;align-items:stretch}
.pw-card input[type=password]{flex:1;min-width:0;font-family:var(--sans);padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:16px;background:#fff}
.pw-card input[type=password]:focus{outline:none;border-color:var(--shu);box-shadow:0 0 0 2px var(--shu-soft)}
.pw-card .pw-btn{white-space:nowrap;padding:9px 16px;border:none;border-radius:8px;background:var(--shu);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer}
.pw-card .pw-btn:active{opacity:.85}
.pw-card .msg{margin-top:8px}

/* ---------- 学習カード（単語カード風） ---------- */
.session-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.8rem;color:var(--sub)}
.progress-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:18px}
.progress-track .p{height:100%;background:var(--ink);transition:width .25s ease}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 22px 22px;position:relative;box-shadow:0 2px 10px rgba(31,44,56,.06)}
.card-meta{display:flex;justify-content:flex-end;gap:8px;align-items:center;margin-bottom:8px}
.diff-stars{display:inline-flex;align-items:center}
.stars-svg{height:15px;width:75px}
.star-fill{fill:var(--shu)}
.star-empty{fill:none;stroke:var(--line);stroke-width:1.2}
.tag{font-size:.68rem;font-weight:700;color:#fff;border-radius:4px;padding:2px 8px}
.tag.mode{background:var(--sub)}
.word-display{font-family:var(--serif);font-size:2.3rem;font-weight:700;text-align:center;margin:16px 0 6px;letter-spacing:.02em;word-break:break-word}
.hint{font-size:.78rem;color:var(--sub);text-align:center;margin-bottom:14px}
.hint strong{color:var(--shu)}
.audio-btn{display:block;margin:0 auto 14px;padding:10px 26px;border:1.5px solid var(--ink);border-radius:24px;font-size:.9rem;font-weight:700;background:#fff}
.dict-row{display:flex;gap:8px;margin:0 0 14px}
.dict-row input{flex:1;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:1.05rem;font-family:var(--serif)}
.dict-row .btn-sub{margin:0}
.dict-result{text-align:center;font-weight:700;margin-bottom:10px;font-size:1.0rem;padding:8px 10px;border-radius:8px}
.dict-result.ok{color:var(--midori);background:rgba(47,125,91,.12)}
.dict-result.ng{color:var(--shu);background:rgba(200,69,44,.12)}
.dict-result .sub-line{font-size:.82rem;font-weight:500;margin-top:4px}
.dict-row input.ok{border-color:var(--midori);background:rgba(47,125,91,.08)}
.dict-row input.ng{border-color:var(--shu);background:rgba(200,69,44,.08)}
.prompt-zone{border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.prompt-zone .meaning{font-size:.9rem}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 12px}
.choice-btn{padding:12px 6px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--serif);font-size:1rem;font-weight:700;background:#fff;word-break:break-word}
.choice-btn:disabled{opacity:.75;cursor:default}
.choice-btn.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1}
.choice-btn.wrong{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
.blank-block{margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--line)}
.blank-slot{color:var(--shu);font-weight:700}
.pat-prompt{font-family:var(--serif);font-weight:700;font-size:1.05rem;color:var(--ink)}
.opt-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;margin-left:4px}
.opt-btn{text-align:left;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:.86rem;line-height:1.4}
.opt-btn.picked{border-color:var(--ink);background:var(--paper)}
.opt-btn.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1}
.opt-btn.wrong{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
.opt-btn:disabled{cursor:default}
.opt-num{display:inline-block;min-width:1.4em;font-weight:700;color:var(--sub);margin-right:6px}
.blank-block.confirmed .blank-slot{color:var(--midori)}
.blank-block.correct .blank-slot{color:var(--midori)}
.blank-block.wrong   .blank-slot{color:var(--shu)}
.choice-hint{font-size:.72rem;color:var(--sub);text-align:center;margin-bottom:8px}
/* ==== バッチJ：解説は独立画面。Nextは右下、選択式解説には見出し語を小さく添える ==== */
.reveal-next{display:flex;justify-content:flex-end;margin-top:12px}
.reveal-next .btn-primary{width:auto;display:inline-block;padding:12px 30px}
.explain-word{font-size:1.05rem;font-weight:700;color:var(--sub);text-align:center;margin-bottom:6px;font-family:var(--serif)}
.btn-ghost{display:block;width:100%;padding:12px;border:1.5px solid var(--ink);border-radius:8px;font-size:.95rem;font-weight:700;background:#fff;margin-top:10px}
/* 単語一覧 */
/* 【P24】単語一覧の外側パネルは、背景・枠線・角丸を描かない。
   理由：3,932枚のカードを収めるため #refPanel の高さは約60万px（画面723個ぶん）に達する。
   .panel の既定は background:var(--card)（純白）＋border＋border-radius であり、
   iOS Safari はこの巨大な白い矩形を描画しきれず、一部が「白い帯」として画面に残る
   （オーナーの実機報告・写真で確認。カードの白と同色のため背景の一部に見える）。
   この背景と枠線は、中の .ref-item（1枚ずつ白いカード）に完全に隠れており、
   もともと利用者には一切見えていない。描画から外しても見た目は1pxも変わらない。 */
#refPanel{background:transparent;border:none;border-radius:0}
.ref-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ref-controls select,.ref-controls input{font-family:var(--sans);padding:6px 9px;border:1px solid var(--line);border-radius:6px;font-size:16px;background:#fff;flex:1;min-width:120px}
.ref-count{font-size:.76rem;color:var(--sub);margin-bottom:10px}
.ref-item{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:8px}
/* 【WP17】単語一覧：左端＝目次バー（読み順のみ）、右端＝スクロールバー（全並び順）、右下＝最上部ボタン。
   ★position:sticky は使わない。見出しを sticky にすると、通り過ぎた見出しが全部 top:0 に貼り付き、
     getBoundingClientRect().top が 0 を返して「下から上へ飛べない」不具合になる（実機で発生・再現済み）。
     位置計算も rect ではなく offsetTop（文書基準・貼り付きの影響を受けない）を使う。 */
.ref-sec{background:var(--paper);border-bottom:2px solid var(--shu);font-family:var(--serif);font-weight:700;font-size:19px;color:var(--shu);padding:4px 2px;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.08em}
.idx-bar{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;width:26px;padding:6px 0;background:rgba(255,255,255,.9);border:1px solid var(--line);border-left:none;border-radius:0 9px 9px 0;touch-action:none;-webkit-user-select:none;user-select:none;box-shadow:1px 0 6px rgba(0,0,0,.06)}
.idx-bar span{display:block;font-size:10px;line-height:1.2;font-weight:700;color:var(--sub);text-transform:uppercase;padding:0 5px;pointer-events:none}
.scrub{position:fixed;right:0;top:16%;bottom:16%;width:30px;z-index:40;touch-action:none;-webkit-user-select:none;user-select:none}
.scrub-track{position:absolute;right:12px;top:0;bottom:0;width:4px;border-radius:2px;background:var(--line)}
.scrub-thumb{position:absolute;right:5px;top:0;width:18px;height:46px;border-radius:9px;background:var(--sub);border:2px solid var(--card);box-shadow:0 1px 5px rgba(0,0,0,.18)}
.scrub.on .scrub-thumb{background:var(--shu)}
.idx-bubble{position:fixed;left:50%;transform:translateX(-50%);top:38%;z-index:41;display:none;min-width:64px;text-align:center;padding:10px 16px;border-radius:12px;background:var(--ink);color:#fff;font-family:var(--serif);font-weight:700;font-size:30px;text-transform:uppercase;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.to-top{position:fixed;right:38px;bottom:calc(env(safe-area-inset-bottom, 0px) + 68px);z-index:60;display:none;width:44px;height:44px;padding:0;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:16px;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.16)}
.ref-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.ref-word{font-family:var(--serif);font-size:1.3rem;font-weight:700}
.ref-lv{font-size:.66rem;font-weight:700;color:#fff;border-radius:4px;padding:1px 6px}
.ref-status{font-size:.66rem;margin-left:auto;padding:1px 7px;border-radius:10px}
.ref-status.m{background:#EDF5F1;color:var(--midori)}
.ref-status.l{background:var(--shu-soft);color:var(--shu)}
.ref-status.n{background:var(--paper);color:var(--sub)}
.ref-play{border:1px solid var(--line);border-radius:6px;padding:2px 9px;font-size:.78rem;background:#fff}
.ref-core{font-size:.76rem;color:var(--sub);border-left:3px solid var(--shu);padding:3px 8px;margin:6px 0}
.ref-ent{display:flex;gap:8px;margin-bottom:3px;align-items:flex-start}
.ref-ent .pos-badge{align-self:flex-start;margin-top:2px}
.ref-ent .meaning{flex:1}
.acc-tag{font-size:.68rem;color:var(--sub);background:var(--paper);border-radius:10px;padding:1px 8px}
.acc-line{text-align:center;font-size:.78rem;color:var(--sub);margin-bottom:8px}
.ref-acc{font-size:.7rem;margin-left:6px;padding:1px 7px;border-radius:10px;background:var(--paper);color:var(--sub)}
.ref-acc.low{background:var(--shu-soft);color:var(--shu);font-weight:700}

/* 赤シート */
.answer-zone{position:relative;border-top:1px dashed var(--line);padding-top:14px;min-height:120px}
.entry{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.pos-badge{flex:none;align-self:flex-start;display:inline-block;min-width:2.8em;text-align:center;font-size:.72rem;font-weight:700;line-height:1.5;color:var(--shu);border:1.5px solid var(--shu);border-radius:4px;padding:1px 6px;margin-top:2px}
.entry .meaning{flex:1}
.meaning{font-size:1rem;font-weight:500}
.core-line{font-size:.82rem;background:var(--paper);border-left:3px solid var(--shu);padding:7px 10px;border-radius:0 6px 6px 0;margin-bottom:12px;line-height:1.6}
.core-label{font-weight:700;color:var(--shu);margin-right:8px;font-size:.7rem;letter-spacing:.1em}

/* ---------- 完了 ---------- */
.done-card{text-align:center;padding:36px 20px}
.done-card .stamp{width:88px;height:88px;border:3px solid var(--shu);border-radius:50%;color:var(--shu);
  font-family:var(--serif);font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  transform:rotate(-8deg);font-size:1.15rem;letter-spacing:.1em}

/* ==== 追加UI・レイアウト圧縮 ==== */
html,body{height:100%}
body{font-size:clamp(13px,1.9vh,16px)}

/* 【P24】単語一覧では、ページ最下部の帯（©表示）を消す。
   #app が約60万pxの高さになるため、iOS Safari が下端の要素を再描画しきれず、
   白い帯がスクロール中に画面へ貼りついたまま残る（＝残像）現象が起きる。
   その帯に ▲ボタンが埋もれて押せなくなっていた（オーナーの実機報告・写真で確認）。
   発生源そのものを消し、あわせて ▲ボタンを z-index:60 / bottom:68px へ逃がして二重に防ぐ。 */
body.ref-open .copyright-wrap{display:none}
.copyright{font-size:.62rem;color:var(--sub);opacity:.75}
.version-tag{font-size:.62rem;color:var(--sub);opacity:.75}
.menu-btn{position:relative;background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:0}
/* 赤ドット（様式D：小さな円のみ・数字なし・--shu）。.update-dot と同トーン・同サイズ */
.notif-dot{display:none;position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--shu);border:1.5px solid var(--card)}
.menu-drop button{position:relative}
.menu-drop button .notif-dot{top:8px;right:10px}
/* 追加2：画面に依存しないフローティング更新ボタン（#updateBtn はホームにしか無いため）。
   更新を検知している間だけ表示する。クイズの操作ボタンと重ならないよう右下・safe-area考慮。 */
#updateFloat{display:none;position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom,0px));
  z-index:1200;align-items:center;gap:6px;padding:10px 14px;border-radius:999px;
  background:var(--ink);color:#fff;border:none;font-size:.82rem;font-weight:700;
  box-shadow:0 3px 12px rgba(0,0,0,.25);cursor:pointer}
.update-ico{position:relative;background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:0;margin-right:6px}
.update-svg{width:20px;height:20px;fill:var(--ink)}
.update-dot{display:none;position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--shu);border:1.5px solid var(--card)}
.menu-svg{width:19px;height:19px;fill:var(--ink);display:block}
.menu-drop{display:none;position:absolute;top:110%;right:0;background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:0 4px 14px rgba(0,0,0,.12);z-index:50;min-width:150px;overflow:hidden}
.menu-drop.open{display:block}
.menu-drop button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 14px;font-size:.9rem;cursor:pointer}
.menu-drop button:hover{background:var(--paper)}
.quote-line{font-size:.74rem;color:var(--sub);margin-top:2px;font-style:italic}
.wrong-line{color:var(--shu);font-size:.85rem;font-weight:700;margin:2px 0;text-align:center}
.ok-line{color:var(--midori);font-size:.85rem;font-weight:700;margin:2px 0;text-align:center}
.acc-gauge{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin:4px 0}
.acc-gauge .g{height:100%;border-radius:3px}
.pos-toggle-row{display:flex;flex-wrap:nowrap;gap:6px;justify-content:center;margin:12px 0}
.pos-toggle{flex:1 1 0;min-width:0;padding:10px 4px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);font-size:clamp(.72rem,2.4vw,.92rem);cursor:pointer;text-align:center;white-space:nowrap}
.pos-toggle.on{border-color:var(--shu);color:var(--shu);font-weight:700;background:#FBF1EE}
.pos-toggle.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1;font-weight:700}
.pos-toggle.wrong{border-color:var(--shu);color:var(--shu);background:#FBEAE6;text-decoration:line-through}
.ref-status.s{background:#EFEBE3;color:#8B8375}
.about h2{margin-top:14px}
.about-svg{width:100%;max-width:400px;display:block;margin:4px auto}
.screen-svg{width:100%;max-width:320px;display:block;margin:6px auto;border:1px solid var(--line);border-radius:12px;overflow:hidden}

.scr-bg{fill:var(--paper)}

/* ==== ヘッダー1行化・アイコン ==== */

/* ==== 画面遷移のちらつき軽減 ==== */
/* 【P24】#app の背景は body と同じ var(--paper) の二重指定であり、完全に無駄。
   ところが単語一覧では #app の高さが約60万px（画面720個ぶん）に達するため、
   iOS Safari に「60万pxの色付き矩形」を描かせることになり、描画が破綻して
   帯状の塗り残しが画面に現れる（オーナーの実機報告）。スクロールの引っかかりも
   同じ負荷に由来すると考えられる（推測・断定はしない）。

#app{background:transparent}
.wcard{background:var(--card);will-change:contents}
.word-display{contain:paint}

.ab-frame{fill:var(--paper);stroke:var(--line);stroke-width:1.5}

/* ==== 説明のスクリーンショット ==== */
.shot{margin:8px 0 4px;text-align:center}
.shot img{width:100%;max-width:300px;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.shot figcaption{font-size:.7rem;color:var(--sub);margin-top:4px}
.inbox-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:10px 0}

#fbFile{display:block;margin:8px 0}

<body>
<div id="splash"><img src="icon-512.webp" alt="AMATERAS"></div>
<div class="wrap" id="app">
  <!-- 【P19】起動時の初期表示 兼 検索エンジン向けの静的な本文。
       JS起動後、未ログインなら renderLanding() が同じ説明文を【常設】で描き直す。
       ログイン済みならアプリ画面に切り替わり、説明文は自然に表示されない。
       時間による自動非表示は行わない（隠しテキスト＝クローキング判定を避けるため）。 -->
  <div id="landing">
    <h1>AMATERAS</h1>
    <div class="lead">英単語学習アプリ</div>
    <div class="desc">
      <p>間隔反復（SRS）で効率よく覚える、無料の英単語学習アプリです。大学受験レベルの英単語3,932語を収録し、選択式と記述式の2系統で出題します。両方に合格して初めて「定着」と判定するため、見覚えがあるだけの状態を防げます。</p>
      <p>語源による解説と、品詞ごとに整理された意味表示で、単語を体系的に覚えられます。学習の進捗はアカウントごとにクラウド保存され、スマートフォンとパソコンのどちらからでも続きから学習できます。インストール不要、ブラウザだけで使えます。</p>
      <p>古文単語版の <a href="/tsukuyomi/">TSUKUYOMI（古文単語アプリ）</a> もあります。</p>
    </div>
  </div>
</div>
<!-- 【P55】保存状態の常設表示。#app（innerHTML で丸ごと書き換わる）の【外】に置くため、
     どの画面へ移っても消えない。正常時は hidden で、通常の利用者には何も見えない。 -->
<div id="saveBadge" class="save-badge" hidden></div>
<div class="copyright-wrap"><span class="version-tag" id="versionTag"></span><span class="copyright">©2026 AMATERAS</span></div>

<script>
/* 【P19】起動演出の安全弁。本体スクリプトより前に置くため、本体が失敗しても必ず消える。 */
(function(){
  var s = document.getElementById("splash");
  if(!s) return;
  var kill = function(){ if(s && s.parentNode){ s.parentNode.removeChild(s); s = null; } };
  s.addEventListener("click", kill);
  s.addEventListener("touchstart", kill, {passive:true});
  setTimeout(kill, 3100);
})();
</script>

<script>
/* =========================================================
   単語データ（サンプル200語・頻度順・レベル1〜5）
   形式: {i:通し番号, w:単語, l:レベル(1基本〜5難関), e:[[品詞,"意味1；意味2"],...]}
   レベル1〜2は「全品詞・全語義の再生」で合格判定する運用
========================================================= */
const BUILTIN = [
/* ---- Level 1: 多品詞・基本語 ---- */
{i:1,w:"increase",l:1,c:"in-(上へ)+crescere(育つ)→「積み上がって大きくなる」",e:[["自動",["増える"]],["他動",["〜を増やす"]],["名",["増加"]]]},
{i:2,w:"decrease",l:1,c:"de-(下へ)+crescere(育つ)→「削られて小さくなる」",e:[["自動",["減る"]],["他動",["〜を減らす"]],["名",["減少"]]]},
{i:3,w:"matter",l:1,c:"「そこにある実質・中身」→物質；中身のある事柄=問題",e:[["名",["問題","事柄","物質"]],["自動",[["It doesn't matter","（否定・疑問で）重要である"],"重要である"]]]},
{i:4,w:"cause",l:1,c:"「結果を生み出す元」",e:[["名",["原因","大義"]],["他動",[["cause A to do","Aに〜させる原因となる"],"〜を引き起こす"]]]},
{i:5,w:"mean",l:1,c:"(動)「心が指し示すもの」→意味・意図。(形)は別語源で「劣った」→意地悪な・平均の",e:[["他動",[["mean to do","〜するつもりである"],["mean doing","〜することを意味する"],"〜を意味する"]],["形",["意地悪な","平均の"]],["名",["平均（値）"]],["熟",[["by means of A","Aによって"]]]]},
{i:6,w:"face",l:1,c:"「正面」→顔・表面；正面から向き合う",e:[["名",["顔","表面"]],["他動",["〜に直面する","〜に向き合う"]],["句動",[["face up to A","Aを直視する"],["be faced with A","Aに直面している"]]]]},
{i:7,w:"cost",l:1,c:"「代わりに差し出すもの」→費用・犠牲",e:[["名",["費用","犠牲"]],["他動",[["cost A B","AにB〔費用・犠牲〕を負わせる"],"（費用が）かかる"]],["熟",[["at the cost of A","Aを犠牲にして"]]]]},
{i:8,w:"last",l:1,c:"「一番あと」→最後の；最後まで持ちこたえて続く",e:[["形",["最後の","この前の"]],["自動",["続く","持ちこたえる"]],["副",["最後に"]]]},
{i:9,w:"run",l:1,c:"「途切れず流れ続ける」→走る；(店・機械が)動き続ける",e:[["自動",["走る","（機械が）動く","（液体が）流れる"]],["他動",["〜を経営する","〜を走らせる"]],["名",["走ること","連続"]],["句動",[["run out of A","Aを切らす"],["run into A","Aに偶然出会う；Aに衝突する"],["run over A","A〔人など〕を車でひく"],["run across A","Aに偶然出会う"]]]]},
{i:10,w:"order",l:1,c:"「整った並び」→順序・秩序；並べさせる→命令・注文",e:[["名",["順序","命令","注文","秩序"]],["他動",[["order A to do","Aに〜するよう命じる"],"〜を注文する"]]]},
{i:11,w:"sound",l:1,c:"(名・動)「音」。(形)は別語源(健やか)→健全な・ぐっすりの",e:[["名",["音"]],["自動",[["sound like A","Aのように聞こえる"],"〜に聞こえる"]],["形",["健全な","（眠りが）深い"]]]},
{i:12,w:"present",l:1,c:"pre-(前に)+esse(ある)→「目の前にある」→現在・出席；目の前に差し出す→贈呈・贈り物",e:[["形",["現在の","出席している"]],["名",["贈り物","現在"]],["他動",[["present A with B","AにBを贈る"],"〜を贈呈する","〜を提示する"]],["熟",[["at present","現在は"]]]]},
{i:13,w:"object",l:1,c:"ob-(向かって)+ject(投げる)→「前に投げ出された物」→物体・対象；反対を投げつける",e:[["名",["物体","対象","目的"]],["自動",["反対する"]],["句動",[["object to A／doing","A・〜することに反対する"]]]]},
{i:14,w:"subject",l:1,c:"sub-(下に)+ject(投げる)→「下に置かれたもの」→支配下→主題・教科・被験者",e:[["名",["主題","教科","被験者"]],["形",[["be subject to A","Aを受けやすい；Aに従属して"]]],["他動",[["subject A to B","AをBにさらす"]]]]},
{i:15,w:"project",l:1,c:"pro-(前へ)+ject(投げる)→「前へ投げる」→計画・投影・突き出る",e:[["名",["計画","事業"]],["他動",["〜を計画する","〜を投影する"]],["自動",["突き出る"]]]},
{i:16,w:"produce",l:1,c:"pro-(前へ)+ducere(導く)→「前へ引き出す」→生産する・生み出す",e:[["他動",["〜を生産する","〜を引き起こす"]],["名",["農産物"]]]},
{i:17,w:"offer",l:1,c:"ob-+ferre(運ぶ)→「相手の前に運び出す」→差し出す",e:[["他動",[["offer to do","〜しようと申し出る"],["offer A B","AにBを提供する"],"〜を申し出る","〜を提供する"]],["名",["申し出","提案"]]]},
{i:18,w:"provide",l:1,c:"pro-(前もって)+videre(見る)→「先を見て備える」→供給する・養う",e:[["他動",[["provide A with B","AにBを供給する"],["provide B for A","AにBを供給する"],"〜を供給する"]],["句動",[["provide for A","Aを養う；Aに備える"]]]]},
{i:19,w:"share",l:1,c:"「切り分けて持ち合う」→共有・分け前・株",e:[["他動",[["share A with B","AをBと分け合う"],"〜を共有する"]],["名",["分け前","株"]]]},
{i:20,w:"notice",l:1,c:"not-(知る)→「知って目に留める」→気づく・通知",e:[["他動",[["notice A do／doing","Aが〜する・しているのに気づく"],"〜に気づく"]],["名",["通知","注目"]]]},
{i:21,w:"respect",l:1,c:"re-(再び)+spect(見る)→「振り返ってよく見る」→尊敬；見る点=観点",e:[["名",["尊敬","点・観点"]],["他動",["〜を尊敬する"]],["熟",[["with respect to A","Aに関して"]]]]},
{i:22,w:"experience",l:1,c:"ex-+per(試みる)→「試して通り抜けたもの」",e:[["名",["経験"]],["他動",["〜を経験する"]]]},
{i:23,w:"influence",l:1,c:"in-+fluere(流れる)→「中へ流れ込む力」",e:[["名",["影響"]],["他動",["〜に影響を与える"]],["句動",[["have an influence on A","Aに影響を与える"]]]]},
{i:24,w:"demand",l:1,c:"de-(強く)+mandare(命じる)→「強く求める」→要求・需要",e:[["名",["要求","需要"]],["他動",[["demand that S（should）do","Sが〜するよう要求する"],"〜を強く要求する"]]]},
{i:25,w:"supply",l:1,c:"sub-+plere(満たす)→「下から満たして補う」",e:[["名",["供給","（<名>s で）生活必需品"]],["他動",[["supply A with B","AにBを供給する"],"〜を供給する"]]]},
{i:26,w:"support",l:1,c:"sub-(下から)+portare(運ぶ)→「下から支え運ぶ」→支持・扶養",e:[["他動",["〜を支える","〜を養う","〜を支持する"]],["名",["支持","支え"]]]},
{i:27,w:"force",l:1,c:"fortis(強い)→「押し通す強い力」→力・軍隊・強制",e:[["名",["力","軍隊"]],["他動",[["force A to do","Aに〜することを強いる"]]]]},
{i:28,w:"form",l:1,c:"「かたち」→形・形式・用紙；形作る",e:[["名",["形","形式","用紙"]],["他動",["〜を形成する"]],["自動",["形づくられる","できる"]]]},
{i:29,w:"figure",l:1,c:"「形あるもの」→姿・人物・図；形で書かれた数=数字",e:[["名",["数字","人物","姿","図"]],["他動",["〜と考える"]],["句動",[["figure out A","Aを理解する；Aを解決する"]]]]},
{i:30,w:"measure",l:1,c:"「ものさしで測る」→測定；程度を測った手立て=対策",e:[["他動",["〜を測る"]],["自動",["（寸法が）〜ある"]],["名",["手段・対策","基準"]],["熟",[["take measures","対策を講じる"]]]]},
{i:31,w:"view",l:1,c:"videre(見る)→「見ること」→眺め・見方",e:[["名",["眺め","見解"]],["他動",[["view A as B","AをBとみなす"],"〜を眺める"]],["熟",[["in view of A","Aを考慮して"]]]]},
{i:32,w:"value",l:1,c:"valere(強い・値打ちがある)→「値打ち」→価値・重んじる",e:[["名",["価値"]],["他動",["〜を高く評価する","〜を重んじる"]]]},
{i:33,w:"doubt",l:1,c:"du(二つ)→「二つの間で心が揺れる」→疑い",e:[["名",["疑い"]],["他動",["〜を疑う","〜ではないと思う"]],["熟",[["no doubt","疑いなく"]]]]},
{i:34,w:"benefit",l:1,c:"bene(良く)+fit(なされた)→「良い働き」→利益・恩恵",e:[["名",["利益","恩恵"]],["他動",["〜のためになる"]],["句動",[["benefit from A","Aから利益を得る"]]]]},
{i:35,w:"harm",l:1,c:"「傷を与える」",e:[["名",["害"]],["他動",["〜を害する"]],["熟",[["do harm to A","Aに害を与える"]]]]},
{i:36,w:"lack",l:1,c:"「あるべき所に無い」→不足・欠く",e:[["名",["不足"]],["他動",["〜を欠いている"]],["熟",[["for lack of A","A不足のために"],["be lacking in A","Aが欠けている"]]]]},
{i:37,w:"aim",l:1,c:"「狙いを定める」→目的・目指す",e:[["名",["目的","狙い"]],["他動",[["aim A at B","AをBに向ける"]]],["句動",[["aim at A","Aを狙う"],["aim to do","〜することを目指す"]]]]},
{i:38,w:"claim",l:1,c:"clamare(叫ぶ)→「自分のものだと声を上げる」→主張・要求",e:[["他動",[["claim that ...／claim to do","〜と主張する"],"〜を〔当然の権利として〕要求する"]],["名",["主張","要求"]]]},
{i:39,w:"deal",l:1,c:"「分け与える」→分配→取引；割り当てられた分を扱う",e:[["他動",["（カードなど）を配る"]],["名",["取引"]],["句動",[["deal with A","Aを扱う；Aに対処する"],["deal in A","Aを商う"]]],["熟",[["a great deal of A","多量のA"]]]]},
{i:40,w:"charge",l:1,c:"「荷を積む」→負わせる(料金・責任・罪)；(電気を)込める=充電",e:[["名",["料金","責任","告発"]],["他動",[["charge A for B","Bの代金をAに請求する"],["charge A with B","AをBの罪で告発する"],"〜を請求する","〜を充電する"]],["熟",[["in charge of A","Aを担当して"]]]]},
/* ---- Level 2: 基本動詞・頻出語 ---- */
{i:41,w:"achieve",l:2,c:"a-+chief(頂点)→「頂点まで至る」→達成",e:[["他動",["〜を達成する"]]]},
{i:42,w:"avoid",l:2,c:"「空(void)にして身を引く」→避ける",e:[["他動",[["avoid doing","〜するのを避ける"],"〜を避ける"]]]},
{i:43,w:"compare",l:2,c:"com-+par(等しい)→「並べて等しいか見る」→比較",e:[["他動",[["compare A with B","AをBと比較する"],["compare A to B","AをBにたとえる"]]],["熟",[["compared with/to A","Aと比べると"]]]]},
{i:44,w:"consist",l:2,c:"con-+sistere(立つ)→「一緒に立って成り立つ」",e:[["句動",[["consist of A","Aから成る"],["consist in A","A〔の中〕にある（自動詞・受け身不可）"]]]]},
{i:45,w:"contain",l:2,c:"con-+tenere(保つ)→「中に保ち持つ」→含む；(感情を)中に留める=抑える",e:[["他動",["〜を含む","（感情）を抑える"]]]},
{i:46,w:"describe",l:2,c:"de-+scribere(書く)→「書き写して描き出す」→描写・説明",e:[["他動",[["describe A as B","AをBだと述べる"],"〜を描写する","〜を説明する"]]]},
{i:47,w:"develop",l:2,c:"de-(逆)+velop(包む)→「包みを開く」→潜在力を開いて伸ばす",e:[["他動",["〜を発達させる","〜を開発する"]],["自動",["発達する"]]]},
{i:48,w:"discover",l:2,c:"dis-(逆)+cover(覆う)→「覆いを外す」→発見",e:[["他動",["〜を発見する"]]]},
{i:49,w:"encourage",l:2,c:"en-(中に与える)+courage(勇気)→「勇気を吹き込む」→励ます・促す",e:[["他動",[["encourage A to do","Aに〜するよう促す"],"〜を励ます","〜を促進する"]]]},
{i:50,w:"establish",l:2,c:"stabilis(安定)→「安定して据え付ける」→設立・確立",e:[["他動",["〜を設立する","〜を確立する"]]]},
{i:51,w:"examine",l:2,c:"「秤にかけて調べる」→検査・診察",e:[["他動",["〜を調べる","〜を診察する"]]]},
{i:52,w:"exist",l:2,c:"ex-(外に)+sistere(立つ)→「外に立ち現れている」→存在する",e:[["自動",["存在する"]]]},
{i:53,w:"expect",l:2,c:"ex-(外を)+spect(見る)→「外を見て待ち構える」→予期・期待",e:[["他動",[["expect A to do","Aが〜すると思う"],"〜を予期する","〜を期待する"]]]},
{i:54,w:"explain",l:2,c:"ex-+planus(平ら)→「平らに広げて見せる」→説明",e:[["他動",[["explain A to B","AをBに説明する"],"〜を説明する"]]]},
{i:55,w:"express",l:2,c:"ex-(外へ)+press(押す)→「押し出す」→表現；押し出されて直行する=急行",e:[["他動",[["express oneself","自分の考えを述べる"],"〜を表現する"]],["形",["急行の","明確な"]],["名",["急行"]]]},
{i:56,w:"gain",l:2,c:"「手に入れて増やす」→獲得・増加",e:[["他動",["〜を得る"]],["自動",["増す","（時計が）進む"]],["名",["増加","利益"]]]},
{i:57,w:"improve",l:2,c:"「利益ある状態へ持っていく」→改善",e:[["他動",["〜を改善する"]],["自動",["良くなる"]]]},
{i:58,w:"include",l:2,c:"in-+claudere(閉じる)→「中に閉じ込める」→含む",e:[["他動",["〜を含む"]]]},
{i:59,w:"indicate",l:2,c:"index(人差し指)と同源→「指で指し示す」→示す",e:[["他動",["〜を示す","〜を指摘する"]]]},
{i:60,w:"involve",l:2,c:"in-+volvere(巻く)→「中に巻き込む」→含む・巻き込む",e:[["他動",[["be involved in A","Aに関わっている"],"〜を含む・伴う","〜を巻き込む"]]]},
{i:61,w:"maintain",l:2,c:"manu(手)+tenere(保つ)→「手で保ち続ける」→維持；立場を保つ=主張",e:[["他動",[["maintain that ...","〜と主張する"],"〜を維持する"]]]},
{i:62,w:"mention",l:2,c:"mens(心)→「心に浮かんだことを口にする」→言及",e:[["他動",["〜に言及する"]],["名",["言及"]],["熟",[["Don't mention it.","どういたしまして"]]]]},
{i:63,w:"occur",l:2,c:"ob-+currere(走る)→「こちらへ走り出てくる」→起こる；心に走り込む=ふと浮かぶ",e:[["自動",["起こる"]],["句動",[["occur to A","〔考えが〕Aの心にふと浮かぶ"]]]]},
{i:64,w:"prefer",l:2,c:"prae-(前に)+ferre(運ぶ)→「前に置く」→優先して好む",e:[["他動",[["prefer A to B","BよりAを好む"],["prefer to do","〜するほうを好む"],"〜のほうを好む"]]]},
{i:65,w:"prevent",l:2,c:"prae-(先に)+venire(来る)→「先回りして立ちふさがる」→妨げる・防ぐ",e:[["他動",[["prevent A from doing","Aが〜するのを妨げる"],"〜を妨げる","〜を防ぐ"]]]},
{i:66,w:"realize",l:2,c:"「real(現実)にする」→実現する；現実として受け止める=悟る",e:[["他動",[["realize that ...","〜に気づく・悟る"],"〜を実現する"]]]},
{i:67,w:"recognize",l:2,c:"re-(再び)+cognoscere(知る)→「再び知る」→見分ける・認める",e:[["他動",["〜を認識する・見分ける","〜を〔正当と〕認める"]]]},
{i:68,w:"reduce",l:2,c:"re-(後ろへ)+ducere(導く)→「引き戻す」→減らす",e:[["他動",["〜を減らす"]]]},
{i:69,w:"refer",l:2,c:"re-+ferre(運ぶ)→「〜のところへ持っていく」→言及・参照",e:[["句動",[["refer to A","Aに言及する；Aを参照する"],["refer to A as B","AをBと呼ぶ"]]]]},
{i:70,w:"regard",l:2,c:"re-+garder(見る)→「じっと見る」→〜と見る(みなす)・敬意",e:[["他動",[["regard A as B","AをBとみなす"]]],["名",["尊敬","配慮"]],["熟",[["with regard to A","Aに関して"]]]]},
{i:71,w:"remain",l:2,c:"re-(後ろに)+manere(とどまる)→「あとに残りとどまる」",e:[["自動",["〜のままである","残る"]],["名",["（複数形）遺跡","残り"]]]},
{i:72,w:"require",l:2,c:"re-(繰り返し)+quaerere(求める)→「強く求める」→必要とする・要求",e:[["他動",[["require A to do","Aに〜するよう求める"],"〜を必要とする","〜を要求する"]]]},
{i:73,w:"seek",l:2,c:"「探し求めて追う」",e:[["他動",[["seek to do","〜しようと努める"],"〜を探し求める"]],["句動",[["seek for/after A","Aを探し求める"]]]]},
{i:74,w:"solve",l:2,c:"solvere(ゆるめる)→「固く結ばれたものを解きほぐす」→解決・解く",e:[["他動",["〜を解決する","〜を解く"]]]},
{i:75,w:"suggest",l:2,c:"sub-(下から)+gerere(運ぶ)→「下からそっと差し出す」→提案・示唆",e:[["他動",[["suggest doing","〜を提案する"],"〜を示唆する"]]]},
{i:76,w:"suppose",l:2,c:"sub-(下に)+ponere(置く)→「土台として下に置く」→仮定・思う",e:[["他動",[["be supposed to do","〜することになっている"],"〜と思う","〜と仮定する"]]]},
{i:77,w:"tend",l:2,c:"tendere(張る・伸ばす)→「〜の方へ伸びていく」→傾向",e:[["自動",[["tend to do","〜する傾向がある"]]],["句動",[["tend toward A","Aの傾向がある"]]]]},
{i:78,w:"vary",l:2,c:"varius(まだら)→「まだら模様のように様々」→変化・多様",e:[["自動",[["vary from A to B","AからBまで様々である"],"変わる","さまざまである"]],["他動",["〜を変える"]]]},
{i:79,w:"attitude",l:2,c:"「心身の構え」→態度・考え方",e:[["名",["態度","考え方"]],["熟",[["attitude toward A","Aに対する態度"]]]]},
{i:80,w:"knowledge",l:2,c:"know→「知られている中身」→知識",e:[["名",["知識"]]]},
/* ---- Level 3: 中級（形容詞・動詞） ---- */
{i:81,w:"significant",l:3,c:"signum(しるし)→「意味のしるしを帯びる」→重要な・意義深い",e:[["形","重要な；意義深い；かなりの"]]},
{i:82,w:"essential",l:3,c:"「本質(essence)に関わる」→不可欠・本質的",e:[["形",["不可欠の","本質的な",["be essential to/for A","Aに不可欠"]]],["名",[["essentials で","必需品；要点"]]]]},
{i:83,w:"obvious",l:3,c:"ob-(向かい)+via(道)→「道の真ん中にあり誰でも気づく」→明らか",e:[["形",["明らかな",["It is obvious that ...","〜は明白だ"]]]]},
{i:84,w:"appropriate",l:3,c:"ad-+proprius(固有の)→「その場に固有=ぴったり合う」→適切",e:[["形",["適切な",["be appropriate for A","Aにふさわしい"]]]]},
{i:85,w:"available",l:3,c:"valere(力がある)→「役立つ状態でそこにある」→利用可能",e:[["形","利用できる；入手できる；手が空いている"]]},
{i:86,w:"aware",l:3,c:"ware(見張る)→「用心して気づいている」",e:[["形",[["be aware of A","Aに気づいている"],["be aware that ...","〜だと気づいている"]]]]},
{i:87,w:"complex",l:3,c:"com-+plectere(編む)→「編み合わさった」→複雑；編み合わさった建物群=複合施設",e:[["形","複雑な"],["名","複合施設；コンプレックス"]]},
{i:88,w:"considerable",l:3,c:"「considerする(考慮する)に値するほどの」→かなりの",e:[["形","かなりの"]]},
{i:89,w:"crucial",l:3,c:"crux(十字路)→「分かれ道を決する」→決定的に重要",e:[["形",["決定的に重要な",["be crucial to/for A","Aにとって極めて重要"]]]]},
{i:90,w:"evident",l:3,c:"e-(外に)+videre(見える)→「外から見えている」→明白",e:[["形","明白な"]]},
{i:91,w:"abandon",l:3,c:"a-+bandon(支配権)→「支配権を明け渡す」→捨てる・断念",e:[["他動",["〜を捨てる","〜を断念する",["abandon doing","〜するのをやめる"]]]]},
{i:92,w:"absorb",l:3,c:"ab-+sorbere(吸う)→「吸い込む」→吸収；心を吸い込む=夢中にさせる",e:[["他動",["〜を吸収する",["be absorbed in A","Aに夢中である"]]]]},
{i:93,w:"accompany",l:3,c:"com-+panis(パン)→「パンを共にする仲間として付き添う」",e:[["他動",["〜に同行する","〜に伴う",["be accompanied by A","Aを伴っている"]]]]},
{i:94,w:"accomplish",l:3,c:"ad-+complere(満たす)→「最後まで満たし終える」→成し遂げる",e:[["他動","〜を成し遂げる"]]},
{i:95,w:"acquire",l:3,c:"ad-+quaerere(求める)→「求めて自分のものにする」→習得・獲得",e:[["他動","〜を習得する；〜を獲得する"]]},
{i:96,w:"adapt",l:3,c:"ad-+aptus(適した)→「合うように作り変える」→適応",e:[["自動",["適応する"]],["他動",["〜を適応させる","〜を改作する"]],["句動",[["adapt (oneself) to A","Aに適応する"]]]]},
{i:97,w:"adjust",l:3,c:"ad-+justus(正しい)→「正しい位置に合わせる」→調整",e:[["他動",["〜を調整する"]],["句動",[["adjust to A","Aに適応する"]]]]},
{i:98,w:"admit",l:3,c:"ad-+mittere(送る)→「中へ入れてやる」→入場許可；事実を中に入れる=認める",e:[["他動",["〜を〔しぶしぶ〕認める","〜の入場を許す",["admit doing","〜したことを認める"],["be admitted to A","Aへの入学を認められる"]]]]},
{i:99,w:"adopt",l:3,c:"ad-+optare(選ぶ)→「選び取って自分のものにする」→採用・養子",e:[["他動","〜を採用する；〜を養子にする"]]},
{i:100,w:"affect",l:3,c:"ad-+facere(作用する)→「働きかけて変化を及ぼす」→影響",e:[["他動","〜に影響を与える"]]},
{i:101,w:"analyze",l:3,c:"ana-(細かく)+lyein(解く)→「分解してほどく」→分析",e:[["他動","〜を分析する"]]},
{i:102,w:"anticipate",l:3,c:"ante-(前)+capere(取る)→「先取りする」→予期",e:[["他動",["〜を予期する",["anticipate doing","〜することを見込む"]]]]},
{i:103,w:"appreciate",l:3,c:"ad-+pretium(価格)→「価値を正しく見積もる」→評価・感謝・鑑賞",e:[["他動",["〜を正しく評価する","〜に感謝する","〜を鑑賞する",["I would appreciate it if ...","〜していただけるとありがたい"]]]]},
{i:104,w:"argue",l:3,c:"arguere(明らかにする)→「明らかにしようと論を交わす」→議論・主張",e:[["自動",["議論する",["argue with A about B","AとBについて言い争う"]]],["他動",[["argue that ...","〜と主張する"]]],["句動",[["argue for A","Aに賛成論を述べる"],["argue against A","Aに反対論を述べる"]]]]},
{i:105,w:"arise",l:3,c:"a-+rise→「立ち上がって出てくる」→生じる",e:[["自動",["生じる"]],["句動",[["arise from A","Aから生じる"]]]]},

{i:107,w:"attribute",l:3,c:"ad-+tribuere(割り当てる)→「〜に割り当てる」→帰属させる；割り当てられた性質=属性",e:[["他動",[["attribute A to B","AをBのせいにする・Bに帰する"]]],["名",["属性；特質"]]]},
{i:108,w:"behave",l:3,c:"be-+have→「自分を保つ」→ふるまう",e:[["自動",["ふるまう"]],["他動",[["behave oneself","行儀よくする"]]]]},
{i:109,w:"calculate",l:3,c:"calculus(計算用の小石)→「小石を並べて数える」→計算",e:[["他動","〜を計算する"]]},
{i:110,w:"conclude",l:3,c:"con-+claudere(閉じる)→「閉じて締めくくる」→結論・終える",e:[["他動",["〜を締めくくる",["conclude that ...","〜と結論づける"]]],["自動",["終わる"]]]},

{i:112,w:"confuse",l:3,c:"con-+fundere(注ぐ)→「一緒に注いで混ざってしまう」→混乱・混同",e:[["他動",["〜を混乱させる",["confuse A with B","AをBと混同する"]]]]},
{i:113,w:"struggle",l:3,c:"「もがきながら争う」→奮闘",e:[["自動",["奮闘する",["struggle to do","〜しようともがく"]]],["名",["奮闘；闘争"]],["句動",[["struggle with/against A","Aと格闘する"]]]]},
{i:114,w:"emphasize",l:3,c:"em-+phainein(見せる)→「中身を強く見せつける」→強調",e:[["他動","〜を強調する"]]},
{i:115,w:"estimate",l:3,c:"aestimare(値踏みする)→「価値を見積もる」→見積もり・推定",e:[["他動","〜を見積もる・推定する"],["名","見積もり；推定"]]},
{i:116,w:"identify",l:3,c:"idem(同じ)→「同一のものだと見定める」→特定；自分と同一視する",e:[["他動",["〜を特定する",["identify A as B","AをBだと確認する"]]],["句動",[["identify with A","Aに共感する・一体感を持つ"]]]]},
{i:117,w:"ignore",l:3,c:"in-(否)+gnoscere(知る)→「知らないことにする」→無視",e:[["他動","〜を無視する"]]},
{i:118,w:"imply",l:3,c:"in-+plicare(折る)→「中に折り込む」→暗に含む",e:[["他動","〜を暗に意味する；〜をほのめかす"]]},
{i:119,w:"insist",l:3,c:"in-+sistere(立つ)→「その上に立って動かない」→強く主張・要求",e:[["他動",[["insist that S (should) do","〜すべきだと強く主張する"]]],["句動",[["insist on A/doing","Aを要求する；〜すると言い張る"]]]]},
{i:120,w:"observe",l:3,c:"ob-+servare(注意を払う)→「注意を向け続ける」→観察；規則に注意を払う=遵守",e:[["他動","〜を観察する；〜と述べる；（規則）を守る"]]},

{i:122,w:"accumulate",l:4,c:"ad-+cumulus(山)→「山と積み上げる」→蓄積",e:[["他動","〜を蓄積する"],["自動","たまる"]]},
{i:123,w:"advocate",l:4,c:"ad-+vocare(呼ぶ)→「味方に呼ばれて声を上げる」→擁護・主張",e:[["他動","〜を主張する・擁護する"],["名","擁護者；提唱者"]]},
{i:124,w:"alter",l:4,c:"alter(他の)→「別のものに変える」",e:[["他動","〜を〔部分的に〕変える"],["自動","変わる"]]},
{i:125,w:"ambiguous",l:4,c:"ambi-(両方)+agere(進む)→「両方へ取れて定まらない」→あいまい",e:[["形","あいまいな；多義的な"]]},
{i:126,w:"apparent",l:4,c:"ad-+parere(現れる)→「表に現れている」→明白な；表に見えるだけの=外見上の",e:[["形","明らかな；外見上の"]]},
{i:127,w:"arbitrary",l:4,c:"arbiter(裁定者)→「裁定者の一存で決まる」→恣意的・気まぐれ",e:[["形","恣意的な；気まぐれな"]]},
{i:128,w:"assess",l:4,c:"ad-+sedere(座る)→「(査定人が)隣に座って値踏みする」→評価・査定",e:[["他動","〜を評価する；〜を査定する"]]},
{i:129,w:"assert",l:4,c:"ad-+serere(結びつける)→「自分の立場に結びつけて言い切る」→断言",e:[["他動",["（権利など）を主張する",["assert that ...","〜と断言する"]]]]},
{i:130,w:"cite",l:4,c:"citare(呼び出す)→「証拠として呼び出す」→引用・例示",e:[["他動","〜を引用する；〜を〔例として〕挙げる"]]},
{i:131,w:"coherent",l:4,c:"co-+haerere(くっつく)→「互いにくっついて筋が通る」→首尾一貫",e:[["形","首尾一貫した；筋の通った"]]},
{i:132,w:"compensate",l:4,c:"com-+pensare(量る)→「釣り合うように量って埋める」→補償・補う",e:[["句動",[["compensate for A","Aを補う"]]],["他動",[["compensate A for B","BのことでAに補償する"]]]]},

{i:134,w:"conceive",l:4,c:"con-+capere(取る)→「心の中に取り込む」→思いつく・想像する",e:[["他動",["〜を思いつく"]],["句動",[["conceive of A","Aを想像する"]]]]},
{i:135,w:"confront",l:4,c:"con-+frons(正面)→「正面を突き合わせる」→直面・対決",e:[["他動",["〜に立ち向かう",["be confronted with A","Aに直面している"]]]]},
{i:136,w:"consent",l:4,c:"con-(共に)+sentire(感じる)→「同じ気持ちになる」→同意",e:[["名",["同意",["without consent","同意なく"]]],["句動",[["consent to A","Aに同意する"]]]]},
{i:137,w:"constitute",l:4,c:"con-+statuere(立てる)→「部品を共に立てて組み上げる」→構成",e:[["他動","〜を構成する；〜に相当する"]]},
{i:138,w:"contradict",l:4,c:"contra-(逆)+dicere(言う)→「逆のことを言う」→矛盾・反論",e:[["他動","〜と矛盾する；〜に反論する"]]},
{i:139,w:"controversy",l:4,c:"contra-(逆)+vertere(向く)→「逆を向いて言い争う」→論争",e:[["名","論争"]]},
{i:140,w:"convey",l:4,c:"con-+via(道)→「道づたいに運ぶ」→運搬；意味を運ぶ=伝達",e:[["他動",["〜を伝える","〜を運ぶ",["convey A to B","AをBに伝える"]]]]},
{i:141,w:"correspond",l:4,c:"cor-(共に)+respondere(応じる)→「互いに応じ合う」→一致・相当・文通",e:[["句動",[["correspond to A","Aに一致する・相当する"],["correspond with A","Aと文通する"]]]]},
{i:142,w:"criterion",l:4,c:"krinein(判断する)→「判定のためのものさし」→基準",e:[["名",["基準",["criteria","（複数形）基準"]]]]},
{i:143,w:"deceive",l:4,c:"de-(離す)+capere(取る)→「こっそり取り上げる」→だます",e:[["他動",["〜をだます",["deceive A into doing","Aをだまして〜させる"]]]]},
{i:144,w:"dedicate",l:4,c:"de-+dicare(宣言する)→「捧げると宣言する」→献身・捧げる",e:[["他動",[["dedicate A to B","AをBに捧げる"],["dedicate oneself to A","Aに身を捧げる"]]]]},
{i:145,w:"deliberate",l:4,c:"de-+libra(天秤)→「天秤にかけて考え抜いた」→意図的・慎重；熟考する",e:[["形",["意図的な；慎重な"]],["自動",["熟考する",["deliberate on A","Aについて熟考する"]]]]},
{i:146,w:"derive",l:4,c:"de-+rivus(川)→「川から水路を引く」→由来する・引き出す",e:[["句動",[["derive from A","Aに由来する"]]],["他動",[["derive A from B","BからA〔利益・知識など〕を引き出す"]]]]},
{i:147,w:"deteriorate",l:4,c:"deterior(より悪い)→「より悪い方へ進む」→悪化",e:[["自動","悪化する"]]},
{i:148,w:"dilemma",l:4,c:"di-(二つ)+lemma(前提)→「二つの前提に挟まれる」→板挟み",e:[["名","ジレンマ；板挟み"]]},
{i:149,w:"diminish",l:4,c:"de-+minuere(小さくする)→「小さくしていく」→減少",e:[["自動","減少する"],["他動","〜を減らす"]]},
{i:150,w:"dispute",l:4,c:"dis-(別々に)+putare(考える)→「考えが割れて言い争う」→論争・異議",e:[["名","論争；紛争"],["他動","〜に異議を唱える"]]},
{i:151,w:"distinct",l:4,c:"di-+stinguere(印をつける)→「区切りの印がはっきりある」→別個・明瞭",e:[["形",["はっきりした",["be distinct from A","Aとは別個の・明確に異なる"]]]]},
{i:152,w:"distribute",l:4,c:"dis-(別々に)+tribuere(割り当てる)→「配り分ける」→分配・分布",e:[["他動",["〜を分配する","〜を分布させる",["distribute A to B","AをBに配る"]]]]},
{i:153,w:"embrace",l:4,c:"em-(中に)+brace(腕)→「腕の中に入れる」→抱擁；考えを抱き入れる=受容",e:[["他動","〜を抱きしめる；（考えなど）を受け入れる"],["名","抱擁"]]},
{i:154,w:"emerge",l:4,c:"e-(外へ)+mergere(沈める)→「沈んだ状態から浮かび出る」→出現",e:[["自動",["現れる；明らかになる"]],["句動",[["emerge from A","Aから現れ出る"]]]]},
{i:155,w:"enhance",l:4,c:"altus(高い)→「高く引き上げる」→高める",e:[["他動","〜を高める；〜を向上させる"]]},
{i:156,w:"evaluate",l:4,c:"e-+value→「価値を引き出して定める」→評価",e:[["他動","〜を評価する"]]},
{i:157,w:"exaggerate",l:4,c:"ex-+aggerare(積み上げる)→「盛りに盛る」→誇張",e:[["他動","〜を誇張する"]]},
{i:158,w:"exploit",l:4,c:"ex-+plicare(折る)→「折り開いて使い尽くす」→活用・搾取",e:[["他動","〜を搾取する；〜を〔最大限〕活用する"],["名","功績"]]},
{i:159,w:"facilitate",l:4,c:"facilis(容易な)→「容易にしてやる」→促進",e:[["他動","〜を容易にする；〜を促進する"]]},
{i:160,w:"fluctuate",l:4,c:"fluctus(波)→「波のように上下する」→変動",e:[["自動","変動する"]]},

{i:161,w:"aesthetic",l:5,c:"aisthesis(知覚)→「感覚で美を捉える」→美的",e:[["形",["美的な"]],["名",[["aesthetics で","美学"]]]]},
{i:162,w:"alleviate",l:5,c:"ad-+levis(軽い)→「重荷を軽くしてやる」→緩和",e:[["他動","（苦痛など）を緩和する"]]},
{i:163,w:"ambivalent",l:5,c:"ambi-(両方)+valere(力がある)→「相反する二つの感情が同居する」",e:[["形",["相反する感情を持つ",["be ambivalent about A","Aに複雑な感情を抱く"]]]]},
{i:164,w:"autonomy",l:5,c:"auto-(自分)+nomos(法)→「自分の法で立つ」→自律・自治",e:[["名","自律；自治"]]},
{i:165,w:"coincide",l:5,c:"co-+incidere(落ちる)→「同じ所に落ち合う」→同時発生・一致",e:[["自動",["同時に起こる；一致する"]],["句動",[["coincide with A","Aと同時に起こる・一致する"]]]]},
{i:166,w:"compassion",l:5,c:"com-(共に)+passio(苦しみ)→「苦しみを共にする」→思いやり",e:[["名",["思いやり","深い同情",["compassion for A","Aへの思いやり"]]]]},
{i:167,w:"condemn",l:5,c:"con-+damnare(罰する)→「罰を宣告する」→強い非難・有罪判決",e:[["他動",["〜を強く非難する",["condemn A for B","BのことでAを非難する"],["condemn A to B","AにB〔刑〕を宣告する"]]]]},
{i:168,w:"contemplate",l:5,c:"con-+templum(観測所)→「観測所からじっと見つめる」→熟視・熟考",e:[["他動",["〜をじっと見る",["contemplate doing","〜しようかと考える・熟考する"]]]]},
{i:169,w:"cynical",l:5,c:"kyon(犬)→「犬儒学派のように世を斜めに見る」→冷笑的",e:[["形",["皮肉な；冷笑的な",["be cynical about A","Aを斜めに見ている"]]]]},
{i:170,w:"eloquent",l:5,c:"e-(外へ)+loqui(話す)→「言葉が流れ出る」→雄弁",e:[["形","雄弁な"]]},
{i:171,w:"empathy",l:5,c:"em-(中へ)+pathos(感情)→「相手の感情の中に入り込む」→共感",e:[["名",["共感",["empathy with/for A","Aへの共感"]]]]},
{i:172,w:"endeavor",l:5,c:"en-+devoir(義務)→「己の務めとして力を尽くす」→努力",e:[["名",["努力；試み"]],["自動",[["endeavor to do","〜しようと努力する"]]]]},
{i:173,w:"epitome",l:5,c:"epi-+temnein(切る)→「切り詰めて要点だけにしたもの」→縮図・典型",e:[["名",["典型；縮図",["the epitome of A","Aの典型"]]]]},
{i:174,w:"feasible",l:5,c:"faire(行う)→「実際に行うことができる」→実行可能",e:[["形","実行可能な"]]},
{i:175,w:"futile",l:5,c:"futilis(漏れやすい)→「注いでも漏れる器」→無駄・むなしい",e:[["形",["無駄な；むなしい",["It is futile to do","〜しても無駄だ"]]]]},
{i:176,w:"hierarchy",l:5,c:"hieros(聖)+archein(支配)→「聖職者の位階」→階層・序列",e:[["名","階層制；序列"]]},
{i:177,w:"indispensable",l:5,c:"in-(否)+dispense(免除する)→「免除できない」→不可欠",e:[["形",["不可欠の",["be indispensable to/for A","Aに不可欠"]]]]},

/* 承認済みの共有単語プール（全ユーザー共通）。起動時に読み込む。 */
let sharedWords = [];
const SHARED_ID_OFFSET = 10000000; // 共有単語のID衝突回避用オフセット
async function loadSharedWords(){
  if(!sb) return;
  try{
    const { data, error } = await sb.from("shared_words").select("id,word,level,core,entries");
    if(!error && Array.isArray(data)){
      sharedWords = data.map(r => {

        if(r.core) o.c = r.core;

}
function allWords(){
  const c = Array.isArray(state.custom) ? state.custom : [];
  const merged = BUILTIN.concat(sharedWords).concat(c); // BUILTIN優先→共有→個人
  const seen = new Set(); const out = [];
  for(const w of merged){
    if(!w || typeof w !== "object" || w.i == null || typeof w.w !== "string") continue;
    const key = w.w.toLowerCase();
    if(seen.has(key)) continue; // 単語文字列で重複排除
    seen.add(key); out.push(w);
  }
  return out;
}
function byId(id){ return allWords().find(w=>w.i===id); }
/* 【第4バッチ】カスタム語のID空間を分離する。
   BUILTIN=1〜3941 ／ 共有語=SHARED_ID_OFFSET(10000000)+DBid ／ カスタム語=CUSTOM_ID_OFFSET(20000000)+n
   採番に allWords() を使わないため、単語が何件承認されても既存・新規のカスタム語の i は変わらない。
   ※この分離が破れるのは共有語のDB idが10000000に達したときだけ（現実的な規模では起きない）。 */
const CUSTOM_ID_OFFSET = 20000000;
function nextCustomId(){
  const c = Array.isArray(state.custom) ? state.custom : [];
  let mx = CUSTOM_ID_OFFSET;
  for(const w of c){ const n = Number(w && w.i); if(n >= CUSTOM_ID_OFFSET && n > mx) mx = n; }
  return mx + 1;
}
/* 【第4バッチ】旧採番（max+1）のカスタム語を新レンジへ移し、進捗レコードのキーも付け替える。
   ・冪等：CUSTOM_ID_OFFSET 以上の語は skip するため、2回目以降は1件も変化しない。
   ・新IDは旧IDから決定的に決める（再適用しても同じ場所に着地するので進捗が迷子にならない）。
   ・state.custom の既存要素だけを回す。allWords() は回さない（全収録語にレコードを作る事故の防止）。 */
function migrateCustomIds(){
  const c = Array.isArray(state.custom) ? state.custom : [];
  if(!c.length) return false;
  const used = new Set();
  for(const w of c){ const n = Number(w && w.i); if(n >= CUSTOM_ID_OFFSET) used.add(n); }
  let changed = false;
  for(const w of c){
    if(!w || typeof w !== "object") continue;
    const oldId = Number(w.i);
    if(!isFinite(oldId) || oldId >= CUSTOM_ID_OFFSET) continue;   /* 移行済み＝何もしない（冪等の要） */
    let newId = CUSTOM_ID_OFFSET + (oldId % 10000000);
    while(used.has(newId)) newId++;
    used.add(newId); w.i = newId; changed = true;
    const rec = state.words && state.words[oldId];
    if(rec && !state.words[newId]){
      state.words[newId] = rec;
      /* 旧キーを消してよいのは【その id で引ける語が現在ひとつも存在しないとき】だけ。
         ・旧採番は max(allWords())+1 だったため、200語時代のカスタム語の i は 201 前後になりえた。
           現在の BUILTIN は i=1〜3941（3,932語）なので、state.words[201] は【実在する収録語】の
           記録である可能性が高い。無条件に消すとその収録語の学習記録を失う。
         ・共有レンジ（10000000以上）の旧IDも、いま共有語が居るか将来の承認で居るようになるため残す。
         ・どちらのものか判別できない以上、「失うより重複するほうがまし」を両レンジに適用する。
         ・この時点で w.i は新IDへ書き換え済みなので、byId(oldId) にカスタム語自身はヒットしない。 */
      if(oldId < SHARED_ID_OFFSET && !byId(oldId)) delete state.words[oldId];
    }
  }
  if(changed) scheduleSave();
  return changed;
}

const PENDING_STATE_KEY = "amateras_pending_state";
function savePendingState(uid, obj){

/* 【P51・追補】退避の書き込みに失敗した事実を次回以降の表示にも残すためのフラグ。

   dirty が無いまま flushSave が呼ばれる（終了ボタン等）と「⚠ この端末に一時保存」へ戻ってしまう。
   退避が成功した時・退避が不要になった時に解除される。 */
let pendingSaveFailed = false;

async function backendSet(key, val){
  if(sb && currentUser && cloudReadOk){   /* 【第3バッチ】読めていないセッションではクラウドへ書かない（初期stateや端末の古い控えでの上書き防止）。以降のローカル退避は従来どおり動く */
    try{
      const { error } = await sb.from("user_data")
        .upsert({ user_id: currentUser.id, data: val, updated_at: new Date().toISOString() });
      if(!error){ persistInfo.backend = "cloud"; persistInfo.failed = false; return true; }
    }catch(e){ /* ネット不通など → ローカルへ退避 */ }
  }
  if(window.storage && typeof window.storage.set === "function"){
    try{
      const r = await window.storage.set(key, val);
      if(r){ persistInfo.backend = "artifact"; persistInfo.failed = false; return true; }
    }catch(e){ /* レート制限・非対応 → 次の手段へ */ }
  }
  try{
    localStorage.setItem(key, val);
    persistInfo.backend = "local"; persistInfo.failed = false; return true;
  }catch(e){ /* localStorage も不可 */ }
  persistInfo.backend = "memory"; persistInfo.failed = true; return false;
}
async function backendGet(key){
  if(sb && currentUser){
    try{
      const { data, error } = await sb.from("user_data")
        .select("data").eq("user_id", currentUser.id).maybeSingle();
      if(!error){ persistInfo.backend = "cloud"; cloudReadOk = true; return data ? data.data : null; }   /* 【第3バッチ】行が無い(data===null)＝新規ユーザーも「成功」 */
      cloudReadOk = false;      /* 【第3バッチ】errorが返った＝読めていない */
    }catch(e){ cloudReadOk = false; /* 取得失敗 → ローカルへ。ただし「読めていない」事実は記録する */ }
  }else{
    cloudReadOk = true;         /* 【第3バッチ】未ログインならクラウドは関係しない（前セッションの失敗を持ち越さない） */
  }
  if(window.storage && typeof window.storage.get === "function"){
    try{
      const r = await window.storage.get(key);
      if(r && r.value != null){ persistInfo.backend = "artifact"; return r.value; }
    }catch(e){ /* 初回はキー無しで例外 → 次の手段へ */ }
  }
  try{
    const v = localStorage.getItem(key);
    if(v != null){ if(!persistInfo.backend) persistInfo.backend = "local"; return v; }
  }catch(e){}
  return null;
}
function updateSaveBadge(status){

     下の if(!el) で毎回抜ける死関数だった＝式は正しいのに誰にも表示されていなかった（条文37）。
     異常時だけ出す。正常（saved / pending）は hidden にして、通常の利用者には何も見せない。 */
  const el = document.getElementById("saveBadge");
  if(!el) return;   /* 保険（要素は常設だが、外したら死関数へ戻るため残す） */
  if(status === "localonly"){        /* (a) クラウドへ書けないが、この端末には書けている */
    el.className = "save-badge err"; el.textContent = "⚠ この端末に一時保存中（ホームで再読み込みできます）"; el.hidden = false;
  }else if(status === "error"){      /* (b) 保存に失敗している（どこにも書けていない／退避を作れていない） */
    el.className = "save-badge err"; el.textContent = "⚠ 保存に問題があります（バックアップを）"; el.hidden = false;
  }else{                             /* saved / pending＝正常 */
    el.className = "save-badge"; el.textContent = ""; el.hidden = true;
  }
}

     クラウドへ書けた時点で退避は不要になる（＝要件(i)(ii)はここで合流する）。
     読み戻し直後ではなくクラウド保存の成功時に消すのは、直後の保存が失敗したときに
     退避まで消えると、次回起動でクラウドの古い内容が返り P51 の穴に落ち直すため。 */

        容量超過は再試行しても解消しないため、保存の無限再試行を作らない）。 */
  updateSaveBadge((!ok || !pendOk) ? "error" : (cloudPending() ? "localonly" : "saved"));
  return ok && pendOk;
}

      state = Object.assign(state, s);
      if(!Array.isArray(state.custom)) state.custom = [];
      if(!state.stamps || typeof state.stamps!=="object") state.stamps = {};   /* 【P34】旧stateガード：stamps 欠落を空オブジェクトで補完 */
      state.settings = Object.assign({newPerDay:30,rate:0.95,difficulty:1,blankCount:"auto"}, s.settings||{});
      if(state.settings.dailyNew == null) state.settings.dailyNew = state.settings.newPerDay;  /* 【P33是正B】旧stateは newPerDay を dailyNew の既定に（新規ペース不変） */
      delete state.settings.modes; // 旧設定の掃除

async function applyUpdateNow(){

  const canonical = location.origin + location.pathname; /* クエリなしの正規URL */

/* 追加1の副作用対策：開き直した後に残る ?v=... を除去し、URLを正規の姿に戻す。

   ※除去するのは自前の v= のみ。認証用のクエリ（code / token_hash / type=recovery 等）は必ず温存する。
   ※supabase-js の detectSessionInUrl がURLを読み終えた後（initSupabase 完了後）に呼ぶこと。 */
function stripCacheBuster(){

    if(!/[?&]v=\d+(?:&|$)/.test(location.search)) return;
    const u = new URL(location.href);
    u.searchParams.delete("v");                       /* v= だけを削除。他のクエリは残す */
    const qs = u.searchParams.toString();
    const next = u.pathname + (qs ? "?" + qs : "") + u.hash;   /* ハッシュ（認証情報）も温存 */
    history.replaceState(null, "", next);

}

function tmax(a, b){        /* null考慮の max（ISO文字列は辞書順比較で時刻順になる） */

}
async function refreshNotifDots(){
  /* 【P43】お知らせはゲスト（未ログイン）にも見せるため、下の「未ログインなら全ドットfalseで即return」より
     【前】に判定する。notices は anon SELECT 可なので currentUser は不要（sb があれば取得できる）。 */
  try{
    if(sb){
      const rows = await fetchVisibleNotices();
      const read = getReadNotices();
      notifNotice = rows.some(r=> !read.includes(String(r.id)));
    }else{ notifNotice = false; }
  }catch(_){ notifNotice = false; }
  if(!sb || !currentUser){ notifInbox = false; notifFeedback = false; notifSubmission = false; reflectNotifDots(); return; }
  /* B：利用者側。自分の投稿のうち max(replied_at, admin_read_at) > user_read_at なら未読 */
  try{
    const { data } = await sb.from("feedback")
      .select("id, replied_at, admin_read_at, user_read_at")
      .eq("submitted_by", currentUser.id);
    notifFeedback = (data || []).some(r=>{
      const latest = tmax(r.replied_at, r.admin_read_at);
      if(!latest) return false;                 /* 管理者がまだ何もしていない */
      if(!r.user_read_at) return true;          /* 未読（一度も開いていない） */
      return latest > r.user_read_at;           /* 既読後に再返信されたら再点灯 */
    });
  }catch(_){ notifFeedback = false; }
  /* 【P32-C】利用者側：自分の投稿のうち reviewed_at があり user_read_at より新しい（未読）なら点灯 */
  try{
    const { data } = await sb.from("word_submissions")
      .select("id, reviewed_at, user_read_at")
      .eq("submitted_by", currentUser.id);
    notifSubmission = (data || []).some(r=>{
      if(!r.reviewed_at) return false;              /* まだ審査されていない */
      if(!r.user_read_at) return true;              /* 未読（一度も一覧を開いていない） */
      return r.reviewed_at > r.user_read_at;        /* 既読後に再審査されたら再点灯 */
    });
  }catch(_){ notifSubmission = false; }
  /* A：管理者側。オーナーのみ実行。未読feedback（created_at > admin_read_at・nullなら未読）または
     未処理の単語投稿（status='pending'）が1件でもあれば点灯（【P44】投稿分をORで合成）。
     2つのクエリはそれぞれ try/catch し、失敗側は false 扱い＝通信失敗では点灯しないだけ（画面は壊さない）。 */
  if(isOwner()){
    let hasUnreadFb = false, hasPending = false;
    try{
      const { data } = await sb.from("feedback").select("id, created_at, admin_read_at");
      hasUnreadFb = (data || []).some(r=> !r.admin_read_at || r.created_at > r.admin_read_at);
    }catch(_){ hasUnreadFb = false; }
    try{
      const { data } = await sb.from("word_submissions").select("id").eq("status","pending").limit(1);
      hasPending = (data || []).length > 0;
    }catch(_){ hasPending = false; }
    notifInbox = hasUnreadFb || hasPending;
  }else{
    notifInbox = false;
  }
  reflectNotifDots();
}
function reflectNotifDots(){
  const set = (id, on)=>{ const el = document.getElementById(id); if(el) el.style.display = on ? "block" : "none"; };
  set("dotInbox", notifInbox);
  set("dotFeedback", notifFeedback);
  set("dotSubmission", notifSubmission);   /* 【P32-C】「単語を追加」項目の赤ドット */
  set("dotNotice", notifNotice);           /* 【P43】「お知らせ」項目の赤ドット（ゲストにも点く） */
  set("dotMenu", notifInbox || notifFeedback || notifSubmission || notifNotice);   /* ☰へ伝播（メニューを開かなくても気づける） */
}

let lastUpdateCheck = 0; // 【P42】未宣言のままではReferenceErrorで更新チェックが無言で死ぬ
async function checkForUpdate(){

  lastUpdateCheck = now;

    if(!res.ok) return;
    const text = await res.text();
    const m = text.match(/const APP_VERSION\s*=\s*"([^"]+)"/);

/* 2つの進捗stateを統合する。primary=クラウド(基準)、secondary=ローカル(未ログイン中の進捗)。
   単語ごとに「解答回数の多い方」を優先し、進捗を失わないようにする。 */
function mergeStates(primary, secondary){
  if(!primary) return secondary || null;
  if(!secondary) return primary;
  let out;
  try{ out = JSON.parse(JSON.stringify(primary)); }catch(_){ return primary; }
  out.words = out.words || {};
  const sw = secondary.words || {};
  for(const id in sw){
    const a = out.words[id], b = sw[id];
    if(!a){ out.words[id] = b; continue; }
    const seenA = (a.cSeen||0)+(a.wSeen||0);
    const seenB = (b.cSeen||0)+(b.wSeen||0);
    if(seenB > seenA) out.words[id] = b;
    else if(seenB === seenA && (b.reps||0) > (a.reps||0)) out.words[id] = b;
  }
  /* custom単語：単語文字列で重複排除しつつ統合（ID衝突する語は安全のため取り込まない） */
  const cust = Array.isArray(out.custom) ? out.custom.slice() : [];
  const usedWords = new Set(cust.map(x=>String(x.w).toLowerCase()));
  const usedIds = new Set(cust.map(x=>x.i));
  for(const c of (Array.isArray(secondary.custom) ? secondary.custom : [])){
    if(!c || typeof c.w !== "string") continue;
    const key = c.w.toLowerCase();
    if(usedWords.has(key) || usedIds.has(c.i)) continue;
    cust.push(c); usedWords.add(key); usedIds.add(c.i);
  }
  out.custom = cust;
  out.log = Object.assign({}, secondary.log||{}, out.log||{});
  out.stamps = Object.assign({}, secondary.stamps||{}, out.stamps||{});   /* 【P34】スタンプ日を和集合で統合（値は常に1・キーの和集合。複数端末で消えない） */
  out.settings = Object.assign({}, secondary.settings||{}, out.settings||{});
  /* 進行中セッションはクラウド優先。クラウドに無ければローカルの続きを引き継ぐ。 */
  out.activeSession = out.activeSession || secondary.activeSession || null;
  return out;
}
/* ログイン時：未ログイン中(localStorage)の進捗をアカウント(クラウド)に統合する。

async function migrateGuestProgress(){
  if(!(sb && currentUser)) return null;
  let localRaw = null;
  try{ localRaw = localStorage.getItem(STORE_KEY); }catch(_){}
  if(!localRaw) return null;
  let localState = null;
  try{ localState = JSON.parse(localRaw); }catch(_){ return null; }
  const guestHasProgress = localState && localState.words && Object.keys(localState.words).length > 0;
  if(!guestHasProgress) return null;

  if(!wantsMerge){
    try{ localStorage.removeItem(STORE_KEY); }catch(_){}
    return null;
  }
  let cloudState = null, cloudSeen = false;   /* 【第3バッチ】cloudSeen＝クラウドを読めたか。「読めなかった」と「まだデータが無い」を分ける */
  try{
    const { data, error } = await sb.from("user_data").select("data").eq("user_id", currentUser.id).maybeSingle();
    if(!error){
      cloudSeen = true;   /* 行が無い(data===null)＝新規ユーザーも成功。ここが従来と同じ正常系 */
      if(data && data.data){ try{ cloudState = JSON.parse(data.data); }catch(_){ cloudState = null; } }
    }

  if(!cloudSeen){
    /* 【第3バッチ】読めていない状態で先へ進むと、mergeStates(null, localState) が localState をそのまま返し
       （if(!primary) return secondary）、直後の upsert でクラウドの進捗がゲスト進捗で丸ごと置き換わる。
       よって書き込まず、localStorage の進捗キーも消さず（次回の再統合を残す）、null を返して呼び出し側に何も適用させない。 */
    cloudReadOk = false;

    return null;
  }
  const merged = mergeStates(cloudState, localState);
  if(!merged) return null;
  try{
    await sb.from("user_data").upsert({ user_id: currentUser.id, data: JSON.stringify(merged), updated_at: new Date().toISOString() });
    try{ localStorage.removeItem(STORE_KEY); }catch(_){}
  }catch(_){ /* アップロード失敗時は localStorage を残し、次回再試行できるようにする */ }
  return merged;   /* (A-safe) 統合結果を返す。呼び出し側で loadState 後に state へ反映し、失敗時も次回saveでクラウドへ回収する */

/* C-3：引き継ぎ確認の発火制御。端末に「最後に迎えた user.id」を記録し、

async function maybeMigrateOnLogin(){

/* 【第3バッチ】クラウド再読取（復旧経路）。online / タブ復帰 / バナー内ボタンの3系統から呼ぶ。
   成功したら成功状態へ切り替え、保留分を mergeStates で統合してクラウドへ反映し、画面を描き直す。 */
async function retryCloudRead(){
  if(cloudRetrying) return;      /* 多重実行ガード */
  if(!cloudPending()) return;    /* 未ログイン・既に読めているなら何もしない */
  if(session) return;            /* 学習中は画面とstateを触らない（ホームに戻ってから再試行できる） */
  cloudRetrying = true;
  let recovered = false;
  let pending = null;
  try{ pending = JSON.parse(JSON.stringify(state)); }catch(_){ pending = null; }   /* 読めなかった間に積んだ分を退避 */
  if(pending){   /* 退避に失敗したときは state を一切触らない（戻せない状態で loadState を走らせない） */
    try{
      await loadState();                     /* backendGet が cloudReadOk を判定し直す。※loadState は state を上書きする */
      if(cloudReadOk){
        const merged = mergeStates(state, pending);   /* クラウド優先・語ごとに回答数の多い方（クラウドの進捗が負けて消えることはない） */
        if(merged) state = merged;
        recovered = true;                    /* ここで成立。以降の保存失敗は巻き戻しの理由にしない（dirty のまま次回saveで回収） */
        dirty = true;
        await flushSave();                   /* ゲートが開いたのでクラウドへ反映される */
      }
    }catch(_){ /* 失敗しても画面は壊さない。次の機会に再試行する */ }
    if(!recovered) state = pending;          /* 【r2】再読取が成功しなかったら再試行前へ戻す。loadState が localStorage の古い控えで上書きしたぶんを打ち消す（デバウンス中の flushSave が巻き戻った state を保存する事故の防止） */
  }
  cloudRetrying = false;
  if(recovered && !session) renderEntry();   /* バッジ・バナー・ホームを描き直し、回復を利用者に見せる */
}

function persistBanner(){
  /* 【P55】ホームは起動後に必ず1回ここを通るので、固定バッジの初回の塗り分けをここで行う。
     以降は既存の updateSaveBadge 呼び出し（scheduleSave／flushSave）が状態変化のたびに塗り替える。
     ＝renderCard などの描画関数には1行も足していない。 */
  refreshSaveBadge();
  /* 【P55】保存に失敗している状態（b）を、クラウドが読めていない状態（a）より【先に】見る。
     以前は cloudPending() が先に return したため、どこにも保存できていない場合でも
     「一時保存し、読み込めたときにまとめて反映します」と約束していた。 */
  if(persistInfo.backend === "memory" || persistInfo.failed){   /* (b-1) どこにも書けていない */
    return `<div class="warn-banner">⚠ この環境では自動保存が使えていません。進捗はこの画面を閉じると消えます。学習後は「単語を追加」画面の「上級者向け」→「バックアップを書き出す」で退避してください。</div>`;
  }
  if(pendingSaveFailed){   /* (b-2) この端末には書けたが、復旧時に読み戻すための控え（退避）を作れていない */
    const pendMsg = `⚠ クラウドに反映するための<b>控えをこの端末に作れませんでした</b>（保存できる容量が足りない可能性があります）。いまの進捗はこの端末には保存されていますが、<b>通信が回復しても取り戻せない可能性があります</b>。学習後は「単語を追加」画面の「上級者向け」→「バックアップを書き出す」で退避してください。`;
    /* 【P55・追補】pendingSaveFailed が真になるのは flushSave の cloudPending() 分岐だけなので、
       この状態ではほぼ必ずクラウドも読めていない。(b-2) だけを返すと「画面の進捗が正しくない」ことと
       再読取の導線（唯一の回復手段）が消えるため、(a) の内容と併記して返す。
       ただし「まとめて反映します」という約束は (b-2) では偽になるので、その一文は載せない。
       cloudRetryBtn は【この分岐でも1つだけ】（id 重複は getElementById が先頭しか拾わず、
       押しても効かないボタンを作る＝要件4の再発になる）。 */
    if(cloudPending()){
      return `<div class="warn-banner">⚠ 学習記録をクラウドから読み込めていません（通信の問題の可能性があります）。<b>記録は消えていません</b>が、いまこの画面に出ている進捗は正しくありません。 <button id="cloudRetryBtn" type="button">もう一度読み込む</button><br>${pendMsg}</div>`;
    }
    return `<div class="warn-banner">${pendMsg}</div>`;   /* クラウドは読めている＝retryCloudRead が何もしない状態なので、ボタンは出さない */
  }
  if(cloudPending()){   /* (a) 【第3バッチ】黙って進捗ゼロのホームを出さない。「消えた」と誤解させない文面にする */
    return `<div class="warn-banner">⚠ 学習記録をクラウドから読み込めていません（通信の問題の可能性があります）。<b>記録は消えていません</b>が、いまこの画面に出ている進捗は正しくありません。この間の学習はこの端末に一時保存し、読み込めたときにまとめて反映します。 <button id="cloudRetryBtn" type="button">もう一度読み込む</button></div>`;
  }
  return "";
}

/* ---- 今日のキュー ---- */
/* ---- ストック方式（P33：チャンク制）----
   未出単語を「ストック（学習対象）」に登録する。登録=state.words にエントリ作成（step0）。以降 SRS で出題。
   P33で「1日1回」制限とK-1早期returnを撤去し、チャンク開始時に不足分だけ補充する形（stockFill）へ移行した。 */

/* 【P33】新規補充の共通ヘルパー：未ストック語を最大 n 語だけストックし、実際に足した件数を返す。
   選定は従来（難易度☆候補→自動昇格→レベル内ランダム P23-A）を踏襲。stockToday/stockExtra から重複していたロジックをここへ一本化。 */
function stockFill(n){
  if(n <= 0) return 0;
  let diff = chunkStars();
  const candidates = d => allWords().filter(w=>{ const st=state.words[w.i]; return (!st) && w.l<=d; }).sort((a,b)=>a.i-b.i);
  let fresh = candidates(diff);
  /* 難易度自動昇格：☆N以下の未ストック語が尽きたら☆を上げる */
  while(fresh.length===0 && diff<5){ diff++; fresh = candidates(diff); }
  if(diff !== chunkStars()) state.settings.difficulty = diff;
  /* 【P23-A】難易度内でランダムに選ぶ（元データがレベル内アルファベット順のため、先頭からだと偏る） */
  fresh = shuffle(fresh).slice(0, n);
  for(const w of fresh) ensureWordRecord(w.i, true);
  if(fresh.length){
    const t = todayStr();
    if(!state.log[t]) state.log[t] = {news:0, reviews:0};
    state.log[t].stocked = (state.log[t].stocked||0) + fresh.length;   /* 記録は残す（読み手はゼロ＝死フィールド） */
    saveState();
  }
  return fresh.length;
}
/* 【P33】旧 stockToday：日付キー1日1回制限とK-1早期returnは撤去済み。呼び出し元も撤去済み（死関数として互換のため残置）。 */
function stockToday(){ /* no-op（P33でチャンク開始時の stockFill へ移行） */ }
/* 未ストックの単語がまだ残っているか（＝新規補充の余地があるか判定） */
function anyStockableWords(){
  return allWords().some(w=>{ const st = state.words[w.i]; return !st; });
}
/* 【P33】旧 stockExtra：案Yの明示追加投入。stockFill へ委譲（互換のため関数は残す）。 */
function stockExtra(n){
  return stockFill(n);
}
function dueReviews(){
  const t = todayStr();
  return allWords()
    .filter(w => { const st=state.words[w.i]; return st && st.inReview!==false && !st.mastered && st.due <= t; })
    .sort((a,b)=>{
      const sa=state.words[a.i], sb=state.words[b.i];
      const na=((sa.cSeen||0)+(sa.wSeen||0))===0?0:1, nb=((sb.cSeen||0)+(sb.wSeen||0))===0?0:1;
      if(na!==nb) return na-nb;
      const wa=(sa.failStreak||0)>0?0:1, wb=(sb.failStreak||0)>0?0:1;
      if(wa!==wb) return wa-wb;
      return sa.due.localeCompare(sb.due) || a.i-b.i;
    });
}
/* 正答率（選択式・記述式それぞれ）: {cRate,cSeen,cCorrect,wRate,wSeen,wCorrect,reps} */
function accuracy(id){
  const st = state.words[id];
  if(!st) return null;
  const cSeen=st.cSeen||0, wSeen=st.wSeen||0;
  if(cSeen===0 && wSeen===0) return null;
  return {
    reps: st.reps||0,
    cSeen, cCorrect:st.cCorrect||0, cRate: cSeen? Math.round((st.cCorrect||0)/cSeen*100):null,
    wSeen, wCorrect:st.wCorrect||0, wRate: wSeen? Math.round((st.wCorrect||0)/wSeen*100):null
  };
}
/* 回答を1回分記録（リトライ含む・正答率の母数）。kind: "c"(選択式) | "w"(記述式) */
function recordAnswer(id, kind, ok){
  const st = state.words[id];
  /* 【P54】その日すでにセッションを解き終えた語（countedOn===today）は当日反復とみなし、正答率を汚さない。
     ガードが countedOn なのは、苦手モードでも「数えた」印が立つようにするため（gradedOn は review でしか立たない）。
     ここで止まるのは下2行の加算だけで、後段は無い（スケジュールは finalizeWord が別に持つ）。
     countedOn 未設定（新規・旧state）は today と異なるため初回扱い（正しく加算される）。 */
  if(st.countedOn === todayStr()) return;
  if(kind==="c"){ st.cSeen=(st.cSeen||0)+1; if(ok) st.cCorrect=(st.cCorrect||0)+1; }
  else{ st.wSeen=(st.wSeen||0)+1; if(ok) st.wCorrect=(st.wCorrect||0)+1; }
}
/* カード左上の統計表示（出題回数・選択式正答率・記述式正答率） */
function accStatsHtml(id){
  const a = accuracy(id);
  if(!a){ return '<span class="acc-tag">初出</span>'; }
  const c = a.cRate!=null ? `選 ${a.cRate}%` : "選 −";
  const wv = a.wRate!=null ? `記 ${a.wRate}%` : "記 −";
  return `<span class="acc-tag">出題${a.reps}回・${c}・${wv}</span>`;
}
/* チャンク終了時の定着判定。cPass/wPass = 各ブロックで2回目までに正解したか */
function finalizeWord(id, cPass, wPass){
  const st = state.words[id];
  st.reps = (st.reps||0) + 1;          // 出題回数（チャンク内+1）
  if(cPass && wPass){
    /* 定着判定1回。3回連続で「定着済」 */
    st.okStreak = (st.okStreak||0) + 1;
    st.failStreak = 0;
    st.revStage = Math.min(2, (st.revStage||0) + 1);
    if(st.okStreak >= 3){ st.mastered = true; st.due = "9999-12-31"; }
    else{
      st.step = Math.min(INTERVALS.length-1, (st.step||0) + 1);
      st.due = addDays(INTERVALS[st.step]);
    }
  }else{
    st.okStreak = 0;
    st.failStreak = (st.failStreak||0) + 1;
    if(st.failStreak >= 2){ st.revStage = 0; }
    st.step = 0; st.due = addDays(1); st.lapses = (st.lapses||0)+1;
  }
  bumpLog("reviews");
}
function bumpLog(kind){
  const t = todayStr();
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  state.log[t][kind]++;
}
function streak(){
  let n=0; const d=new Date();
  if(!state.log[todayStr(d)]) d.setDate(d.getDate()-1); // 今日未学習でも昨日まで連続なら継続扱い
  while(state.log[todayStr(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
/* 【P34】その日初回のみスタンプ（ゲスト対象外・冪等）。ログインして開いた日を記録する。 */
function ensureTodayStamp(){
  if(!(sb && currentUser)) return;          // ゲスト（未ログイン）は対象外
  if(!state.stamps || typeof state.stamps!=="object") state.stamps = {};
  const t = todayStr();
  if(state.stamps[t]) return;               // その日2回目以降は何もしない（冪等）
  state.stamps[t] = 1;
  scheduleSave();
}
/* 【P34】現在の連続日数：今日から1日ずつ遡り、stamps に在る限りカウント。
   既存 streak() と同じく、今日が未スタンプでも昨日まで連続なら継続扱い。 */
function stampStreakCurrent(){
  const st = state.stamps || {};
  let n=0; const d=new Date();
  if(!st[todayStr(d)]) d.setDate(d.getDate()-1);
  while(st[todayStr(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
/* 【P34】最長の連続日数：全スタンプ日をソートし、連続する最長ランを求める。 */
function stampStreakLongest(){
  const days = Object.keys(state.log || {}).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();   /* 【修正】学習 log 基準 */
  if(days.length===0) return 0;
  let best=1, run=1;
  for(let i=1;i<days.length;i++){
    const prev = new Date(days[i-1]+"T00:00:00");
    const cur  = new Date(days[i]+"T00:00:00");
    const diff = Math.round((cur - prev) / 86400000);   // 日数差（ローカル日付基準の00:00同士）
    if(diff===1){ run++; if(run>best) best=run; }
    else{ run=1; }
  }
  return best;
}

/* ---- 音声 (Web Speech API) ---- */
let enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  if(enVoice) u.voice = enVoice;
  u.rate = state.settings.rate;
  speechSynthesis.speak(u);
}

  const mLogin = document.getElementById("menuLogin"); if(mLogin) mLogin.onclick = ()=>{ menuDrop.classList.remove("open"); openAuthModal(); };

  }else{

       旧・案Y（extraBtn/addNewBtn）は撤去し、追加投入は完了画面の「もう1チャンク」に統合した。 */
