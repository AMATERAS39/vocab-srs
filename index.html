<style>
:root{
  --paper:#EDF0F2;
  --card:#FFFFFF;
  --ink:#1F2C38;
  --sub:#5D6B76;
  --shu:#C8452C;      /* 朱色：赤シート・強調 */
  --shu-soft:#F6E2DD;
  --midori:#2F7D5B;   /* 定着・正解 */
  --line:#D5DBE0;
  --serif:"Shippori Mincho","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.65;min-height:100vh}
.wrap{max-width:580px;margin:0 auto;padding:20px 16px 8px}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---------- ヘッダー ---------- */
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid var(--ink);padding-bottom:10px}
header h1{font-family:var(--serif);font-size:1.25rem;font-weight:700;letter-spacing:.06em}
.date-line{font-size:.78rem;color:var(--sub)}
.streak{font-size:.78rem;color:var(--shu);font-weight:700}

/* ---------- ホーム ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.queue-row{display:flex;gap:12px;margin:12px 0 16px}
.queue-box{flex:1;text-align:center;padding:12px 6px;border:1px solid var(--line);border-radius:8px}
.queue-box .num{font-family:var(--serif);font-size:1.9rem;font-weight:700;line-height:1.2}
.queue-box .lbl{font-size:.72rem;color:var(--sub)}
.queue-box.review .num{color:var(--shu)}
.btn-primary{display:block;width:100%;padding:14px;background:var(--ink);color:#fff;border-radius:8px;font-size:1rem;font-weight:700;letter-spacing:.08em}
.btn-primary:disabled{background:var(--line);color:var(--sub);cursor:default}
.panel h2{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:10px;letter-spacing:.05em}
.lv-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.8rem}
.lv-tab{width:52px;flex:none;text-align:center;color:#fff;border-radius:4px;padding:2px 0;font-weight:700;font-size:.72rem}
.bar{flex:1;height:10px;background:var(--paper);border-radius:5px;overflow:hidden;position:relative}
.bar .fill-learn{position:absolute;left:0;top:0;bottom:0;background:var(--shu);opacity:.45}
.bar .fill-master{position:absolute;left:0;top:0;bottom:0;background:var(--midori)}
.lv-cnt{width:86px;flex:none;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
.legend{font-size:.7rem;color:var(--sub);margin-top:6px}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin:0 3px 0 10px;vertical-align:middle}
details.panel{padding:0}
details.panel summary{padding:14px 18px;font-family:var(--serif);font-weight:700;font-size:.95rem;cursor:pointer;list-style:none}
details.panel summary::before{content:"▸ ";color:var(--shu)}
details.panel[open] summary::before{content:"▾ "}
details.panel .inner{padding:0 18px 18px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;font-size:.85rem}
.setting-row select,.setting-row input[type=number]{font-family:var(--sans);padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:.85rem;background:#fff}
textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:6px;padding:8px;font-size:.78rem;font-family:ui-monospace,monospace;background:#fff;color:var(--ink)}
.btn-sub{padding:8px 14px;border:1px solid var(--ink);border-radius:6px;font-size:.82rem;font-weight:500;margin:8px 8px 0 0;background:#fff}
.msg{font-size:.78rem;margin-top:8px;color:var(--midori)}
.msg.err{color:var(--shu)}
.warn-banner{background:var(--shu-soft);border:1px solid var(--shu);color:var(--shu);border-radius:8px;padding:10px 12px;font-size:.78rem;margin-bottom:14px;line-height:1.6}
.save-badge{font-size:.68rem;color:var(--sub)}
.save-badge.err{color:var(--shu);font-weight:700}
code{background:var(--paper);padding:1px 5px;border-radius:4px;font-size:.78rem}
.note{font-size:.76rem;color:var(--sub);line-height:1.7}

/* ---------- 学習カード（単語カード風） ---------- */
.session-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.8rem;color:var(--sub)}
.progress-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:18px}
.progress-track .p{height:100%;background:var(--ink);transition:width .25s ease}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 22px 22px;position:relative;box-shadow:0 2px 10px rgba(31,44,56,.06)}
.card-meta{display:flex;justify-content:flex-end;gap:8px;align-items:center;margin-bottom:8px}
.diff-stars{display:inline-flex;align-items:center}
.stars-svg{height:15px;width:75px}
.star-fill{fill:var(--shu)}
.star-empty{fill:none;stroke:var(--line);stroke-width:1.2}
.tag{font-size:.68rem;font-weight:700;color:#fff;border-radius:4px;padding:2px 8px}
.tag.mode{background:var(--sub)}
.word-display{font-family:var(--serif);font-size:2.3rem;font-weight:700;text-align:center;margin:16px 0 6px;letter-spacing:.02em;word-break:break-word}
.word-hidden{font-family:var(--serif);font-size:2.3rem;text-align:center;margin:16px 0 6px;color:var(--line);letter-spacing:.3em}
.hint{font-size:.78rem;color:var(--sub);text-align:center;margin-bottom:14px}
.hint strong{color:var(--shu)}
.audio-btn{display:block;margin:0 auto 14px;padding:10px 26px;border:1.5px solid var(--ink);border-radius:24px;font-size:.9rem;font-weight:700;background:#fff}
.dict-row{display:flex;gap:8px;margin:0 0 14px}
.dict-row input{flex:1;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:1.05rem;font-family:var(--serif)}
.dict-row .btn-sub{margin:0}
.dict-result{text-align:center;font-weight:700;margin-bottom:10px;font-size:.9rem}
.dict-result.ok{color:var(--midori)}
.dict-result.ng{color:var(--shu)}
.prompt-zone{border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.prompt-zone .meaning{font-size:.9rem}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 12px}
.choice-btn{padding:12px 6px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--serif);font-size:1rem;font-weight:700;background:#fff;word-break:break-word}
.choice-btn:disabled{opacity:.75;cursor:default}
.choice-btn.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1}
.choice-btn.wrong{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
.mode-checks{display:flex;flex-direction:column;gap:7px;font-size:.85rem;margin-bottom:12px}
.mode-checks label{display:flex;align-items:center;gap:8px}
.skip-btn{display:block;width:100%;margin-top:4px;color:var(--sub)}
.confirm-banner{background:var(--shu-soft);border-radius:6px;padding:8px 10px;font-size:.78rem;color:var(--shu);margin-bottom:14px;line-height:1.6}
.blank-block{margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--line)}
.blank-slot{color:var(--shu);font-weight:700}

{i:33,w:"doubt",l:1,c:"du(二つ)→「二つの間で心が揺れる」→疑い",e:[["名",["疑い"]],["他動",["〜を疑う","〜ではないと思う"]],["熟",[["no doubt","疑いなく"]]]]},
{i:34,w:"benefit",l:1,c:"bene(良く)+fit(なされた)→「良い働き」→利益・恩恵",e:[["名",["利益","恩恵"]],["他動",["〜のためになる"]],["句動",[["benefit from A","Aから利益を得る"]]]]},
{i:35,w:"harm",l:1,c:"「傷を与える」",e:[["名",["害"]],["他動",["〜を害する"]],["熟",[["do harm to A","Aに害を与える"]]]]},
{i:36,w:"lack",l:1,c:"「あるべき所に無い」→不足・欠く",e:[["名",["不足"]],["他動",["〜を欠いている"]],["熟",[["for lack of A","A不足のために"],["be lacking in A","Aが欠けている"]]]]},
{i:37,w:"aim",l:1,c:"「狙いを定める」→目的・目指す",e:[["名",["目的","狙い"]],["他動",[["aim A at B","AをBに向ける"]]],["句動",[["aim at A","Aを狙う"],["aim to do","〜することを目指す"]]]]},
{i:38,w:"claim",l:1,c:"clamare(叫ぶ)→「自分のものだと声を上げる」→主張・要求",e:[["他動",[["claim that ...／claim to do","〜と主張する"],"〜を〔当然の権利として〕要求する"]],["名",["主張","要求"]]]},
{i:39,w:"deal",l:1,c:"「分け与える」→分配→取引；割り当てられた分を扱う",e:[["他動",["（カードなど）を配る"]],["名",["取引"]],["句動",[["deal with A","Aを扱う；Aに対処する"],["deal in A","Aを商う"]]],["熟",[["a great deal of A","多量のA"]]]]},
{i:40,w:"charge",l:1,c:"「荷を積む」→負わせる(料金・責任・罪)；(電気を)込める=充電",e:[["名",["料金","責任","告発"]],["他動",[["charge A for B","Bの代金をAに請求する"],["charge A with B","AをBの罪で告発する"],"〜を請求する","〜を充電する"]],["熟",[["in charge of A","Aを担当して"]]]]},
/* ---- Level 2: 基本動詞・頻出語 ---- */
{i:41,w:"achieve",l:2,c:"a-+chief(頂点)→「頂点まで至る」→達成",e:[["他動",["〜を達成する"]]]},
{i:42,w:"avoid",l:2,c:"「空(void)にして身を引く」→避ける",e:[["他動",[["avoid doing","〜するのを避ける"],"〜を避ける"]]]},
{i:43,w:"compare",l:2,c:"com-+par(等しい)→「並べて等しいか見る」→比較",e:[["他動",[["compare A with B","AをBと比較する"],["compare A to B","AをBにたとえる"]]],["熟",[["compared with/to A","Aと比べると"]]]]},
{i:44,w:"consist",l:2,c:"con-+sistere(立つ)→「一緒に立って成り立つ」",e:[["句動",[["consist of A","Aから成る"],["consist in A","A〔の中〕にある（自動詞・受け身不可）"]]]]},
{i:45,w:"contain",l:2,c:"con-+tenere(保つ)→「中に保ち持つ」→含む；(感情を)中に留める=抑える",e:[["他動",["〜を含む","（感情）を抑える"]]]},
{i:46,w:"describe",l:2,c:"de-+scribere(書く)→「書き写して描き出す」→描写・説明",e:[["他動",[["describe A as B","AをBだと述べる"],"〜を描写する","〜を説明する"]]]},
{i:47,w:"develop",l:2,c:"de-(逆)+velop(包む)→「包みを開く」→潜在力を開いて伸ばす",e:[["他動",["〜を発達させる","〜を開発する"]],["自動",["発達する"]]]},
{i:48,w:"discover",l:2,c:"dis-(逆)+cover(覆う)→「覆いを外す」→発見",e:[["他動",["〜を発見する"]]]},
{i:49,w:"encourage",l:2,c:"en-(中に与える)+courage(勇気)→「勇気を吹き込む」→励ます・促す",e:[["他動",[["encourage A to do","Aに〜するよう促す"],"〜を励ます","〜を促進する"]]]},
{i:50,w:"establish",l:2,c:"stabilis(安定)→「安定して据え付ける」→設立・確立",e:[["他動",["〜を設立する","〜を確立する"]]]},
{i:51,w:"examine",l:2,c:"「秤にかけて調べる」→検査・診察",e:[["他動",["〜を調べる","〜を診察する"]]]},
{i:52,w:"exist",l:2,c:"ex-(外に)+sistere(立つ)→「外に立ち現れている」→存在する",e:[["自動",["存在する"]]]},
{i:53,w:"expect",l:2,c:"ex-(外を)+spect(見る)→「外を見て待ち構える」→予期・期待",e:[["他動",[["expect A to do","Aが〜すると思う"],"〜を予期する","〜を期待する"]]]},
{i:54,w:"explain",l:2,c:"ex-+planus(平ら)→「平らに広げて見せる」→説明",e:[["他動",[["explain A to B","AをBに説明する"],"〜を説明する"]]]},
{i:55,w:"express",l:2,c:"ex-(外へ)+press(押す)→「押し出す」→表現；押し出されて直行する=急行",e:[["他動",[["express oneself","自分の考えを述べる"],"〜を表現する"]],["形",["急行の","明確な"]],["名",["急行"]]]},
{i:56,w:"gain",l:2,c:"「手に入れて増やす」→獲得・増加",e:[["他動",["〜を得る"]],["自動",["増す","（時計が）進む"]],["名",["増加","利益"]]]},
{i:57,w:"improve",l:2,c:"「利益ある状態へ持っていく」→改善",e:[["他動",["〜を改善する"]],["自動",["良くなる"]]]},
{i:58,w:"include",l:2,c:"in-+claudere(閉じる)→「中に閉じ込める」→含む",e:[["他動",["〜を含む"]]]},
{i:59,w:"indicate",l:2,c:"index(人差し指)と同源→「指で指し示す」→示す",e:[["他動",["〜を示す","〜を指摘する"]]]},
{i:60,w:"involve",l:2,c:"in-+volvere(巻く)→「中に巻き込む」→含む・巻き込む",e:[["他動",[["be involved in A","Aに関わっている"],"〜を含む・伴う","〜を巻き込む"]]]},
{i:61,w:"maintain",l:2,c:"manu(手)+tenere(保つ)→「手で保ち続ける」→維持；立場を保つ=主張",e:[["他動",[["maintain that ...","〜と主張する"],"〜を維持する"]]]},
{i:62,w:"mention",l:2,c:"mens(心)→「心に浮かんだことを口にする」→言及",e:[["他動",["〜に言及する"]],["名",["言及"]],["熟",[["Don't mention it.","どういたしまして"]]]]},
{i:63,w:"occur",l:2,c:"ob-+currere(走る)→「こちらへ走り出てくる」→起こる；心に走り込む=ふと浮かぶ",e:[["自動",["起こる"]],["句動",[["occur to A","〔考えが〕Aの心にふと浮かぶ"]]]]},
{i:64,w:"prefer",l:2,c:"prae-(前に)+ferre(運ぶ)→「前に置く」→優先して好む",e:[["他動",[["prefer A to B","BよりAを好む"],["prefer to do","〜するほうを好む"],"〜のほうを好む"]]]},
{i:65,w:"prevent",l:2,c:"prae-(先に)+venire(来る)→「先回りして立ちふさがる」→妨げる・防ぐ",e:[["他動",[["prevent A from doing","Aが〜するのを妨げる"],"〜を妨げる","〜を防ぐ"]]]},
{i:66,w:"realize",l:2,c:"「real(現実)にする」→実現する；現実として受け止める=悟る",e:[["他動",[["realize that ...","〜に気づく・悟る"],"〜を実現する"]]]},
{i:67,w:"recognize",l:2,c:"re-(再び)+cognoscere(知る)→「再び知る」→見分ける・認める",e:[["他動",["〜を認識する・見分ける","〜を〔正当と〕認める"]]]},
{i:68,w:"reduce",l:2,c:"re-(後ろへ)+ducere(導く)→「引き戻す」→減らす",e:[["他動",["〜を減らす"]]]},
{i:69,w:"refer",l:2,c:"re-+ferre(運ぶ)→「〜のところへ持っていく」→言及・参照",e:[["句動",[["refer to A","Aに言及する；Aを参照する"],["refer to A as B","AをBと呼ぶ"]]]]},
{i:70,w:"regard",l:2,c:"re-+garder(見る)→「じっと見る」→〜と見る(みなす)・敬意",e:[["他動",[["regard A as B","AをBとみなす"]]],["名",["尊敬","配慮"]],["熟",[["with regard to A","Aに関して"]]]]},
{i:71,w:"remain",l:2,c:"re-(後ろに)+manere(とどまる)→「あとに残りとどまる」",e:[["自動",["〜のままである","残る"]],["名",["（複数形）遺跡","残り"]]]},
{i:72,w:"require",l:2,c:"re-(繰り返し)+quaerere(求める)→「強く求める」→必要とする・要求",e:[["他動",[["require A to do","Aに〜するよう求める"],"〜を必要とする","〜を要求する"]]]},
{i:73,w:"seek",l:2,c:"「探し求めて追う」",e:[["他動",[["seek to do","〜しようと努める"],"〜を探し求める"]],["句動",[["seek for/after A","Aを探し求める"]]]]},
{i:74,w:"solve",l:2,c:"solvere(ゆるめる)→「固く結ばれたものを解きほぐす」→解決・解く",e:[["他動",["〜を解決する","〜を解く"]]]},
{i:75,w:"suggest",l:2,c:"sub-(下から)+gerere(運ぶ)→「下からそっと差し出す」→提案・示唆",e:[["他動",[["suggest doing","〜を提案する"],"〜を示唆する"]]]},
{i:76,w:"suppose",l:2,c:"sub-(下に)+ponere(置く)→「土台として下に置く」→仮定・思う",e:[["他動",[["be supposed to do","〜することになっている"],"〜と思う","〜と仮定する"]]]},
{i:77,w:"tend",l:2,c:"tendere(張る・伸ばす)→「〜の方へ伸びていく」→傾向",e:[["自動",[["tend to do","〜する傾向がある"]]],["句動",[["tend toward A","Aの傾向がある"]]]]},
{i:78,w:"vary",l:2,c:"varius(まだら)→「まだら模様のように様々」→変化・多様",e:[["自動",[["vary from A to B","AからBまで様々である"],"変わる","さまざまである"]],["他動",["〜を変える"]]]},
{i:79,w:"attitude",l:2,c:"「心身の構え」→態度・考え方",e:[["名",["態度","考え方"]],["熟",[["attitude toward A","Aに対する態度"]]]]},
{i:80,w:"knowledge",l:2,c:"know→「知られている中身」→知識",e:[["名",["知識"]]]},
/* ---- Level 3: 中級（形容詞・動詞） ---- */
{i:81,w:"significant",l:3,c:"signum(しるし)→「意味のしるしを帯びる」→重要な・意義深い",e:[["形","重要な；意義深い；かなりの"]]},
{i:82,w:"essential",l:3,c:"「本質(essence)に関わる」→不可欠・本質的",e:[["形","不可欠の（be essential to/for A：Aに不可欠）；本質的な"],["名","（essentials で）必需品；要点"]]},
{i:83,w:"obvious",l:3,c:"ob-(向かい)+via(道)→「道の真ん中にあり誰でも気づく」→明らか",e:[["形","明らかな（It is obvious that ...：〜は明白だ）"]]},
{i:84,w:"appropriate",l:3,c:"ad-+proprius(固有の)→「その場に固有=ぴったり合う」→適切",e:[["形","適切な（be appropriate for A：Aにふさわしい）"]]},
{i:85,w:"available",l:3,c:"valere(力がある)→「役立つ状態でそこにある」→利用可能",e:[["形","利用できる；入手できる；手が空いている"]]},
{i:86,w:"aware",l:3,c:"ware(見張る)→「用心して気づいている」",e:[["形","be aware of A／be aware that ...：Aに・〜だと気づいている"]]},
{i:87,w:"complex",l:3,c:"com-+plectere(編む)→「編み合わさった」→複雑；編み合わさった建物群=複合施設",e:[["形","複雑な"],["名","複合施設；コンプレックス"]]},
{i:88,w:"considerable",l:3,c:"「considerする(考慮する)に値するほどの」→かなりの",e:[["形","かなりの"]]},
{i:89,w:"crucial",l:3,c:"crux(十字路)→「分かれ道を決する」→決定的に重要",e:[["形","決定的に重要な（be crucial to/for A：Aにとって極めて重要）"]]},
{i:90,w:"evident",l:3,c:"e-(外に)+videre(見える)→「外から見えている」→明白",e:[["形","明白な"]]},
{i:91,w:"abandon",l:3,c:"a-+bandon(支配権)→「支配権を明け渡す」→捨てる・断念",e:[["他動","〜を捨てる；〜を断念する（abandon doing）"]]},
{i:92,w:"absorb",l:3,c:"ab-+sorbere(吸う)→「吸い込む」→吸収；心を吸い込む=夢中にさせる",e:[["他動","〜を吸収する（be absorbed in A：Aに夢中である）"]]},
{i:93,w:"accompany",l:3,c:"com-+panis(パン)→「パンを共にする仲間として付き添う」",e:[["他動","〜に同行する；〜に伴う（be accompanied by A：Aを伴っている）"]]},
{i:94,w:"accomplish",l:3,c:"ad-+complere(満たす)→「最後まで満たし終える」→成し遂げる",e:[["他動","〜を成し遂げる"]]},
{i:95,w:"acquire",l:3,c:"ad-+quaerere(求める)→「求めて自分のものにする」→習得・獲得",e:[["他動","〜を習得する；〜を獲得する"]]},
{i:96,w:"adapt",l:3,c:"ad-+aptus(適した)→「合うように作り変える」→適応",e:[["自動","適応する"],["他動","〜を適応させる；〜を改作する"],["句動","adapt（oneself）to A：Aに適応する"]]},
{i:97,w:"adjust",l:3,c:"ad-+justus(正しい)→「正しい位置に合わせる」→調整",e:[["他動","〜を調整する"],["句動","adjust to A：Aに適応する"]]},
{i:98,w:"admit",l:3,c:"ad-+mittere(送る)→「中へ入れてやる」→入場許可；事実を中に入れる=認める",e:[["他動","〜を〔しぶしぶ〕認める（admit doing：〜したことを認める）；〜の入場を許す（be admitted to A：Aへの入学を認められる）"]]},
{i:99,w:"adopt",l:3,c:"ad-+optare(選ぶ)→「選び取って自分のものにする」→採用・養子",e:[["他動","〜を採用する；〜を養子にする"]]},
{i:100,w:"affect",l:3,c:"ad-+facere(作用する)→「働きかけて変化を及ぼす」→影響",e:[["他動","〜に影響を与える"]]},
{i:101,w:"analyze",l:3,c:"ana-(細かく)+lyein(解く)→「分解してほどく」→分析",e:[["他動","〜を分析する"]]},
{i:102,w:"anticipate",l:3,c:"ante-(前)+capere(取る)→「先取りする」→予期",e:[["他動","〜を予期する（anticipate doing：〜することを見込む）"]]},
{i:103,w:"appreciate",l:3,c:"ad-+pretium(価格)→「価値を正しく見積もる」→評価・感謝・鑑賞",e:[["他動","〜を正しく評価する；〜に感謝する（I would appreciate it if ...：〜していただけるとありがたい）；〜を鑑賞する"]]},
{i:104,w:"argue",l:3,c:"arguere(明らかにする)→「明らかにしようと論を交わす」→議論・主張",e:[["自動","議論する（argue with A about B：AとBについて言い争う）"],["他動","argue that ...：〜と主張する"],["句動","argue for A：Aに賛成論を述べる／argue against A：Aに反対論を述べる"]]},
{i:105,w:"arise",l:3,c:"a-+rise→「立ち上がって出てくる」→生じる",e:[["自動","生じる"],["句動","arise from A：Aから生じる"]]},
{i:106,w:"assume",l:3,c:"ad-+sumere(取る)→「(検証せず)取り込む」→仮定；役目を取り込む=引き受ける",e:[["他動","〜と〔根拠なく〕仮定する（assume that ...）；（責任など）を引き受ける"]]},
{i:107,w:"attribute",l:3,c:"ad-+tribuere(割り当てる)→「〜に割り当てる」→帰属させる；割り当てられた性質=属性",e:[["他動","attribute A to B：AをBのせいにする・Bに帰する"],["名","属性；特質"]]},
{i:108,w:"behave",l:3,c:"be-+have→「自分を保つ」→ふるまう",e:[["自動","ふるまう"],["他動","behave oneself：行儀よくする"]]},
{i:109,w:"calculate",l:3,c:"calculus(計算用の小石)→「小石を並べて数える」→計算",e:[["他動","〜を計算する"]]},
{i:110,w:"conclude",l:3,c:"con-+claudere(閉じる)→「閉じて締めくくる」→結論・終える",e:[["他動","〜と結論づける（conclude that ...）；〜を締めくくる"],["自動","終わる"]]},
{i:111,w:"concern",l:3,c:"con-+cernere(ふるい分ける)→「互いに関わり合う」→関係；心に関わる=心配",e:[["他動","〜に関係する；〜を心配させる（be concerned about A：Aを心配している／be concerned with A：Aに関係している）"],["名","関心事；心配"]]},
{i:112,w:"confuse",l:3,c:"con-+fundere(注ぐ)→「一緒に注いで混ざってしまう」→混乱・混同",e:[["他動","〜を混乱させる；confuse A with B：AをBと混同する"]]},
{i:113,w:"struggle",l:3,c:"「もがきながら争う」→奮闘",e:[["自動","奮闘する（struggle to do：〜しようともがく）"],["名","奮闘；闘争"],["句動","struggle with/against A：Aと格闘する"]]},
{i:114,w:"emphasize",l:3,c:"em-+phainein(見せる)→「中身を強く見せつける」→強調",e:[["他動","〜を強調する"]]},
{i:115,w:"estimate",l:3,c:"aestimare(値踏みする)→「価値を見積もる」→見積もり・推定",e:[["他動","〜を見積もる・推定する"],["名","見積もり；推定"]]},
{i:116,w:"identify",l:3,c:"idem(同じ)→「同一のものだと見定める」→特定；自分と同一視する",e:[["他動","〜を特定する；identify A as B：AをBだと確認する"],["句動","identify with A：Aに共感する・一体感を持つ"]]},
{i:117,w:"ignore",l:3,c:"in-(否)+gnoscere(知る)→「知らないことにする」→無視",e:[["他動","〜を無視する"]]},
{i:118,w:"imply",l:3,c:"in-+plicare(折る)→「中に折り込む」→暗に含む",e:[["他動","〜を暗に意味する；〜をほのめかす"]]},
{i:119,w:"insist",l:3,c:"in-+sistere(立つ)→「その上に立って動かない」→強く主張・要求",e:[["他動","insist that S（should）do：〜すべきだと強く主張する"],["句動","insist on A／doing：Aを要求する；〜すると言い張る"]]},
{i:120,w:"observe",l:3,c:"ob-+servare(注意を払う)→「注意を向け続ける」→観察；規則に注意を払う=遵守",e:[["他動","〜を観察する；〜と述べる；（規則）を守る"]]},

function todayStr(d=new Date()){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
function addDays(days){
  const d=new Date(); d.setDate(d.getDate()+days); return todayStr(d);
}
function allWords(){ const c = Array.isArray(state.custom) ? state.custom : []; return BUILTIN.concat(c).filter(w => w && typeof w === "object" && w.i != null); }
function byId(id){ return allWords().find(w=>w.i===id); }

/* 保存の三段フォールバック: window.storage(アーティファクト) → localStorage(通常ブラウザ) → メモリのみ */
let saveTimer = null, dirty = false;
const persistInfo = { backend:null, failed:false };

async function backendSet(key, val){
  if(sb && currentUser){
    try{
      const { error } = await sb.from("user_data")
        .upsert({ user_id: currentUser.id, data: val, updated_at: new Date().toISOString() });
      if(!error){ persistInfo.backend = "cloud"; persistInfo.failed = false; return true; }
    }catch(e){ /* ネット不通など → ローカルへ退避 */ }
  }
  if(window.storage && typeof window.storage.set === "function"){
    try{
      const r = await window.storage.set(key, val);
      if(r){ persistInfo.backend = "artifact"; persistInfo.failed = false; return true; }
    }catch(e){ /* レート制限・非対応 → 次の手段へ */ }
  }
  try{
    localStorage.setItem(key, val);
    persistInfo.backend = "local"; persistInfo.failed = false; return true;
  }catch(e){ /* localStorage も不可 */ }
  persistInfo.backend = "memory"; persistInfo.failed = true; return false;
}
async function backendGet(key){
  if(sb && currentUser){
    try{
      const { data, error } = await sb.from("user_data")
        .select("data").eq("user_id", currentUser.id).maybeSingle();
      if(!error){ persistInfo.backend = "cloud"; return data ? data.data : null; }
    }catch(e){ /* 取得失敗 → ローカルへ */ }
  }
  if(window.storage && typeof window.storage.get === "function"){
    try{
      const r = await window.storage.get(key);
      if(r && r.value != null){ persistInfo.backend = "artifact"; return r.value; }
    }catch(e){ /* 初回はキー無しで例外 → 次の手段へ */ }
  }
  try{
    const v = localStorage.getItem(key);
    if(v != null){ if(!persistInfo.backend) persistInfo.backend = "local"; return v; }
  }catch(e){}
  return null;
}
function updateSaveBadge(status){
  const el = document.getElementById("saveBadge");
  if(!el) return;
  if(status === "saved"){ el.className = "save-badge"; el.textContent = "保存済み ✓"; }
  else if(status === "pending"){ el.className = "save-badge"; el.textContent = "保存待ち…"; }
  else{ el.className = "save-badge err"; el.textContent = "⚠ 保存不可（要バックアップ）"; }
}
function scheduleSave(){ // 採点のたびに呼ぶ。2秒に1回にまとめてレート制限を回避
  dirty = true;
  updateSaveBadge("pending");
  if(saveTimer) return;
  saveTimer = setTimeout(flushSave, 2000);
}
async function flushSave(){ // 即時保存（設定変更・セッション終了・離脱時）
  if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
  if(!dirty){ updateSaveBadge(persistInfo.failed ? "error" : "saved"); return !persistInfo.failed; }
  const ok = await backendSet(STORE_KEY, JSON.stringify(state));
  if(ok) dirty = false;
  updateSaveBadge(ok ? "saved" : "error");
  return ok;
}
function saveState(){ dirty = true; return flushSave(); }
async function loadState(){
  const v = await backendGet(STORE_KEY);
  if(v){
    try{
      const s = JSON.parse(v);
      state = Object.assign(state, s);
      if(!Array.isArray(state.custom)) state.custom = [];
      state.settings = Object.assign({newPerDay:30,rate:0.95,difficulty:1}, s.settings||{});
      delete state.settings.modes; // 旧設定の掃除
      /* 旧difficulty(easy/mid/hard)を☆数値へ移行 */
      if(typeof state.settings.difficulty === "string"){
        state.settings.difficulty = ({easy:1,mid:2,hard:3})[state.settings.difficulty] || 1;
      }
    }catch(e){ /* 壊れたデータは無視して初期状態 */ }
  }
}

/* ---- 今日のキュー ---- */
/* ---- ストック方式 ----
   開いた日に未出単語を newPerDay 語だけ「ストック（学習対象）」に登録する。
   登録=state.words にエントリ作成（step0, 翌日から復習対象）。以降 SRS で出題。 */
function stockToday(){
  const t = todayStr();
  if(state.log[t] && state.log[t].stocked!=null) return;
  let diff = chunkStars();
  const candidates = d => allWords().filter(w=>{ const st=state.words[w.i]; return (!st || st.inReview===false) && w.l<=d; }).sort((a,b)=>a.i-b.i);
  let fresh = candidates(diff);
  /* ②難易度自動昇格：☆N以下の未ストック語が尽きたら☆を上げる */
  while(fresh.length===0 && diff<5){ diff++; fresh = candidates(diff); }
  if(diff !== chunkStars()) state.settings.difficulty = diff;
  fresh = fresh.slice(0, state.settings.newPerDay);
  for(const w of fresh) ensureWordRecord(w.i, true);
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  state.log[t].stocked = fresh.length;
  saveState();
}
function dueReviews(){
  const t = todayStr();
  return allWords()
    .filter(w => { const st=state.words[w.i]; return st && st.inReview!==false && !st.mastered && st.due <= t; })
    .sort((a,b)=>{
      const sa=state.words[a.i], sb=state.words[b.i];
      const na=((sa.cSeen||0)+(sa.wSeen||0))===0?0:1, nb=((sb.cSeen||0)+(sb.wSeen||0))===0?0:1;
      if(na!==nb) return na-nb;
      const wa=(sa.failStreak||0)>0?0:1, wb=(sb.failStreak||0)>0?0:1;
      if(wa!==wb) return wa-wb;
      return sa.due.localeCompare(sb.due) || a.i-b.i;
    });
}
/* 正答率（選択式・記述式それぞれ）: {cRate,cSeen,cCorrect,wRate,wSeen,wCorrect,reps} */
function accuracy(id){
  const st = state.words[id];
  if(!st) return null;
  const cSeen=st.cSeen||0, wSeen=st.wSeen||0;
  if(cSeen===0 && wSeen===0) return null;
  return {
    reps: st.reps||0,
    cSeen, cCorrect:st.cCorrect||0, cRate: cSeen? Math.round((st.cCorrect||0)/cSeen*100):null,
    wSeen, wCorrect:st.wCorrect||0, wRate: wSeen? Math.round((st.wCorrect||0)/wSeen*100):null
  };
}
/* 回答を1回分記録（リトライ含む・正答率の母数）。kind: "c"(選択式) | "w"(記述式) */
function recordAnswer(id, kind, ok){
  const st = state.words[id];
  if(kind==="c"){ st.cSeen=(st.cSeen||0)+1; if(ok) st.cCorrect=(st.cCorrect||0)+1; }
  else{ st.wSeen=(st.wSeen||0)+1; if(ok) st.wCorrect=(st.wCorrect||0)+1; }
}
/* カード左上の統計表示（出題回数・選択式正答率・記述式正答率） */
function accStatsHtml(id){
  const a = accuracy(id);
  if(!a){ return '<span class="acc-tag">初出</span>'; }
  const c = a.cRate!=null ? `選 ${a.cRate}%` : "選 −";
  const wv = a.wRate!=null ? `記 ${a.wRate}%` : "記 −";
  return `<span class="acc-tag">出題${a.reps}回・${c}・${wv}</span>`;
}
/* チャンク終了時の定着判定。cPass/wPass = 各ブロックで2回目までに正解したか */
function finalizeWord(id, cPass, wPass){
  const st = state.words[id];
  st.reps = (st.reps||0) + 1;          // 出題回数（チャンク内+1）
  if(cPass && wPass){
    /* 定着判定1回。3回連続で「定着済」 */
    st.okStreak = (st.okStreak||0) + 1;
    st.failStreak = 0;
    st.revStage = Math.min(2, (st.revStage||0) + 1);
    if(st.okStreak >= 3){ st.mastered = true; st.due = "9999-12-31"; }
    else{
      st.step = Math.min(INTERVALS.length-1, (st.step||0) + 1);
      st.due = addDays(INTERVALS[st.step]);
    }
  }else{
    st.okStreak = 0;
    st.failStreak = (st.failStreak||0) + 1;
    if(st.failStreak >= 2){ st.revStage = 0; }
    st.step = 0; st.due = addDays(1); st.lapses = (st.lapses||0)+1;
  }
  bumpLog("reviews");
}
function bumpLog(kind){
  const t = todayStr();
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  state.log[t][kind]++;
}
function streak(){
  let n=0; const d=new Date();
  if(!state.log[todayStr(d)]) d.setDate(d.getDate()-1); // 今日未学習でも昨日まで連続なら継続扱い
  while(state.log[todayStr(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}

/* ---- 音声 (Web Speech API) ---- */
let enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  if(enVoice) u.voice = enVoice;
  u.rate = state.settings.rate;
  speechSynthesis.speak(u);
}

/* ---- セッション ----
   各語を選択式→(誤答/スキップ時のみ確認)→記述式→判定 の順で処理する。
   判定(SRSの間隔更新)は記述式の結果のみで行う。 */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
/* --- 語義データの正規化（新旧両構造を吸収）---
   新: [品詞, [候補,...]]  候補 = "日本語" | ["原形パターン","日本語訳"]
   旧: [品詞, "訳；訳"]
   返り値: [{pos, ja:[日本語訳...], cands:[表示用候補...]}]
   ja: 選択式の正解候補（日本語のみ）  cands: 確認・参照モード用の全表示 */
const POS_ORDER = {"自動":0,"他動":1,"名":2,"形":3,"副":4,"句動":5,"熟":6};
function normEntries(w){
  const arr = w.e.map(ent=>{
    const pos = ent[0];
    const raw = ent[1];
    if(Array.isArray(raw)){
      const items = raw.map(c=>Array.isArray(c)?{ja:c[1], pat:c[0]}:{ja:c, pat:null});
      const ja = items.map(x=>x.ja);
      const cands = items.map(x=>x.pat?(x.pat+"："+x.ja):x.ja);
      return {pos, ja, cands, items};
    }else{
      const parts = String(raw).split("；").map(s=>s.trim()).filter(Boolean);
      const jaArr = parts.length?parts:[String(raw)];
      return {pos, ja:jaArr, cands:[String(raw)], items:jaArr.map(j=>({ja:j, pat:null}))};
    }
  });
  /* 品詞順に安定ソート（自動→他動→名→形→副→句動→熟） */
  return arr.map((e,idx)=>({e,idx})).sort((a,b)=>{
    const pa = POS_ORDER[a.e.pos]??99, pb = POS_ORDER[b.e.pos]??99;
    return (pa-pb) || (a.idx-b.idx);
  }).map(x=>x.e);
}
/* 確認・記述式で表示する全訳リスト（品詞ラベル＋全候補） */
function fullEntriesHtml(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`
  ).join("");
}
function promptEntries(w){
  return fullEntriesHtml(w);
}
/* 記述式の問題文用：英熟語パターンを出さず、日本語訳のみを表示 */
function jaOnlyEntries(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.ja.join("／"))}</span></div>`
  ).join("");
}
/* 空欄数を復習段階(revStage)で決める。
   revStage 0(初回): 1個以上 かつ 全区分の25%未満
   revStage 1(復習1回目): 25%以上75%未満
   revStage 2(2回目以降): 75%以上
   範囲内は個数ランダム。最低1個は絶対。 */
function blankCountByStage(posCount, revStage){
  if(posCount <= 1) return 1;
  const lo25 = posCount*0.25, hi75 = posCount*0.75;
  let min, max;
  if(revStage <= 0){          // 25%未満
    min = 1; max = Math.max(1, Math.ceil(lo25) - 1);
    if(lo25 === Math.floor(lo25)) max = Math.max(1, lo25 - 1); // ちょうど25%は含めない
    max = Math.min(max, posCount);
  }else if(revStage === 1){    // 25%以上75%未満
    min = Math.max(1, Math.ceil(lo25));
    max = Math.max(min, Math.ceil(hi75) - 1);
    if(hi75 === Math.floor(hi75)) max = Math.max(min, hi75 - 1);
    max = Math.min(max, posCount);
  }else{                       // 75%以上
    min = Math.max(1, Math.ceil(hi75));
    max = posCount;
  }
  if(min > max) min = max;
  return min + Math.floor(Math.random()*(max - min + 1)); // 範囲内ランダム
}
/* チャンク（今回出題される語群）の難易度☆(1〜5)＝設定difficulty */
function chunkStars(){
  return Math.max(1, Math.min(5, state.settings.difficulty||1));
}
function starHtml(d){
  d = Math.max(1, Math.min(5, d));
  let s = '<svg class="stars-svg" viewBox="0 0 '+(5*15)+' 15" aria-hidden="true">';
  for(let i=0;i<5;i++){
    const cx=i*15+7.5;
    const pts=starPoints(cx,7.5,6.5);
    s += '<polygon points="'+pts+'" class="'+(i<d?"star-fill":"star-empty")+'"/>';
  }
  return s+'</svg>';
}
function starPoints(cx,cy,r){
  const ri=r*0.42; let p=[];
  for(let k=0;k<10;k++){ const ang=-Math.PI/2 + k*Math.PI/5; const rad=(k%2===0)?r:ri;
    p.push((cx+rad*Math.cos(ang)).toFixed(2)+','+(cy+rad*Math.sin(ang)).toFixed(2)); }
  return p.join(' ');
}
/* 品詞ごとの訳プールを作る（誤答肢の品詞統一用）。品詞 -> [訳,...] */
function jaPoolByPos(excludeId, sameLv){
  const pool = {};
  for(const x of allWords()){
    if(x.i === excludeId) continue;
    if(sameLv!=null && (x.l===sameLv) !== true) continue;
    for(const e of normEntries(x)){
      (pool[e.pos] = pool[e.pos] || []).push(...e.ja);
    }
  }
  return pool;
}
/* 選択式の問題を生成：
   各区分から候補(items)を1つランダムに選んで正解とし、
   誤答肢3つは「同じ品詞」の他語の訳から（不足時は他品詞で補充）。
   正解候補がパターン付きなら、そのパターンを問題文表示用に保持 */
function makePosQuiz(w){
  const norm = normEntries(w);
  const st = state.words[w.i];
  const revStage = st ? (st.revStage||0) : 0;
  const nBlank = blankCountByStage(norm.length, revStage);
  const idxs = shuffle(norm.map((_,k)=>k)).slice(0, nBlank).sort((a,b)=>a-b);
  const ownJa = new Set(norm.flatMap(e=>e.ja));
  const poolSameLv = jaPoolByPos(w.i, w.l);
  const poolAll = jaPoolByPos(w.i, null);
  const quizzes = {};   // k -> {correct, pat, opts:[...]}
  for(const k of idxs){
    const pos = norm[k].pos;
    const it = norm[k].items[Math.floor(Math.random()*norm[k].items.length)]; // 候補を1つ
    const correct = it.ja;
    /* 誤答肢：同品詞・同レベル → 同品詞・全レベル → 全品詞、の順で補充 */
    const distractors = [];
    const tryPush = (arr)=>{
      for(const cand of shuffle(arr.slice())){
        if(distractors.length >= 3) break;
        if(cand === correct || ownJa.has(cand) || distractors.includes(cand)) continue;
        distractors.push(cand);
      }
    };
    tryPush(poolSameLv[pos] || []);
    if(distractors.length < 3) tryPush(poolAll[pos] || []);
    if(distractors.length < 3){ // 最終フォールバック：全品詞から
      const flat = Object.values(poolAll).flat();
      tryPush(flat);
    }
    quizzes[k] = { correct, pat: it.pat || null, opts: shuffle([correct].concat(distractors)) };
  }
  return { blanks:idxs, quizzes };
}
function buildQueue(mode){
  let ids;
  if(mode === "weak"){
    const lowRate = (st)=>{
      const cr = (st.cSeen)? st.cCorrect/st.cSeen : 1;
      const wr = (st.wSeen)? st.wCorrect/st.wSeen : 1;
      return Math.min(cr, wr);
    };
    const seenAny = (st)=> (st.cSeen||0)+(st.wSeen||0);
    ids = allWords().filter(w=>{ const st=state.words[w.i]; return st && seenAny(st)>0 && !st.mastered && lowRate(st)<0.6; })
      .sort((a,b)=>{
        const sa=state.words[a.i], sb=state.words[b.i];
        const ra=lowRate(sa), rb=lowRate(sb);
        if(ra!==rb) return ra-rb;
        return seenAny(sb)-seenAny(sa);
      })
      .slice(0, 30)
      .map(w=>({id:w.i}));
  }else{
    ids = dueReviews().map(w=>({id:w.i}));
  }
  return ids.map(x=>{
    const w = byId(x.id);
    return {
      id:x.id,
      quiz: makePosQuiz(w),
      picks:{}, choiceDone:false, choiceOk:null, confirming:false,
      cTries:0, cPassed:false, cFailed:false,
      answeredWrite:false, writeOk:null, confirmingW:false,
      wTries:0, wPassed:false, wFailed:false
    };
  });
}
function startSession(mode){
  const queue = buildQueue(mode||"review");
  if(queue.length===0) return;
  /* block: choice→write。各ブロックで phase: "main"(全語1回目)→"retry"(間違えた語の2回目) */
  session = { queue, block:"choice", phase:"main", order:queue.map((_,i)=>i), pos:0,
              retry:[], mode:(mode||"review"), counts:{ok:0,ng:0} };
  saveSession();
  renderCard();
}
/* セッションの途中状態を保存／復元（完全復元用） */
function curItem(){
  const s = session;
  if(!s || s.pos >= s.order.length) return null;
  return s.queue[s.order[s.pos]];
}
/* 現ブロック・フェーズを1つ進める。フェーズ/ブロックの遷移も処理 */
function advance(){
  const s = session;
  s.pos++;
  if(s.pos < s.order.length){ saveSession(); return renderCard(); }
  /* order を消化しきった */
  if(s.phase === "main"){
    if(s.retry.length){
      s.phase = "retry"; s.order = s.retry.slice(); s.retry = []; s.pos = 0;
      saveSession(); return renderCard();
    }
    // retry無し → 次ブロックへ
    return nextBlock();
  }else{ // retryフェーズ終了
    return nextBlock();
  }
}
function nextBlock(){
  const s = session;
  if(s.block === "choice"){
    s.block = "write"; s.phase = "main";
    s.order = s.queue.map((_,i)=>i); s.retry = []; s.pos = 0;
    saveSession(); return renderCard();
  }
  /* 記述式も終了 → 全語の最終判定 */
  finalizeSession();
}
/* 全語の定着/未定着を確定し、SRSへ反映 */
function finalizeSession(){
  const s = session;
  for(const item of s.queue){
    const both = item.cPassed && item.wPassed;
    if(s.mode === "review"){
      finalizeWord(item.id, item.cPassed, item.wPassed);
    }
    if(both) s.counts.ok++; else s.counts.ng++;
  }
  renderDone();
}
function saveSession(){
  state.activeSession = session ? {
    queue: session.queue, block: session.block, phase: session.phase,
    order: session.order, pos: session.pos, retry: session.retry,
    mode: session.mode, counts: session.counts
  } : null;
  scheduleSave();
}
function resumeSession(){
  const a = state.activeSession;
  if(!a) return false;
  session = { queue:a.queue, block:a.block||"choice", phase:a.phase||"main",
              order:a.order||a.queue.map((_,i)=>i), pos:a.pos||0, retry:a.retry||[],
              mode:a.mode||"review", counts:a.counts||{ok:0,ng:0} };
  renderCard();
  return true;
}
function renderCard(){
  const s = session;
  const item = curItem();
  if(!item){ return; }
  const w = byId(item.id);
  const retryTag = s.phase==="retry" ? "（2回目）" : "";
  const blockLabel = (s.block==="choice" ? "① 選択式" : "② 記述式") + retryTag;
  const pct = Math.round(s.pos / Math.max(1,s.order.length) * 100);

  let body = "";
  if(s.block === "choice"){
    if(item.confirming){
      const wrongC = item.quiz.blanks
        .filter(k=>item.picks[k] && item.picks[k] !== item.quiz.quizzes[k].correct)
        .map(k=>`<div class="wrong-line">✕ あなたの解答：${esc(item.picks[k])}</div>`).join("");
      body = `${confirmCardBody(w, wrongC)}
        <button class="btn-primary" data-act="choiceConfirmNext">Next</button>`;
    }else{
      body = renderChoiceBody(item, w, false);
    }
  }else{
    if(item.confirmingW){
      const wrongW = `<div class="wrong-line">✕ あなたの解答：${esc(item.lastInput||"（スキップ）")}</div>`;
      body = `${confirmCardBody(w, wrongW)}
        <button class="btn-primary" data-act="writeConfirmNext">Next</button>`;
    }else{
      body = renderWriteBody(item, w);
    }
  }

  const modeTag = s.mode==="weak" ? '<span class="tag" style="background:var(--shu)">苦手</span>' : '';

  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-act="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${s.pos+1} / ${s.order.length}</span>
      <span class="tag mode">${blockLabel}</span>
    </div>
    <div class="progress-track"><div class="p" style="width:${pct}%"></div></div>
    <div class="wcard">
      <div class="card-meta">
        <span class="diff-stars" title="難易度">${starHtml(chunkStars())}</span>
        ${accStatsHtml(item.id)}
        <span style="margin-left:auto"></span>${modeTag}
      </div>
      ${body}
    </div>`;

  app.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick = (ev)=>{ ev.preventDefault(); handleAct(el.dataset.act, el); };
  });
  const win = document.getElementById("writeIn");
  if(win && !item.answeredWrite){
    win.focus();
    win.onkeydown = e=>{ if(e.key==="Enter") handleAct("writeCheck"); };
  }
}

/* ---- 選択式（品詞別・訳選択）の本体 ---- */
function renderChoiceBody(item, w, strict){
  const q = item.quiz;
  const norm = normEntries(w);
  const rows = norm.map((e,k)=>{
    const isBlank = q.blanks.includes(k);
    if(!isBlank){
      return `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`;
    }
    const picked = item.picks[k];
    const correct = q.quizzes[k].correct;
    const pat = q.quizzes[k].pat;
    const optHtml = q.quizzes[k].opts.map(o=>{
      let cls = "opt-btn";
      if(item.choiceDone){
        if(o===correct) cls += " correct";
        else if(o===picked) cls += " wrong";
      }else if(o===picked){ cls += " picked"; }
      return `<button class="${cls}" data-act="pick" data-k="${k}" data-val="${esc(o)}" ${item.choiceDone?"disabled":""}>${esc(o)}</button>`;
    }).join("");
    const label = pat
      ? `<span class="pos-badge">${esc(e.pos)}</span><span class="pat-prompt">${esc(pat)}</span>`
      : `<span class="pos-badge">${esc(e.pos)}</span>`;
    return `<div class="blank-block">
      <div class="entry">${label}<span class="meaning blank-slot">${picked?esc(picked):"〔　？　〕"}</span></div>
      <div class="opt-list">${optHtml}</div>
    </div>`;
  }).join("");

  const allPicked = q.blanks.every(k=>item.picks[k]);
  let footer = "";
  if(item.choiceDone){
    footer = `<div class="dict-result ${item.choiceOk?"ok":"ng"}">${item.choiceOk?"◎ 正解":"✕ 不正解"}</div>
      <button class="audio-btn" data-act="speak">🔊 発音を確認</button>
      ${item.choiceOk
        ? `<button class="btn-primary" data-act="choiceNext">Next</button>`
        : `<button class="btn-primary" data-act="choiceCheckWord">Check</button>`}`;
  }else{
    footer = `<button class="btn-primary" data-act="choiceCheck" ${allPicked?"":"disabled"}>解答</button>`;
  }
  return `<div class="word-display">${esc(w.w)}</div>
    <div class="prompt-zone">${rows}</div>
    ${footer}`;
}

/* ---- 確認カード共通本体 ---- */
function confirmCardBody(w, wrongHtml){
  const a = accuracy(w.i);
  const accLine = a ? `<div class="acc-line">出題 ${a.reps}回　選択式 ${a.cRate!=null?a.cRate+"%":"−"}　記述式 ${a.wRate!=null?a.wRate+"%":"−"}</div>` : "";
  return `<div class="word-display" style="font-size:1.7rem">${esc(w.w)}</div>
    ${accLine}
    ${wrongHtml||""}
    ${w.c ? `<div class="core-line"><span class="core-label">コア</span>${esc(w.c)}</div>` : ""}
    <button class="audio-btn" data-act="speak">🔊 発音を聞く</button>
    <div class="prompt-zone">${promptEntries(w)}</div>`;
}

/* ---- 記述式の本体 ---- */
function renderWriteBody(item, w){
  const secondFail = session && session.mode==="review" && item.wTries>=2;
  const ngMsg = "✕ 不正解（正: "+esc(w.w)+"）— " + (secondFail ? "翌日やり直し" : "確認しよう");
  return `<div class="hint">意味に合う英単語をスペルまで正確に入力（Enterで判定）</div>
    <div class="prompt-zone">${jaOnlyEntries(w)}</div>
    <div class="dict-row">
      <input id="writeIn" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="英単語を入力" ${item.answeredWrite?"disabled":""}>
      <button class="btn-sub" data-act="writeCheck" ${item.answeredWrite?"disabled":""}>判定</button>
      <button class="btn-sub" data-act="writeSkip" ${item.answeredWrite?"disabled":""}>スキップ</button>
    </div>
    ${item.answeredWrite ? `
      <div class="dict-result ${item.writeOk?"ok":"ng"}">${item.writeOk?"◎ 正解":ngMsg}</div>
      <div class="answer-zone" style="border:none;padding-top:6px">
        <div class="word-display" style="font-size:1.4rem;margin:0 0 8px">${esc(w.w)}</div>
        ${w.c ? `<div class="core-line"><span class="core-label">コア</span>${esc(w.c)}</div>` : ""}
        ${promptEntries(w)}
      </div>
      <button class="audio-btn" data-act="speak">🔊 発音を確認</button>
      ${item.writeOk
        ? `<button class="btn-primary" data-act="writeNext">Next</button>`
        : `<button class="btn-primary" data-act="writeCheckWord">Check</button>`}` : ""}`;
}
function handleAct(act, el){
  const s = session;
  const item = curItem();
  if(!item) return;
  const w = byId(item.id);
  if(act==="speak"){ speak(w.w); return; }
  if(act==="exit"){ saveSession(); flushSave(); renderHome(); return; }

  /* ==== ブロックA：選択式 ==== */
  if(act==="pick"){
    if(item.choiceDone) return;
    const k = parseInt(el.dataset.k);
    item.picks[k] = el.dataset.val;
    renderCard();
    return;
  }
  if(act==="choiceCheck"){ // 「解答する」
    const q = item.quiz;
    if(!q.blanks.every(k=>item.picks[k])) return;
    item.choiceDone = true;
    item.choiceOk = q.blanks.every(k=>item.picks[k] === q.quizzes[k].correct);
    item.cTries++;
    recordAnswer(item.id, "c", item.choiceOk);       // 回答回数に必ずカウント（リトライ含む）
    if(item.choiceOk) item.cPassed = true;
    else if(item.cTries >= 2) item.cFailed = true;   // 2回失敗確定
    saveSession();
    renderCard();
    speak(w.w);
    return;
  }

  if(act==="choiceCheckWord"){ // 不正解時の「Check」→確認画面
    item.confirming = true;
    saveSession();
    renderCard();
    return;
  }
  if(act==="choiceConfirmNext" || act==="choiceNext"){
    /* 選択式の1問終了。誤答かつ1回目(main)なら retry に積む */
    if(!item.choiceOk && s.phase==="main" && !item.cPassed){
      s.retry.push(s.order[s.pos]);
    }
    // 次問へ進む前に、選択式の状態をリセット（2回目再挑戦に備える）
    item.choiceDone = false; item.choiceOk = null; item.picks = {}; item.confirming = false;
    if(s.phase==="retry"){ item.quiz = makePosQuiz(w); } // 2回目は新しい問題を作る
    advance();
    return;
  }

  /* ==== ブロックB：記述式 ==== */
  if(act==="writeCheck"){ // 「判定」
    const v = (document.getElementById("writeIn").value||"").trim().toLowerCase();
    if(!v) return;
    item.answeredWrite = true;
    item.writeOk = (v === w.w.toLowerCase());
    item.lastInput = v;
    item.wTries++;
    recordAnswer(item.id, "w", item.writeOk);
    if(item.writeOk) item.wPassed = true;
    else if(item.wTries >= 2) item.wFailed = true;
    saveSession();
    renderCard();
    speak(w.w);
    return;
  }
  if(act==="writeSkip"){
    if(item.answeredWrite) return;
    item.answeredWrite = true;
    item.writeOk = false;
    item.lastInput = "";
    item.wTries++;
    recordAnswer(item.id, "w", false);
    if(item.wTries >= 2) item.wFailed = true;
    saveSession();
    renderCard();
    return;
  }
  if(act==="writeCheckWord"){ // 不正解時の「Check」→確認画面
    item.confirmingW = true;
    saveSession();
    renderCard();
    return;
  }
  if(act==="writeConfirmNext" || act==="writeNext"){
    if(!item.writeOk && s.phase==="main" && !item.wPassed){
      s.retry.push(s.order[s.pos]);
    }
    item.answeredWrite = false; item.writeOk = null; item.confirmingW = false;
    advance();
    return;
  }
}
/* キー操作は使わない。入力欄のEnterのみ有効。 */
function renderDone(){
  const c = session.counts;
  const mode = session.mode;
  session = null;
  state.activeSession = null;
  saveState();
  const label = mode==="weak" ? "苦手モード" : "今回の学習";
  app.innerHTML = `
    <div class="panel done-card">
      <div class="stamp">完了</div>
      <h2 style="font-family:var(--serif);font-size:1.1rem;margin-bottom:8px">${label}が終了</h2>
      <div class="done-stats">${mode==="review" ? `定着 ◎ ${c.ok}　未定着 ✕ ${c.ng}` : `◎ ${c.ok}　✕ ${c.ng}`}<br>連続 ${streak()} 日目。</div>
      <button class="btn-primary" id="homeBtn">ホームに戻る</button>
    </div>`;
  document.getElementById("homeBtn").onclick = renderHome;
}

/* ---- 参照モード（判定に一切関与しない全単語一覧）---- */
let refFilter = { lv:"all", q:"", sort:"std" };
function renderReference(){
  session = null;
  const words = allWords().slice().sort((a,b)=>a.i-b.i);
  const q = refFilter.q.trim().toLowerCase();
  let list = words.filter(w=>{
    if(refFilter.lv!=="all" && w.l!==parseInt(refFilter.lv)) return false;
    if(q){
      const hay = (w.w+" "+normEntries(w).flatMap(e=>e.cands).join(" ")+" "+(w.c||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  /* ⑥ 正答率ソート（選択式・記述式の合算）。未回答は末尾 */
  const combined = (w)=>{
    const st=state.words[w.i]; if(!st) return null;
    const seen=(st.cSeen||0)+(st.wSeen||0); if(!seen) return null;
    return Math.round(((st.cCorrect||0)+(st.wCorrect||0))/seen*100);
  };
  if(refFilter.sort==="desc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return rb-ra||a.i-b.i; });
  }else if(refFilter.sort==="asc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return ra-rb||a.i-b.i; });
  }
  const items = list.map(w=>{
    const [cls,label] = wordStatus(w);
    const a = accuracy(w.i);
    const rate = combined(w);
    const gcol = rate==null ? "transparent" : rate>=80 ? "var(--midori)" : rate>=60 ? "#C9A227" : "var(--shu)";
    const accHtml = a
      ? `<span class="ref-acc">出題${a.reps}回</span>`
        + (a.cRate!=null?`<span class="ref-acc ${a.cRate<60?"low":""}">選 ${a.cRate}%</span>`:"")
        + (a.wRate!=null?`<span class="ref-acc ${a.wRate<60?"low":""}">記 ${a.wRate}%</span>`:"")
      : "";
    return `<div class="ref-item">
      <div class="ref-head">
        <span class="ref-lv" style="background:${LV_COLORS[w.l]}">Lv.${w.l}</span>
        <span class="ref-word">${esc(w.w)}</span>
        <button class="ref-play" data-play="${esc(w.w)}">🔊</button>
        <span class="ref-status ${cls}">${label}</span>
      </div>
      <div class="acc-gauge" title="正答率${rate==null?"（未回答）":" "+rate+"%"}"><div class="g" style="width:${rate||0}%;background:${gcol}"></div></div>
      ${accHtml?`<div style="margin:2px 0 6px">${accHtml}</div>`:""}
      ${w.c ? `<div class="ref-core">${esc(w.c)}</div>` : ""}
      ${normEntries(w).map(e=>`<div class="ref-ent"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`).join("")}
    </div>`;
  }).join("");

  app.innerHTML = `
    <header>
      <div><h1>単語帳（参照モード）</h1>
      <div class="date-line">判定なし・閲覧のみ</div></div>
      <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a>
    </header>
    <div class="panel">
      <div class="ref-controls">
        <select id="refLv">
          <option value="all" ${refFilter.lv==="all"?"selected":""}>全レベル</option>
          ${[1,2,3,4,5].map(l=>`<option value="${l}" ${refFilter.lv==String(l)?"selected":""}>Lv.${l} のみ</option>`).join("")}
        </select>
        <select id="refSort">
          <option value="std" ${refFilter.sort==="std"?"selected":""}>番号順</option>
          <option value="asc" ${refFilter.sort==="asc"?"selected":""}>正答率が低い順</option>
          <option value="desc" ${refFilter.sort==="desc"?"selected":""}>正答率が高い順</option>
        </select>
        <input id="refQ" placeholder="単語・意味で検索" value="${esc(refFilter.q)}">
      </div>

    </div>`;

  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  document.getElementById("refLv").onchange = (e)=>{ refFilter.lv = e.target.value; renderReference(); };
  document.getElementById("refSort").onchange = (e)=>{ refFilter.sort = e.target.value; renderReference(); };
  const qi = document.getElementById("refQ");
  qi.oninput = (e)=>{ refFilter.q = e.target.value; };
  qi.onkeydown = (e)=>{ if(e.key==="Enter") renderReference(); };
  app.querySelectorAll("[data-play]").forEach(b=>{ b.onclick = ()=>speak(b.dataset.play); });
}

/* ==== 追加機能：ステータス・格言・品詞モード・設定・説明 ==== */
/* 語の記録を作成/昇格。inReview=true でノルマ（復習候補）入り */
function ensureWordRecord(id, inReview){
  if(!state.words[id]){
    state.words[id] = { step:0, due:todayStr(), reps:0, lapses:0, mastered:false,
      learnedOn:todayStr(), revStage:0, failStreak:0, okStreak:0,
      cSeen:0, cCorrect:0, wSeen:0, wCorrect:0, inReview:!!inReview };
  }else if(inReview && state.words[id].inReview===false){
    state.words[id].inReview = true;
    if(!state.words[id].due || state.words[id].due > todayStr()) state.words[id].due = todayStr();
  }
  return state.words[id];
}
/* ステータス4段階: 未学習/出題済/復習中/定着済
   ・一度も回答していない語は、ストック済みでも「未学習」
   ・復習候補外だが回答済み → 出題済
   ・復習候補内で回答済み → 復習中
   ・3回連続定着 → 定着済 */
function wordStatus(w){
  const st = state.words[w.i];
  if(!st) return ["n","未学習"];
  if(st.mastered) return ["m","定着済"];
  const answered = ((st.cSeen||0)+(st.wSeen||0)) > 0;
  if(!answered) return ["n","未学習"];      // ストックされただけ＝まだ未学習
  if(st.inReview===false) return ["s","出題済"];
  return ["l","復習中"];
}

/* ==== 品詞モード（判定・集計なし） ==== */
const POS5 = ["自動","他動","名","形","副"];
const POS5_LABEL = {"自動":"自動詞","他動":"他動詞","名":"名詞","形":"形容詞","副":"副詞"};
function posEligibleWords(){
  return allWords().filter(w=>normEntries(w).some(e=>POS5.includes(e.pos)));
}
function correctPosSet(w){
  const s=new Set();
  normEntries(w).forEach(e=>{ if(POS5.includes(e.pos)) s.add(e.pos); });
  return s;
}
function startPosSession(fresh){
  if(fresh || !state.posSession){
    const n = Math.max(5, Math.min(100, state.settings.posChunk||30));
    const ids = shuffle(posEligibleWords().slice()).slice(0,n).map(w=>w.i);
    state.posSession = { ids, pos:0, sel:[], checked:false, ok:null, confirming:false };
  }
  scheduleSave();
  renderPosCard();
}
function renderPosCard(){
  const ps = state.posSession;
  if(!ps || ps.pos >= ps.ids.length){ return renderPosDone(); }
  const w = byId(ps.ids[ps.pos]);
  const correct = correctPosSet(w);
  let body="";
  if(ps.confirming){
    const wrongHtml = `<div class="wrong-line">✕ あなたの選択：${ps.sel.length?ps.sel.map(p=>POS5_LABEL[p]).join("・"):"（なし）"}</div>
      <div class="ok-line">正解：${[...correct].map(p=>POS5_LABEL[p]).join("・")}</div>`;
    body = `${confirmCardBody(w, wrongHtml)}
      <button class="btn-primary" data-pact="next">Next</button>`;
  }else{
    const btns = POS5.map(p=>{
      let cls="pos-toggle"+(ps.sel.includes(p)?" on":"");
      if(ps.checked){ if(correct.has(p)) cls+=" correct"; else if(ps.sel.includes(p)) cls+=" wrong"; }
      return `<button class="${cls}" data-pact="tog" data-p="${p}" ${ps.checked?"disabled":""}>${POS5_LABEL[p]}</button>`;
    }).join("");
    let footer;
    if(ps.checked){
      footer = `<div class="dict-result ${ps.ok?"ok":"ng"}">${ps.ok?"◎ 正解":"✕ 不正解"}</div>
        ${ps.ok?`<button class="btn-primary" data-pact="next">Next</button>`:`<button class="btn-primary" data-pact="check">Check</button>`}`;
    }else{
      footer = `<button class="btn-primary" data-pact="ans" ${ps.sel.length?"":"disabled"}>解答</button>`;
    }
    body = `<div class="word-display">${esc(w.w)}</div>
      <div class="hint" style="text-align:center">該当する品詞をすべて選択</div>
      <div class="pos-toggle-row">${btns}</div>
      ${footer}`;
  }
  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-pact="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${ps.pos+1} / ${ps.ids.length}</span>
      <span class="tag mode">品詞モード（判定なし）</span>
    </div>
    <div class="wcard">${body}</div>`;
  app.querySelectorAll("[data-pact]").forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); posHandle(el.dataset.pact, el); }; });
  app.querySelectorAll('[data-act="speak"]').forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); speak(w.w); }; });
}
function posHandle(act, el){
  const ps = state.posSession;
  if(!ps) return;
  const w = byId(ps.ids[ps.pos]);
  if(act==="exit"){ flushSave(); renderHome(); return; }
  if(act==="tog"){
    if(ps.checked) return;
    const p = el.dataset.p;
    const i = ps.sel.indexOf(p);
    if(i>=0) ps.sel.splice(i,1); else ps.sel.push(p);
    renderPosCard(); return;
  }
  if(act==="ans"){
    if(!ps.sel.length) return;
    const correct = correctPosSet(w);
    ps.checked = true;
    ps.ok = ps.sel.length===correct.size && ps.sel.every(p=>correct.has(p));
    scheduleSave(); renderPosCard(); speak(w.w); return;
  }
  if(act==="check"){ ps.confirming = true; scheduleSave(); renderPosCard(); return; }
  if(act==="next"){
    ps.pos++; ps.sel=[]; ps.checked=false; ps.ok=null; ps.confirming=false;
    scheduleSave(); renderPosCard(); return;
  }
}
function renderPosDone(){
  state.posSession = null; saveState();
  app.innerHTML = `<div class="panel done-card"><div class="stamp">完了</div>
    <h2 style="font-family:var(--serif);font-size:1.1rem;margin-bottom:8px">品詞モードが終了</h2>

  document.getElementById("homeBtn").onclick = renderHome;
}

    <h2>コアイメージについて</h2>
    <p class="note">単語の中心にある「核となるイメージ」のこと。たとえば run の「連続して流れ動く」というイメージをつかむと、「走る／経営する／（機械が）動く」といった複数の意味が1本の芯でつながって覚えやすくなります。</p>

    <h2>設定について</h2>
    ${shot("settings","設定")}
    <p class="note"><strong>1日に増える新しい単語の数</strong>＝学習モードで毎日あらたに学習対象へ加わる単語の数。<br>
    <strong>難易度</strong>＝出題される単語のレベルの上限（☆が高いほど難しい単語まで）。<br>
    <strong>音声の読み上げ速度</strong>＝発音を聞くときの速さ。<br>
    <strong>品詞モードの1回の問題数</strong>＝品詞モードを1回始めたときの出題数。学習モードの「新しい単語の数」とは別の、品詞モード専用の設定です。</p>

    <h2>難易度と空欄について</h2>
    <p class="note">難易度☆を設定すると、そのレベル以下の単語が出題されます（☆が高いほど、より難しい単語まで含まれます）。設定した範囲の単語をすべて学習し終えると、自動的に次のレベルへ上がります。なお<strong>復習は、難易度の設定に関係なく</strong>出題されます。<br>
    選択式の空欄の数は、その単語の復習が進むほど増えていきます（最初は1つ→最終的にすべての品詞へ）。</p>

    <h2>単語追加について</h2>
    ${shot("data","単語データの追加")}
    <p class="note">メニューから開きます。決まった形式の JSON を貼り付けると、自分で単語を追加できます。バックアップの書き出し・復元もここから行えます。</p>

  </div>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
}

/* ---- 起動 ---- */
/* ====================== ログインUI ====================== */
function ensureAuthDom(){
  if(document.getElementById("authmodal")) return;
  const style = document.createElement("style");
  style.textContent = `
    #authmodal{position:fixed;inset:0;z-index:60;background:rgba(31,44,56,.45);
      display:flex;align-items:center;justify-content:center;padding:16px}
    #authmodal.auth-hidden{display:none}
    #authmodal .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
      width:100%;max-width:340px;padding:22px 20px}
    #authmodal h3{font-family:var(--serif);font-size:1.05rem;margin-bottom:4px}
    #authmodal p.sub{font-size:.74rem;color:var(--sub);margin-bottom:16px}
    #authmodal .oauth{display:block;width:100%;padding:11px;border:1px solid var(--line);
      border-radius:8px;background:#fff;color:var(--ink);font-weight:700;font-size:.9rem;margin-bottom:9px}
    #authmodal .sep{text-align:center;font-size:.7rem;color:var(--sub);margin:10px 0}
    #authmodal input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;
      font-size:.9rem;margin-bottom:9px;font-family:var(--sans)}
    #authmodal .send{width:100%;padding:11px;border-radius:8px;background:var(--ink);color:#fff;
      font-weight:700;font-size:.9rem}
    #authmodal .msg{font-size:.74rem;color:var(--midori);margin-top:10px;min-height:1em}
    #authmodal .close{position:absolute;top:14px;right:16px;font-size:1.3rem;color:var(--sub)}
    #authmodal .cardwrap{position:relative;width:100%;max-width:340px}
  `;
  document.head.appendChild(style);

  const modal = document.createElement("div");
  modal.id = "authmodal"; modal.className = "auth-hidden";
  modal.innerHTML = `
    <div class="cardwrap">
      <button class="close" id="authClose">×</button>
      <div class="card">
        <h3>ログイン</h3>
        <p class="sub">進捗をアカウントに保存し、どの端末からでも続きから学習できます。</p>
        <button class="oauth" id="authGoogle">Googleでログイン</button>
        <div class="sep">または メールで</div>
        <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        <button class="send" id="authSend">ログインリンクを送る</button>
        <div class="msg" id="authMsg"></div>
      </div>
    </div>`;
  document.body.appendChild(modal);

  document.getElementById("authClose").onclick = closeAuthModal;
  modal.addEventListener("click", (e)=>{ if(e.target === modal) closeAuthModal(); });

  document.getElementById("authGoogle").onclick = ()=> oauthLogin("google");
  document.getElementById("authSend").onclick   = emailLogin;
}
function openAuthModal(){
  if(!cloudConfigured()){ alert("クラウド保存は未設定です。SUPABASE_URL と SUPABASE_ANON_KEY を設定すると有効になります。"); return; }
  document.getElementById("authMsg").textContent = "";
  document.getElementById("authmodal").className = "";
}
function closeAuthModal(){ document.getElementById("authmodal").className = "auth-hidden"; }

function redirectTarget(){ return location.href.split("#")[0]; }

async function oauthLogin(provider){
  if(!sb) return;
  await sb.auth.signInWithOAuth({ provider, options:{ redirectTo: redirectTarget() } });
}
async function emailLogin(){
  if(!sb) return;
  const email = (document.getElementById("authEmail").value || "").trim();
  const msg = document.getElementById("authMsg");
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTarget() } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = "送信に失敗しました：" + error.message; }
  else{ msg.style.color = "var(--midori)"; msg.textContent = "ログインリンクを送りました。メールを確認してください。"; }
}
async function doLogout(){
  if(sb) await sb.auth.signOut();
}
/* ログイン／ログアウト時：クラウドが空でローカルに進捗があれば初回だけ移行 → 読み直して再描画 */
async function syncOnAuthChange(){
  if(sb && currentUser){
    try{
      const { data } = await sb.from("user_data").select("data").eq("user_id", currentUser.id).maybeSingle();
      if(!data){
        let local = null;
        try{ local = localStorage.getItem(STORE_KEY); }catch(_){}
        if(local){
          await sb.from("user_data").upsert({ user_id: currentUser.id, data: local, updated_at: new Date().toISOString() });
        }
      }
    }catch(e){}
  }
  state = { settings:{ newPerDay:30, rate:0.95, difficulty:1 }, words:{}, log:{}, custom:[], activeSession:null };
  await loadState();
  renderHome();
}

/* ---- 起動 ---- */
(async ()=>{
  await initSupabase();
  ensureAuthDom();
  await loadState();
  renderHome();
})();
</script>
