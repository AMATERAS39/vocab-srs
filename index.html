<style>
:root{
  --paper:#EDF0F2;
  --card:#FFFFFF;
  --ink:#1F2C38;
  --sub:#5D6B76;
  --shu:#C8452C;      /* 朱色：赤シート・強調 */
  --shu-soft:#F6E2DD;
  --midori:#2F7D5B;   /* 定着・正解 */
  --line:#D5DBE0;
  --serif:"Shippori Mincho","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.65;min-height:100vh}
.wrap{max-width:580px;margin:0 auto;padding:20px 16px 8px}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ---------- ヘッダー ---------- */
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;border-bottom:2px solid var(--ink);padding-bottom:10px}
header h1{font-family:var(--serif);font-size:1.25rem;font-weight:700;letter-spacing:.06em}
.date-line{font-size:.78rem;color:var(--sub)}
.streak{font-size:.78rem;color:var(--shu);font-weight:700}

/* ---------- ホーム ---------- */
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:14px}
.queue-row{display:flex;gap:12px;margin:12px 0 16px}
.queue-box{flex:1;text-align:center;padding:12px 6px;border:1px solid var(--line);border-radius:8px}
.queue-box .num{font-family:var(--serif);font-size:1.9rem;font-weight:700;line-height:1.2}
.queue-box .lbl{font-size:.72rem;color:var(--sub)}
.queue-box.review .num{color:var(--shu)}
.btn-primary{display:block;width:100%;padding:14px;background:var(--ink);color:#fff;border-radius:8px;font-size:1rem;font-weight:700;letter-spacing:.08em}
.btn-primary:disabled{background:var(--line);color:var(--sub);cursor:default}
.panel h2{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:10px;letter-spacing:.05em}
.lv-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.8rem}
.lv-tab{width:52px;flex:none;text-align:center;color:#fff;border-radius:4px;padding:2px 0;font-weight:700;font-size:.72rem}
.bar{flex:1;height:10px;background:var(--paper);border-radius:5px;overflow:hidden;position:relative}
.bar .fill-learn{position:absolute;left:0;top:0;bottom:0;background:var(--shu);opacity:.45}
.bar .fill-master{position:absolute;left:0;top:0;bottom:0;background:var(--midori)}
.lv-cnt{width:86px;flex:none;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
.legend{font-size:.7rem;color:var(--sub);margin-top:6px}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin:0 3px 0 10px;vertical-align:middle}
details.panel{padding:0}
details.panel summary{padding:14px 18px;font-family:var(--serif);font-weight:700;font-size:.95rem;cursor:pointer;list-style:none}
details.panel summary::before{content:"▸ ";color:var(--shu)}
details.panel[open] summary::before{content:"▾ "}
details.panel .inner{padding:0 18px 18px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;font-size:.85rem}
.setting-row select,.setting-row input[type=number]{font-family:var(--sans);padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:.85rem;background:#fff}
textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:6px;padding:8px;font-size:.78rem;font-family:ui-monospace,monospace;background:#fff;color:var(--ink)}
.btn-sub{padding:8px 14px;border:1px solid var(--ink);border-radius:6px;font-size:.82rem;font-weight:500;margin:8px 8px 0 0;background:#fff}
.msg{font-size:.78rem;margin-top:8px;color:var(--midori)}
.msg.err{color:var(--shu)}
.warn-banner{background:var(--shu-soft);border:1px solid var(--shu);color:var(--shu);border-radius:8px;padding:10px 12px;font-size:.78rem;margin-bottom:14px;line-height:1.6}
.save-badge{font-size:.68rem;color:var(--sub)}
.save-badge.err{color:var(--shu);font-weight:700}
code{background:var(--paper);padding:1px 5px;border-radius:4px;font-size:.78rem}
.note{font-size:.76rem;color:var(--sub);line-height:1.7}
.pw-card{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,#fff, #FAFBFC)}
.pw-card .pw-head{display:flex;align-items:center;gap:7px;font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.pw-card .pw-sub{font-size:.72rem;color:var(--sub);margin-bottom:10px}
.pw-card .pw-field{display:flex;gap:8px;align-items:stretch}
.pw-card input[type=password]{flex:1;font-family:var(--sans);padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:.9rem;background:#fff}
.pw-card input[type=password]:focus{outline:none;border-color:var(--shu);box-shadow:0 0 0 2px var(--shu-soft)}
.pw-card .pw-btn{white-space:nowrap;padding:9px 16px;border:none;border-radius:8px;background:var(--shu);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer}
.pw-card .pw-btn:active{opacity:.85}
.pw-card .msg{margin-top:8px}

/* ---------- 学習カード（単語カード風） ---------- */
.session-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.8rem;color:var(--sub)}
.progress-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:18px}
.progress-track .p{height:100%;background:var(--ink);transition:width .25s ease}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:26px 22px 22px;position:relative;box-shadow:0 2px 10px rgba(31,44,56,.06)}
.card-meta{display:flex;justify-content:flex-end;gap:8px;align-items:center;margin-bottom:8px}
.diff-stars{display:inline-flex;align-items:center}
.stars-svg{height:15px;width:75px}
.star-fill{fill:var(--shu)}
.star-empty{fill:none;stroke:var(--line);stroke-width:1.2}
.tag{font-size:.68rem;font-weight:700;color:#fff;border-radius:4px;padding:2px 8px}
.tag.mode{background:var(--sub)}
.word-display{font-family:var(--serif);font-size:2.3rem;font-weight:700;text-align:center;margin:16px 0 6px;letter-spacing:.02em;word-break:break-word}
.hint{font-size:.78rem;color:var(--sub);text-align:center;margin-bottom:14px}
.hint strong{color:var(--shu)}
.audio-btn{display:block;margin:0 auto 14px;padding:10px 26px;border:1.5px solid var(--ink);border-radius:24px;font-size:.9rem;font-weight:700;background:#fff}
.dict-row{display:flex;gap:8px;margin:0 0 14px}
.dict-row input{flex:1;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:1.05rem;font-family:var(--serif)}
.dict-row .btn-sub{margin:0}
.dict-result{text-align:center;font-weight:700;margin-bottom:10px;font-size:1.0rem;padding:8px 10px;border-radius:8px}
.dict-result.ok{color:var(--midori);background:rgba(47,125,91,.12)}
.dict-result.ng{color:var(--shu);background:rgba(200,69,44,.12)}
.dict-result .sub-line{font-size:.82rem;font-weight:500;margin-top:4px}
.dict-row input.ok{border-color:var(--midori);background:rgba(47,125,91,.08)}
.dict-row input.ng{border-color:var(--shu);background:rgba(200,69,44,.08)}
.prompt-zone{border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.prompt-zone .meaning{font-size:.9rem}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 12px}
.choice-btn{padding:12px 6px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--serif);font-size:1rem;font-weight:700;background:#fff;word-break:break-word}
.choice-btn:disabled{opacity:.75;cursor:default}
.choice-btn.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1}
.choice-btn.wrong{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
.blank-block{margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--line)}
.blank-slot{color:var(--shu);font-weight:700}
.pat-prompt{font-family:var(--serif);font-weight:700;font-size:1.05rem;color:var(--ink)}
.opt-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;margin-left:4px}
.opt-btn{text-align:left;padding:9px 11px;border:1.5px solid var(--line);border-radius:7px;background:#fff;font-size:.86rem;line-height:1.4}
.opt-btn.picked{border-color:var(--ink);background:var(--paper)}
.opt-btn.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1}
.opt-btn.wrong{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
.opt-btn:disabled{cursor:default}
.opt-num{display:inline-block;min-width:1.4em;font-weight:700;color:var(--sub);margin-right:6px}
.blank-block.confirmed .blank-slot{color:var(--midori)}
.choice-hint{font-size:.72rem;color:var(--sub);text-align:center;margin-bottom:8px}
/* ==== バッチB：解説の隠し→判定時スクロール表示 ==== */
.reveal-zone{max-height:0;overflow:hidden;opacity:0;transition:opacity .25s ease}
.reveal-zone.open{max-height:none;overflow:visible;opacity:1;margin-top:12px;padding-top:14px;border-top:1px dashed var(--line)}
.reveal-next{display:flex;justify-content:flex-end;margin-top:12px}
.reveal-next .btn-primary{width:auto;display:inline-block;padding:12px 30px}
.btn-ghost{display:block;width:100%;padding:12px;border:1.5px solid var(--ink);border-radius:8px;font-size:.95rem;font-weight:700;background:#fff;margin-top:10px}
/* 参照モード */
.ref-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ref-controls select,.ref-controls input{font-family:var(--sans);padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:.82rem;background:#fff;flex:1;min-width:120px}
.ref-count{font-size:.76rem;color:var(--sub);margin-bottom:10px}
.ref-item{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:8px}
.ref-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.ref-word{font-family:var(--serif);font-size:1.3rem;font-weight:700}
.ref-lv{font-size:.66rem;font-weight:700;color:#fff;border-radius:4px;padding:1px 6px}
.ref-status{font-size:.66rem;margin-left:auto;padding:1px 7px;border-radius:10px}
.ref-status.m{background:#EDF5F1;color:var(--midori)}
.ref-status.l{background:var(--shu-soft);color:var(--shu)}
.ref-status.n{background:var(--paper);color:var(--sub)}
.ref-play{border:1px solid var(--line);border-radius:6px;padding:2px 9px;font-size:.78rem;background:#fff}
.ref-core{font-size:.76rem;color:var(--sub);border-left:3px solid var(--shu);padding:3px 8px;margin:6px 0}
.ref-ent{display:flex;gap:8px;margin-bottom:3px;align-items:flex-start}
.ref-ent .pos-badge{align-self:flex-start;margin-top:2px}
.ref-ent .meaning{flex:1}
.acc-tag{font-size:.68rem;color:var(--sub);background:var(--paper);border-radius:10px;padding:1px 8px}
.acc-line{text-align:center;font-size:.78rem;color:var(--sub);margin-bottom:8px}
.ref-acc{font-size:.7rem;margin-left:6px;padding:1px 7px;border-radius:10px;background:var(--paper);color:var(--sub)}
.ref-acc.low{background:var(--shu-soft);color:var(--shu);font-weight:700}

/* 赤シート */
.answer-zone{position:relative;border-top:1px dashed var(--line);padding-top:14px;min-height:120px}
.entry{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.pos-badge{flex:none;align-self:flex-start;display:inline-block;min-width:2.8em;text-align:center;font-size:.72rem;font-weight:700;line-height:1.5;color:var(--shu);border:1.5px solid var(--shu);border-radius:4px;padding:1px 6px;margin-top:2px}
.entry .meaning{flex:1}
.meaning{font-size:1rem;font-weight:500}
.core-line{font-size:.82rem;background:var(--paper);border-left:3px solid var(--shu);padding:7px 10px;border-radius:0 6px 6px 0;margin-bottom:12px;line-height:1.6}
.core-label{font-weight:700;color:var(--shu);margin-right:8px;font-size:.7rem;letter-spacing:.1em}

/* ---------- 完了 ---------- */
.done-card{text-align:center;padding:36px 20px}
.done-card .stamp{width:88px;height:88px;border:3px solid var(--shu);border-radius:50%;color:var(--shu);
  font-family:var(--serif);font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  transform:rotate(-8deg);font-size:1.15rem;letter-spacing:.1em}
.done-stats{font-size:.9rem;color:var(--sub);margin-bottom:20px}

/* ==== 追加UI・レイアウト圧縮 ==== */
html,body{height:100%}
body{font-size:clamp(13px,1.9vh,16px)}
.panel{padding:clamp(9px,1.6vh,16px);margin-bottom:clamp(6px,1.2vh,12px)}
.wcard{padding:clamp(10px,1.8vh,18px)}
.word-display{font-size:clamp(1.35rem,4.5vh,2.1rem)}
.opt-btn{padding:clamp(4px,0.9vh,8px) 10px;font-size:clamp(.78rem,1.7vh,.95rem)}
.entry{margin-bottom:clamp(3px,0.7vh,8px)}
.prompt-zone{max-height:48vh;overflow-y:auto}
.dict-row{display:flex;gap:6px;align-items:stretch;flex-wrap:nowrap}
.dict-row input{flex:1 1 auto;min-width:0}
.dict-row .btn-sub{flex:0 0 auto;white-space:nowrap;padding:6px 10px}
.home-ico{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;border:1px solid var(--line);border-radius:9px;background:var(--card)}
.home-svg{width:19px;height:19px;fill:var(--ink)}
.copyright-wrap{max-width:580px;margin:0 auto;padding:0 16px 18px;text-align:right}
.copyright{font-size:.62rem;color:var(--sub);opacity:.75}
.menu-btn{background:var(--card);border:1px solid var(--line);border-radius:9px;cursor:pointer;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:0}
.menu-svg{width:19px;height:19px;fill:var(--ink);display:block}
.menu-drop{display:none;position:absolute;top:110%;right:0;background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:0 4px 14px rgba(0,0,0,.12);z-index:50;min-width:150px;overflow:hidden}
.menu-drop.open{display:block}
.menu-drop button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 14px;font-size:.9rem;cursor:pointer}
.menu-drop button:hover{background:var(--paper)}
.quote-line{font-size:.74rem;color:var(--sub);margin-top:2px;font-style:italic}
.wrong-line{color:var(--shu);font-size:.85rem;font-weight:700;margin:2px 0;text-align:center}
.ok-line{color:var(--midori);font-size:.85rem;font-weight:700;margin:2px 0;text-align:center}
.acc-gauge{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin:4px 0}
.acc-gauge .g{height:100%;border-radius:3px}
.fill-seen{position:absolute;left:0;top:0;height:100%;background:#B9B2A6;opacity:.55}
.pos-toggle-row{display:flex;flex-wrap:nowrap;gap:6px;justify-content:center;margin:12px 0}
.pos-toggle{flex:1 1 0;min-width:0;padding:10px 4px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);font-size:clamp(.72rem,2.4vw,.92rem);cursor:pointer;text-align:center;white-space:nowrap}
.pos-toggle.on{border-color:var(--shu);color:var(--shu);font-weight:700;background:#FBF1EE}
.pos-toggle.correct{border-color:var(--midori);color:var(--midori);background:#EDF5F1;font-weight:700}
.pos-toggle.wrong{border-color:var(--shu);color:var(--shu);background:#FBEAE6;text-decoration:line-through}
.ref-status.s{background:#EFEBE3;color:#8B8375}
.about h2{margin-top:14px}
.about-svg{width:100%;max-width:400px;display:block;margin:4px auto}
.screen-svg{width:100%;max-width:320px;display:block;margin:6px auto;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.screen-svg text{font-family:var(--sans)}
.scr-bg{fill:var(--paper)}
.scr-card{fill:var(--card);stroke:var(--line);stroke-width:1}
.scr-ink{fill:var(--ink)}
.scr-sub{fill:var(--sub)}
.scr-shu{fill:var(--shu)}
.scr-btn-dark{fill:var(--ink)}
.ab-box{fill:none;stroke:var(--shu);stroke-width:1.5}
.ab-box.on{fill:#FBF1EE}
.ab-t{font-size:12px;text-anchor:middle;fill:var(--ink);font-weight:700}
.ab-a{font-size:14px;text-anchor:middle;fill:var(--sub)}
.ab-s{font-size:9.5px;text-anchor:middle;fill:var(--sub)}
.ab-line{stroke:var(--line);stroke-width:2}
.ab-dot{fill:var(--card);stroke:var(--shu);stroke-width:2}
.ab-dot.on{fill:var(--shu)}

/* ==== ヘッダー1行化・アイコン ==== */
header{display:flex;justify-content:space-between;align-items:flex-start;position:relative;gap:8px}
.head-left{display:flex;align-items:center;gap:10px;min-width:0}
h1{font-size:clamp(1.05rem,3vh,1.5rem);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.date-line{white-space:nowrap}
.book-ico{flex:none;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;border:1px solid var(--line);border-radius:10px;background:var(--card);cursor:pointer}
.book-svg{width:21px;height:21px;fill:var(--shu)}
.quote-line{font-size:.72rem;color:var(--sub);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:2px 0 8px}
.menu-drop button{white-space:nowrap}

/* ==== 画面遷移のちらつき軽減 ==== */
#app{background:var(--paper)}
.wcard{background:var(--card);will-change:contents}
.word-display{contain:paint}

/* ==== アプリ説明の画面図解 ==== */
.ab-frame{fill:var(--paper);stroke:var(--line);stroke-width:1.5}
.ab-hi{fill:var(--card);stroke:var(--shu);stroke-width:1.2}
.ab-ic{font-size:11px;text-anchor:middle;fill:var(--shu);font-weight:700}
.ab-tl{font-size:11px;fill:var(--ink);font-weight:700}
.ab-tl2{font-size:12px;text-anchor:middle;fill:var(--ink);font-weight:700}
.ab-s2{font-size:8.5px;fill:var(--sub);text-anchor:middle}
.ab-card{fill:var(--card);stroke:var(--line);stroke-width:1}
.ab-star{font-size:11px;fill:var(--shu);letter-spacing:1px}

/* ==== 説明のスクリーンショット ==== */
.shot{margin:8px 0 4px;text-align:center}
.shot img{width:100%;max-width:300px;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

.update-banner{position:fixed;left:0;right:0;bottom:0;z-index:9999;background:var(--ink);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:.82rem;box-shadow:0 -2px 10px rgba(0,0,0,.2)}
.update-banner span{flex:1;line-height:1.4}
.update-banner button#updateReloadBtn{flex:0 0 auto;background:var(--shu);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:.82rem;cursor:pointer}
.update-banner button#updateDismissBtn{flex:0 0 auto;background:transparent;color:#fff;border:none;font-size:1.1rem;cursor:pointer;padding:0 4px}

{i:74,w:"solve",l:2,c:"solvere(ゆるめる)→「固く結ばれたものを解きほぐす」→解決・解く",e:[["他動",["〜を解決する","〜を解く"]]]},
{i:75,w:"suggest",l:2,c:"sub-(下から)+gerere(運ぶ)→「下からそっと差し出す」→提案・示唆",e:[["他動",[["suggest doing","〜を提案する"],"〜を示唆する"]]]},
{i:76,w:"suppose",l:2,c:"sub-(下に)+ponere(置く)→「土台として下に置く」→仮定・思う",e:[["他動",[["be supposed to do","〜することになっている"],"〜と思う","〜と仮定する"]]]},
{i:77,w:"tend",l:2,c:"tendere(張る・伸ばす)→「〜の方へ伸びていく」→傾向",e:[["自動",[["tend to do","〜する傾向がある"]]],["句動",[["tend toward A","Aの傾向がある"]]]]},
{i:78,w:"vary",l:2,c:"varius(まだら)→「まだら模様のように様々」→変化・多様",e:[["自動",[["vary from A to B","AからBまで様々である"],"変わる","さまざまである"]],["他動",["〜を変える"]]]},
{i:79,w:"attitude",l:2,c:"「心身の構え」→態度・考え方",e:[["名",["態度","考え方"]],["熟",[["attitude toward A","Aに対する態度"]]]]},
{i:80,w:"knowledge",l:2,c:"know→「知られている中身」→知識",e:[["名",["知識"]]]},
/* ---- Level 3: 中級（形容詞・動詞） ---- */
{i:81,w:"significant",l:3,c:"signum(しるし)→「意味のしるしを帯びる」→重要な・意義深い",e:[["形","重要な；意義深い；かなりの"]]},
{i:82,w:"essential",l:3,c:"「本質(essence)に関わる」→不可欠・本質的",e:[["形",["不可欠の","本質的な",["be essential to/for A","Aに不可欠"]]],["名",[["essentials で","必需品；要点"]]]]},
{i:83,w:"obvious",l:3,c:"ob-(向かい)+via(道)→「道の真ん中にあり誰でも気づく」→明らか",e:[["形",["明らかな",["It is obvious that ...","〜は明白だ"]]]]},
{i:84,w:"appropriate",l:3,c:"ad-+proprius(固有の)→「その場に固有=ぴったり合う」→適切",e:[["形",["適切な",["be appropriate for A","Aにふさわしい"]]]]},
{i:85,w:"available",l:3,c:"valere(力がある)→「役立つ状態でそこにある」→利用可能",e:[["形","利用できる；入手できる；手が空いている"]]},
{i:86,w:"aware",l:3,c:"ware(見張る)→「用心して気づいている」",e:[["形",[["be aware of A","Aに気づいている"],["be aware that ...","〜だと気づいている"]]]]},
{i:87,w:"complex",l:3,c:"com-+plectere(編む)→「編み合わさった」→複雑；編み合わさった建物群=複合施設",e:[["形","複雑な"],["名","複合施設；コンプレックス"]]},
{i:88,w:"considerable",l:3,c:"「considerする(考慮する)に値するほどの」→かなりの",e:[["形","かなりの"]]},
{i:89,w:"crucial",l:3,c:"crux(十字路)→「分かれ道を決する」→決定的に重要",e:[["形",["決定的に重要な",["be crucial to/for A","Aにとって極めて重要"]]]]},
{i:90,w:"evident",l:3,c:"e-(外に)+videre(見える)→「外から見えている」→明白",e:[["形","明白な"]]},
{i:91,w:"abandon",l:3,c:"a-+bandon(支配権)→「支配権を明け渡す」→捨てる・断念",e:[["他動",["〜を捨てる","〜を断念する",["abandon doing","〜するのをやめる"]]]]},
{i:92,w:"absorb",l:3,c:"ab-+sorbere(吸う)→「吸い込む」→吸収；心を吸い込む=夢中にさせる",e:[["他動",["〜を吸収する",["be absorbed in A","Aに夢中である"]]]]},
{i:93,w:"accompany",l:3,c:"com-+panis(パン)→「パンを共にする仲間として付き添う」",e:[["他動",["〜に同行する","〜に伴う",["be accompanied by A","Aを伴っている"]]]]},
{i:94,w:"accomplish",l:3,c:"ad-+complere(満たす)→「最後まで満たし終える」→成し遂げる",e:[["他動","〜を成し遂げる"]]},
{i:95,w:"acquire",l:3,c:"ad-+quaerere(求める)→「求めて自分のものにする」→習得・獲得",e:[["他動","〜を習得する；〜を獲得する"]]},
{i:96,w:"adapt",l:3,c:"ad-+aptus(適した)→「合うように作り変える」→適応",e:[["自動",["適応する"]],["他動",["〜を適応させる","〜を改作する"]],["句動",[["adapt (oneself) to A","Aに適応する"]]]]},
{i:97,w:"adjust",l:3,c:"ad-+justus(正しい)→「正しい位置に合わせる」→調整",e:[["他動",["〜を調整する"]],["句動",[["adjust to A","Aに適応する"]]]]},
{i:98,w:"admit",l:3,c:"ad-+mittere(送る)→「中へ入れてやる」→入場許可；事実を中に入れる=認める",e:[["他動",["〜を〔しぶしぶ〕認める","〜の入場を許す",["admit doing","〜したことを認める"],["be admitted to A","Aへの入学を認められる"]]]]},
{i:99,w:"adopt",l:3,c:"ad-+optare(選ぶ)→「選び取って自分のものにする」→採用・養子",e:[["他動","〜を採用する；〜を養子にする"]]},
{i:100,w:"affect",l:3,c:"ad-+facere(作用する)→「働きかけて変化を及ぼす」→影響",e:[["他動","〜に影響を与える"]]},
{i:101,w:"analyze",l:3,c:"ana-(細かく)+lyein(解く)→「分解してほどく」→分析",e:[["他動","〜を分析する"]]},
{i:102,w:"anticipate",l:3,c:"ante-(前)+capere(取る)→「先取りする」→予期",e:[["他動",["〜を予期する",["anticipate doing","〜することを見込む"]]]]},
{i:103,w:"appreciate",l:3,c:"ad-+pretium(価格)→「価値を正しく見積もる」→評価・感謝・鑑賞",e:[["他動",["〜を正しく評価する","〜に感謝する","〜を鑑賞する",["I would appreciate it if ...","〜していただけるとありがたい"]]]]},
{i:104,w:"argue",l:3,c:"arguere(明らかにする)→「明らかにしようと論を交わす」→議論・主張",e:[["自動",["議論する",["argue with A about B","AとBについて言い争う"]]],["他動",[["argue that ...","〜と主張する"]]],["句動",[["argue for A","Aに賛成論を述べる"],["argue against A","Aに反対論を述べる"]]]]},
{i:105,w:"arise",l:3,c:"a-+rise→「立ち上がって出てくる」→生じる",e:[["自動",["生じる"]],["句動",[["arise from A","Aから生じる"]]]]},
{i:106,w:"assume",l:3,c:"ad-+sumere(取る)→「(検証せず)取り込む」→仮定；役目を取り込む=引き受ける",e:[["他動",["（責任など）を引き受ける",["assume that ...","〜と〔根拠なく〕仮定する"]]]]},
{i:107,w:"attribute",l:3,c:"ad-+tribuere(割り当てる)→「〜に割り当てる」→帰属させる；割り当てられた性質=属性",e:[["他動",[["attribute A to B","AをBのせいにする・Bに帰する"]]],["名",["属性；特質"]]]},
{i:108,w:"behave",l:3,c:"be-+have→「自分を保つ」→ふるまう",e:[["自動",["ふるまう"]],["他動",[["behave oneself","行儀よくする"]]]]},
{i:109,w:"calculate",l:3,c:"calculus(計算用の小石)→「小石を並べて数える」→計算",e:[["他動","〜を計算する"]]},
{i:110,w:"conclude",l:3,c:"con-+claudere(閉じる)→「閉じて締めくくる」→結論・終える",e:[["他動",["〜を締めくくる",["conclude that ...","〜と結論づける"]]],["自動",["終わる"]]]},
{i:111,w:"concern",l:3,c:"con-+cernere(ふるい分ける)→「互いに関わり合う」→関係；心に関わる=心配",e:[["他動",["〜に関係する","〜を心配させる",["be concerned about A","Aを心配している"],["be concerned with A","Aに関係している"]]],["名",["関心事；心配"]]]},
{i:112,w:"confuse",l:3,c:"con-+fundere(注ぐ)→「一緒に注いで混ざってしまう」→混乱・混同",e:[["他動",["〜を混乱させる",["confuse A with B","AをBと混同する"]]]]},
{i:113,w:"struggle",l:3,c:"「もがきながら争う」→奮闘",e:[["自動",["奮闘する",["struggle to do","〜しようともがく"]]],["名",["奮闘；闘争"]],["句動",[["struggle with/against A","Aと格闘する"]]]]},
{i:114,w:"emphasize",l:3,c:"em-+phainein(見せる)→「中身を強く見せつける」→強調",e:[["他動","〜を強調する"]]},
{i:115,w:"estimate",l:3,c:"aestimare(値踏みする)→「価値を見積もる」→見積もり・推定",e:[["他動","〜を見積もる・推定する"],["名","見積もり；推定"]]},
{i:116,w:"identify",l:3,c:"idem(同じ)→「同一のものだと見定める」→特定；自分と同一視する",e:[["他動",["〜を特定する",["identify A as B","AをBだと確認する"]]],["句動",[["identify with A","Aに共感する・一体感を持つ"]]]]},
{i:117,w:"ignore",l:3,c:"in-(否)+gnoscere(知る)→「知らないことにする」→無視",e:[["他動","〜を無視する"]]},
{i:118,w:"imply",l:3,c:"in-+plicare(折る)→「中に折り込む」→暗に含む",e:[["他動","〜を暗に意味する；〜をほのめかす"]]},
{i:119,w:"insist",l:3,c:"in-+sistere(立つ)→「その上に立って動かない」→強く主張・要求",e:[["他動",[["insist that S (should) do","〜すべきだと強く主張する"]]],["句動",[["insist on A/doing","Aを要求する；〜すると言い張る"]]]]},
{i:120,w:"observe",l:3,c:"ob-+servare(注意を払う)→「注意を向け続ける」→観察；規則に注意を払う=遵守",e:[["他動","〜を観察する；〜と述べる；（規則）を守る"]]},
/* ---- Level 4: 上級 ---- */
{i:121,w:"abstract",l:4,c:"abs-(離す)+trahere(引く)→「具体から引き離す」→抽象；要点を引き出す=要約",e:[["形","抽象的な"],["名","要約"],["他動","〜を抽出する"]]},
{i:122,w:"accumulate",l:4,c:"ad-+cumulus(山)→「山と積み上げる」→蓄積",e:[["他動","〜を蓄積する"],["自動","たまる"]]},
{i:123,w:"advocate",l:4,c:"ad-+vocare(呼ぶ)→「味方に呼ばれて声を上げる」→擁護・主張",e:[["他動","〜を主張する・擁護する"],["名","擁護者；提唱者"]]},
{i:124,w:"alter",l:4,c:"alter(他の)→「別のものに変える」",e:[["他動","〜を〔部分的に〕変える"],["自動","変わる"]]},
{i:125,w:"ambiguous",l:4,c:"ambi-(両方)+agere(進む)→「両方へ取れて定まらない」→あいまい",e:[["形","あいまいな；多義的な"]]},
{i:126,w:"apparent",l:4,c:"ad-+parere(現れる)→「表に現れている」→明白な；表に見えるだけの=外見上の",e:[["形","明らかな；外見上の"]]},
{i:127,w:"arbitrary",l:4,c:"arbiter(裁定者)→「裁定者の一存で決まる」→恣意的・気まぐれ",e:[["形","恣意的な；気まぐれな"]]},
{i:128,w:"assess",l:4,c:"ad-+sedere(座る)→「(査定人が)隣に座って値踏みする」→評価・査定",e:[["他動","〜を評価する；〜を査定する"]]},
{i:129,w:"assert",l:4,c:"ad-+serere(結びつける)→「自分の立場に結びつけて言い切る」→断言",e:[["他動",["（権利など）を主張する",["assert that ...","〜と断言する"]]]]},
{i:130,w:"cite",l:4,c:"citare(呼び出す)→「証拠として呼び出す」→引用・例示",e:[["他動","〜を引用する；〜を〔例として〕挙げる"]]},
{i:131,w:"coherent",l:4,c:"co-+haerere(くっつく)→「互いにくっついて筋が通る」→首尾一貫",e:[["形","首尾一貫した；筋の通った"]]},
{i:132,w:"compensate",l:4,c:"com-+pensare(量る)→「釣り合うように量って埋める」→補償・補う",e:[["句動",[["compensate for A","Aを補う"]]],["他動",[["compensate A for B","BのことでAに補償する"]]]]},
{i:133,w:"comprehensive",l:4,c:"com-+prehendere(つかむ)→「全体をつかみ取る」→包括的",e:[["形","包括的な；総合的な"]]},
{i:134,w:"conceive",l:4,c:"con-+capere(取る)→「心の中に取り込む」→思いつく・想像する",e:[["他動",["〜を思いつく"]],["句動",[["conceive of A","Aを想像する"]]]]},
{i:135,w:"confront",l:4,c:"con-+frons(正面)→「正面を突き合わせる」→直面・対決",e:[["他動",["〜に立ち向かう",["be confronted with A","Aに直面している"]]]]},
{i:136,w:"consent",l:4,c:"con-(共に)+sentire(感じる)→「同じ気持ちになる」→同意",e:[["名",["同意",["without consent","同意なく"]]],["句動",[["consent to A","Aに同意する"]]]]},
{i:137,w:"constitute",l:4,c:"con-+statuere(立てる)→「部品を共に立てて組み上げる」→構成",e:[["他動","〜を構成する；〜に相当する"]]},
{i:138,w:"contradict",l:4,c:"contra-(逆)+dicere(言う)→「逆のことを言う」→矛盾・反論",e:[["他動","〜と矛盾する；〜に反論する"]]},
{i:139,w:"controversy",l:4,c:"contra-(逆)+vertere(向く)→「逆を向いて言い争う」→論争",e:[["名","論争"]]},
{i:140,w:"convey",l:4,c:"con-+via(道)→「道づたいに運ぶ」→運搬；意味を運ぶ=伝達",e:[["他動",["〜を伝える","〜を運ぶ",["convey A to B","AをBに伝える"]]]]},
{i:141,w:"correspond",l:4,c:"cor-(共に)+respondere(応じる)→「互いに応じ合う」→一致・相当・文通",e:[["句動",[["correspond to A","Aに一致する・相当する"],["correspond with A","Aと文通する"]]]]},
{i:142,w:"criterion",l:4,c:"krinein(判断する)→「判定のためのものさし」→基準",e:[["名",["基準",["criteria","（複数形）基準"]]]]},
{i:143,w:"deceive",l:4,c:"de-(離す)+capere(取る)→「こっそり取り上げる」→だます",e:[["他動",["〜をだます",["deceive A into doing","Aをだまして〜させる"]]]]},
{i:144,w:"dedicate",l:4,c:"de-+dicare(宣言する)→「捧げると宣言する」→献身・捧げる",e:[["他動",[["dedicate A to B","AをBに捧げる"],["dedicate oneself to A","Aに身を捧げる"]]]]},
{i:145,w:"deliberate",l:4,c:"de-+libra(天秤)→「天秤にかけて考え抜いた」→意図的・慎重；熟考する",e:[["形",["意図的な；慎重な"]],["自動",["熟考する",["deliberate on A","Aについて熟考する"]]]]},
{i:146,w:"derive",l:4,c:"de-+rivus(川)→「川から水路を引く」→由来する・引き出す",e:[["句動",[["derive from A","Aに由来する"]]],["他動",[["derive A from B","BからA〔利益・知識など〕を引き出す"]]]]},
{i:147,w:"deteriorate",l:4,c:"deterior(より悪い)→「より悪い方へ進む」→悪化",e:[["自動","悪化する"]]},
{i:148,w:"dilemma",l:4,c:"di-(二つ)+lemma(前提)→「二つの前提に挟まれる」→板挟み",e:[["名","ジレンマ；板挟み"]]},
{i:149,w:"diminish",l:4,c:"de-+minuere(小さくする)→「小さくしていく」→減少",e:[["自動","減少する"],["他動","〜を減らす"]]},
{i:150,w:"dispute",l:4,c:"dis-(別々に)+putare(考える)→「考えが割れて言い争う」→論争・異議",e:[["名","論争；紛争"],["他動","〜に異議を唱える"]]},
{i:151,w:"distinct",l:4,c:"di-+stinguere(印をつける)→「区切りの印がはっきりある」→別個・明瞭",e:[["形",["はっきりした",["be distinct from A","Aとは別個の・明確に異なる"]]]]},
{i:152,w:"distribute",l:4,c:"dis-(別々に)+tribuere(割り当てる)→「配り分ける」→分配・分布",e:[["他動",["〜を分配する","〜を分布させる",["distribute A to B","AをBに配る"]]]]},
{i:153,w:"embrace",l:4,c:"em-(中に)+brace(腕)→「腕の中に入れる」→抱擁；考えを抱き入れる=受容",e:[["他動","〜を抱きしめる；（考えなど）を受け入れる"],["名","抱擁"]]},
{i:154,w:"emerge",l:4,c:"e-(外へ)+mergere(沈める)→「沈んだ状態から浮かび出る」→出現",e:[["自動",["現れる；明らかになる"]],["句動",[["emerge from A","Aから現れ出る"]]]]},
{i:155,w:"enhance",l:4,c:"altus(高い)→「高く引き上げる」→高める",e:[["他動","〜を高める；〜を向上させる"]]},
{i:156,w:"evaluate",l:4,c:"e-+value→「価値を引き出して定める」→評価",e:[["他動","〜を評価する"]]},
{i:157,w:"exaggerate",l:4,c:"ex-+aggerare(積み上げる)→「盛りに盛る」→誇張",e:[["他動","〜を誇張する"]]},
{i:158,w:"exploit",l:4,c:"ex-+plicare(折る)→「折り開いて使い尽くす」→活用・搾取",e:[["他動","〜を搾取する；〜を〔最大限〕活用する"],["名","功績"]]},
{i:159,w:"facilitate",l:4,c:"facilis(容易な)→「容易にしてやる」→促進",e:[["他動","〜を容易にする；〜を促進する"]]},
{i:160,w:"fluctuate",l:4,c:"fluctus(波)→「波のように上下する」→変動",e:[["自動","変動する"]]},
/* ---- Level 5: 難関大レベル ---- */
{i:161,w:"aesthetic",l:5,c:"aisthesis(知覚)→「感覚で美を捉える」→美的",e:[["形",["美的な"]],["名",[["aesthetics で","美学"]]]]},
{i:162,w:"alleviate",l:5,c:"ad-+levis(軽い)→「重荷を軽くしてやる」→緩和",e:[["他動","（苦痛など）を緩和する"]]},
{i:163,w:"ambivalent",l:5,c:"ambi-(両方)+valere(力がある)→「相反する二つの感情が同居する」",e:[["形",["相反する感情を持つ",["be ambivalent about A","Aに複雑な感情を抱く"]]]]},
{i:164,w:"autonomy",l:5,c:"auto-(自分)+nomos(法)→「自分の法で立つ」→自律・自治",e:[["名","自律；自治"]]},
{i:165,w:"coincide",l:5,c:"co-+incidere(落ちる)→「同じ所に落ち合う」→同時発生・一致",e:[["自動",["同時に起こる；一致する"]],["句動",[["coincide with A","Aと同時に起こる・一致する"]]]]},

async function computeIsOwner(email){
  if(!email) return false;
  try{
    const enc = new TextEncoder().encode(String(email).trim().toLowerCase());
    const buf = await crypto.subtle.digest("SHA-256", enc);
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    return hex === OWNER_EMAIL_HASH;
  }catch(e){ return false; }

let sharedWords = [];
const SHARED_ID_OFFSET = 10000000; // 共有単語のID衝突回避用オフセット
async function loadSharedWords(){
  if(!sb) return;
  try{

    if(!error && Array.isArray(data)){
      sharedWords = data.map(r => {

        if(r.core) o.c = r.core;
        return o;
      });
    }
  }catch(e){ /* 取得失敗時は共有なしとして続行 */ }
}
function allWords(){
  const c = Array.isArray(state.custom) ? state.custom : [];
  const merged = BUILTIN.concat(sharedWords).concat(c); // BUILTIN優先→共有→個人
  const seen = new Set(); const out = [];
  for(const w of merged){
    if(!w || typeof w !== "object" || w.i == null || typeof w.w !== "string") continue;
    const key = w.w.toLowerCase();
    if(seen.has(key)) continue; // 単語文字列で重複排除
    seen.add(key); out.push(w);
  }
  return out;
}

/* 保存の三段フォールバック: window.storage(アーティファクト) → localStorage(通常ブラウザ) → メモリのみ */
let saveTimer = null, dirty = false;
const persistInfo = { backend:null, failed:false };

async function backendSet(key, val){
  if(sb && currentUser){
    try{
      const { error } = await sb.from("user_data")
        .upsert({ user_id: currentUser.id, data: val, updated_at: new Date().toISOString() });
      if(!error){ persistInfo.backend = "cloud"; persistInfo.failed = false; return true; }
    }catch(e){ /* ネット不通など → ローカルへ退避 */ }
  }
  if(window.storage && typeof window.storage.set === "function"){
    try{
      const r = await window.storage.set(key, val);
      if(r){ persistInfo.backend = "artifact"; persistInfo.failed = false; return true; }
    }catch(e){ /* レート制限・非対応 → 次の手段へ */ }
  }
  try{
    localStorage.setItem(key, val);
    persistInfo.backend = "local"; persistInfo.failed = false; return true;
  }catch(e){ /* localStorage も不可 */ }
  persistInfo.backend = "memory"; persistInfo.failed = true; return false;
}
async function backendGet(key){
  if(sb && currentUser){
    try{
      const { data, error } = await sb.from("user_data")
        .select("data").eq("user_id", currentUser.id).maybeSingle();
      if(!error){ persistInfo.backend = "cloud"; return data ? data.data : null; }
    }catch(e){ /* 取得失敗 → ローカルへ */ }
  }
  if(window.storage && typeof window.storage.get === "function"){
    try{
      const r = await window.storage.get(key);
      if(r && r.value != null){ persistInfo.backend = "artifact"; return r.value; }
    }catch(e){ /* 初回はキー無しで例外 → 次の手段へ */ }
  }
  try{
    const v = localStorage.getItem(key);
    if(v != null){ if(!persistInfo.backend) persistInfo.backend = "local"; return v; }
  }catch(e){}
  return null;
}
function updateSaveBadge(status){

  else if(status === "pending"){ el.className = "save-badge"; el.textContent = "保存待ち…"; }

}
function scheduleSave(){ // 採点のたびに呼ぶ。2秒に1回にまとめてレート制限を回避
  dirty = true;

  saveTimer = setTimeout(flushSave, 2000);
}
async function flushSave(){ // 即時保存（設定変更・セッション終了・離脱時）
  if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
  if(!dirty){ updateSaveBadge(persistInfo.failed ? "error" : "saved"); return !persistInfo.failed; }
  const ok = await backendSet(STORE_KEY, JSON.stringify(state));
  if(ok) dirty = false;
  updateSaveBadge(ok ? "saved" : "error");

}

/* ===== 新バージョン公開の検知と通知 =====
   稼働中の APP_VERSION と、公開中のHTMLに埋め込まれた APP_VERSION を比較し、
   異なれば「更新があります」バナーを表示する（進捗・ログイン状態には一切触れない）。 */
let updateBannerShown = false;
let lastUpdateCheck = 0;
function showUpdateBanner(){
  if(updateBannerShown) return;
  updateBannerShown = true;
  const bar = document.createElement("div");
  bar.className = "update-banner";
  bar.innerHTML = `<span>新しいバージョンがあります。更新すると最新の内容になります（進捗・ログインは保持されます）。</span>
    <button id="updateReloadBtn">更新する</button>
    <button id="updateDismissBtn" aria-label="閉じる">×</button>`;
  document.body.appendChild(bar);
  document.getElementById("updateReloadBtn").onclick = ()=>{ location.reload(); };
  document.getElementById("updateDismissBtn").onclick = ()=>{ bar.remove(); };
}
async function checkForUpdate(){
  if(!navigator.onLine) return;
  const now = Date.now();
  if(now - lastUpdateCheck < 60000) return; // 最短でも1分間隔
  lastUpdateCheck = now;
  try{
    const res = await fetch(location.href, { cache: "no-store" });
    if(!res.ok) return;
    const text = await res.text();
    const m = text.match(/const APP_VERSION\s*=\s*"([^"]+)"/);
    if(m && m[1] && m[1] !== APP_VERSION){ showUpdateBanner(); }
  }catch(_){ /* 取得失敗時は何もしない */ }
}
function startUpdateWatcher(){
  setTimeout(checkForUpdate, 8000);                 // 起動から少し後に一度
  setInterval(checkForUpdate, 5*60*1000);           // 以降5分ごと
  document.addEventListener("visibilitychange", ()=>{ // タブに戻ったとき
    if(document.visibilityState === "visible"){
      checkForUpdate();
      /* C-1保険：長時間放置からの復帰時にセッションを1回確認する。
         supabase-jsの自動リフレッシュが正常なら通常はno-opだが、
         万一失効していても操作前に気づける（害なし）。 */
      if(sb){ sb.auth.getSession().catch(()=>{}); }
    }
  });
}
/* 2つの進捗stateを統合する。primary=クラウド(基準)、secondary=ローカル(未ログイン中の進捗)。
   単語ごとに「解答回数の多い方」を優先し、進捗を失わないようにする。 */
function mergeStates(primary, secondary){
  if(!primary) return secondary || null;
  if(!secondary) return primary;
  let out;
  try{ out = JSON.parse(JSON.stringify(primary)); }catch(_){ return primary; }
  out.words = out.words || {};
  const sw = secondary.words || {};
  for(const id in sw){
    const a = out.words[id], b = sw[id];
    if(!a){ out.words[id] = b; continue; }
    const seenA = (a.cSeen||0)+(a.wSeen||0);
    const seenB = (b.cSeen||0)+(b.wSeen||0);
    if(seenB > seenA) out.words[id] = b;
    else if(seenB === seenA && (b.reps||0) > (a.reps||0)) out.words[id] = b;
  }
  /* custom単語：単語文字列で重複排除しつつ統合（ID衝突する語は安全のため取り込まない） */
  const cust = Array.isArray(out.custom) ? out.custom.slice() : [];
  const usedWords = new Set(cust.map(x=>String(x.w).toLowerCase()));
  const usedIds = new Set(cust.map(x=>x.i));
  for(const c of (Array.isArray(secondary.custom) ? secondary.custom : [])){
    if(!c || typeof c.w !== "string") continue;
    const key = c.w.toLowerCase();
    if(usedWords.has(key) || usedIds.has(c.i)) continue;
    cust.push(c); usedWords.add(key); usedIds.add(c.i);
  }
  out.custom = cust;
  out.log = Object.assign({}, secondary.log||{}, out.log||{});
  out.settings = Object.assign({}, secondary.settings||{}, out.settings||{});
  /* 進行中セッションはクラウド優先。クラウドに無ければローカルの続きを引き継ぐ。 */
  out.activeSession = out.activeSession || secondary.activeSession || null;
  return out;
}
/* ログイン時：未ログイン中(localStorage)の進捗をアカウント(クラウド)に統合する。
   一度統合したら localStorage の進捗は消し、繰り返し統合されないようにする。 */
async function migrateGuestProgress(){
  if(!(sb && currentUser)) return null;
  let localRaw = null;
  try{ localRaw = localStorage.getItem(STORE_KEY); }catch(_){}
  if(!localRaw) return null;
  let localState = null;
  try{ localState = JSON.parse(localRaw); }catch(_){ return null; }
  const guestHasProgress = localState && localState.words && Object.keys(localState.words).length > 0;
  if(!guestHasProgress) return null;
  const wantsMerge = await askMergeGuestProgress();
  if(!wantsMerge){
    try{ localStorage.removeItem(STORE_KEY); }catch(_){}
    return null;
  }
  let cloudState = null;
  try{
    const { data } = await sb.from("user_data").select("data").eq("user_id", currentUser.id).maybeSingle();
    if(data && data.data){ try{ cloudState = JSON.parse(data.data); }catch(_){ cloudState = null; } }
  }catch(_){}
  const merged = mergeStates(cloudState, localState);
  if(!merged) return null;
  try{
    await sb.from("user_data").upsert({ user_id: currentUser.id, data: JSON.stringify(merged), updated_at: new Date().toISOString() });
    try{ localStorage.removeItem(STORE_KEY); }catch(_){}
  }catch(_){ /* アップロード失敗時は localStorage を残し、次回再試行できるようにする */ }
  return merged;   /* (A-safe) 統合結果を返す。呼び出し側で loadState 後に state へ反映し、失敗時も次回saveでクラウドへ回収する */
}
/* C-3：引き継ぎ確認の発火制御。端末に「最後に迎えた user.id」を記録し、
   user.id が変化した初回のみ確認する（＝アプリを開いただけでは確認しない／要件23）。 */
const LAST_UID_KEY = "vocab-srs-lastuid";
function getLastUid(){ try{ return localStorage.getItem(LAST_UID_KEY) || null; }catch(_){ return null; } }
function setLastUid(id){ try{ if(id) localStorage.setItem(LAST_UID_KEY, id); }catch(_){} }
function clearLastUid(){ try{ localStorage.removeItem(LAST_UID_KEY); }catch(_){} }
/* ログイン時だけ引き継ぎ確認を行い、統合結果(merged|null)を返す。
   直接 migrateGuestProgress() を呼ばず、必ずこの関数経由にする（要件23の再発防止）。 */
async function maybeMigrateOnLogin(){
  if(IS_RECOVERY) return null;                        /* P-4：リセット到来時は引き継ぎ確認を出さない（通常ログインでは常にfalseなので不変） */
  if(!(sb && currentUser)) return null;
  if(currentUser.id === getLastUid()) return null;   /* 同じアカウントで挨拶済み → 開いただけでは出さない */
  const merged = await migrateGuestProgress();        /* ゲスト進捗がある時だけ確認モーダルが出る（既存ロジック） */
  setLastUid(currentUser.id);                         /* 迎え済みを記録 → 次回以降は出ない（(A)採用） */
  return merged;
}

/* ---- 今日のキュー ---- */
/* ---- ストック方式 ----
   開いた日に未出単語を newPerDay 語だけ「ストック（学習対象）」に登録する。
   登録=state.words にエントリ作成（step0, 翌日から復習対象）。以降 SRS で出題。 */
function stockToday(){
  const t = todayStr();
  if(state.log[t] && state.log[t].stocked!=null) return;
  let diff = chunkStars();
  const candidates = d => allWords().filter(w=>{ const st=state.words[w.i]; return (!st || st.inReview===false) && w.l<=d; }).sort((a,b)=>a.i-b.i);
  let fresh = candidates(diff);
  /* ②難易度自動昇格：☆N以下の未ストック語が尽きたら☆を上げる */
  while(fresh.length===0 && diff<5){ diff++; fresh = candidates(diff); }
  if(diff !== chunkStars()) state.settings.difficulty = diff;
  fresh = fresh.slice(0, state.settings.newPerDay);
  for(const w of fresh) ensureWordRecord(w.i, true);
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  state.log[t].stocked = fresh.length;
  saveState();
}
/* 未ストックの単語がまだ残っているか（＝「追加でもっと学習する」を出せるか判定） */
function anyStockableWords(){
  return allWords().some(w=>{ const st = state.words[w.i]; return !st || st.inReview===false; });
}
/* 1日のノルマ達成後でも、追加で新しい単語を今すぐストックして学習を始められるようにする。
   stockToday() の「1日1回だけ」制限を無視して、newPerDay と同じ件数を追加投入する。 */
function stockExtra(n){
  let diff = chunkStars();
  const candidates = d => allWords().filter(w=>{ const st=state.words[w.i]; return (!st || st.inReview===false) && w.l<=d; }).sort((a,b)=>a.i-b.i);
  let fresh = candidates(diff);
  while(fresh.length===0 && diff<5){ diff++; fresh = candidates(diff); }
  fresh = fresh.slice(0, n);
  for(const w of fresh) ensureWordRecord(w.i, true);
  const t = todayStr();
  if(!state.log[t]) state.log[t] = {news:0, reviews:0, stocked:0};
  state.log[t].stocked = (state.log[t].stocked||0) + fresh.length;
  saveState();
  return fresh.length;
}
function dueReviews(){
  const t = todayStr();
  return allWords()
    .filter(w => { const st=state.words[w.i]; return st && st.inReview!==false && !st.mastered && st.due <= t; })
    .sort((a,b)=>{
      const sa=state.words[a.i], sb=state.words[b.i];
      const na=((sa.cSeen||0)+(sa.wSeen||0))===0?0:1, nb=((sb.cSeen||0)+(sb.wSeen||0))===0?0:1;
      if(na!==nb) return na-nb;
      const wa=(sa.failStreak||0)>0?0:1, wb=(sb.failStreak||0)>0?0:1;
      if(wa!==wb) return wa-wb;
      return sa.due.localeCompare(sb.due) || a.i-b.i;
    });
}
/* 正答率（選択式・記述式それぞれ）: {cRate,cSeen,cCorrect,wRate,wSeen,wCorrect,reps} */
function accuracy(id){
  const st = state.words[id];
  if(!st) return null;
  const cSeen=st.cSeen||0, wSeen=st.wSeen||0;
  if(cSeen===0 && wSeen===0) return null;
  return {
    reps: st.reps||0,
    cSeen, cCorrect:st.cCorrect||0, cRate: cSeen? Math.round((st.cCorrect||0)/cSeen*100):null,
    wSeen, wCorrect:st.wCorrect||0, wRate: wSeen? Math.round((st.wCorrect||0)/wSeen*100):null
  };
}
/* 回答を1回分記録（リトライ含む・正答率の母数）。kind: "c"(選択式) | "w"(記述式) */
function recordAnswer(id, kind, ok){
  const st = state.words[id];
  if(kind==="c"){ st.cSeen=(st.cSeen||0)+1; if(ok) st.cCorrect=(st.cCorrect||0)+1; }
  else{ st.wSeen=(st.wSeen||0)+1; if(ok) st.wCorrect=(st.wCorrect||0)+1; }
}
/* カード左上の統計表示（出題回数・選択式正答率・記述式正答率） */
function accStatsHtml(id){
  const a = accuracy(id);
  if(!a){ return '<span class="acc-tag">初出</span>'; }
  const c = a.cRate!=null ? `選 ${a.cRate}%` : "選 −";
  const wv = a.wRate!=null ? `記 ${a.wRate}%` : "記 −";
  return `<span class="acc-tag">出題${a.reps}回・${c}・${wv}</span>`;
}
/* チャンク終了時の定着判定。cPass/wPass = 各ブロックで2回目までに正解したか */
function finalizeWord(id, cPass, wPass){
  const st = state.words[id];
  st.reps = (st.reps||0) + 1;          // 出題回数（チャンク内+1）
  if(cPass && wPass){
    /* 定着判定1回。3回連続で「定着済」 */
    st.okStreak = (st.okStreak||0) + 1;
    st.failStreak = 0;
    st.revStage = Math.min(2, (st.revStage||0) + 1);
    if(st.okStreak >= 3){ st.mastered = true; st.due = "9999-12-31"; }
    else{
      st.step = Math.min(INTERVALS.length-1, (st.step||0) + 1);
      st.due = addDays(INTERVALS[st.step]);
    }
  }else{
    st.okStreak = 0;
    st.failStreak = (st.failStreak||0) + 1;
    if(st.failStreak >= 2){ st.revStage = 0; }
    st.step = 0; st.due = addDays(1); st.lapses = (st.lapses||0)+1;
  }
  bumpLog("reviews");
}
function bumpLog(kind){
  const t = todayStr();
  if(!state.log[t]) state.log[t] = {news:0, reviews:0};
  state.log[t][kind]++;
}
function streak(){
  let n=0; const d=new Date();
  if(!state.log[todayStr(d)]) d.setDate(d.getDate()-1); // 今日未学習でも昨日まで連続なら継続扱い
  while(state.log[todayStr(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}

/* ---- 音声 (Web Speech API) ---- */
let enVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  if(enVoice) u.voice = enVoice;
  u.rate = state.settings.rate;
  speechSynthesis.speak(u);
}

function renderData(){
  session = null;
  app.innerHTML = `
  <header><div><h1>単語データの追加</h1></div>
    <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a></header>

    <textarea id="importBox" placeholder='[{"w":"...","l":3,"e":[["他動","..."]]}]'></textarea>
    <button class="btn-sub" id="importBtn">単語を追加</button>
    <button class="btn-sub" id="exportBtn">バックアップを書き出す</button>
    <button class="btn-sub" id="restoreBtn">バックアップから復元</button>
    <span class="msg" id="dataMsg"></span>
  </div></div>`;
  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  document.getElementById("importBtn").onclick = async ()=>{
    const box = document.getElementById("importBox"), msg = document.getElementById("dataMsg");
    try{
      const arr = JSON.parse(box.value);
      if(!Array.isArray(arr)) throw new Error("配列ではありません");
      let maxId = Math.max(...allWords().map(w=>w.i));
      let added = 0;
      const toSubmit = [];
      const existing = new Set(allWords().map(w=>w.w.toLowerCase()));
      for(const o of arr){
        if(typeof o.w!=="string" || !Array.isArray(o.e)) throw new Error("形式エラー: "+JSON.stringify(o).slice(0,40));
        if(existing.has(o.w.toLowerCase())) continue;
        const entry = { i:++maxId, w:o.w, l:Math.max(1,Math.min(5,o.l||3)), e:o.e };
        if(o.c) entry.c = o.c;
        state.custom.push(entry);
        toSubmit.push({ word:o.w, level:entry.l, core:(o.c||null), entries:o.e });
        existing.add(o.w.toLowerCase()); added++;
      }
      await saveState();
      let extra = "";
      if(sb && currentUser && toSubmit.length){
        try{
          const rows = toSubmit.map(s => Object.assign({}, s, { submitted_by: currentUser.id, submitter_email: currentUser.email || null, submitter_nickname: (state.settings.nickname||null) }));
          const { error } = await sb.from("word_submissions").insert(rows);
          extra = error ? "（共有申請の送信に失敗しました）" : "。承認され次第、全員に反映されます";
        }catch(_){ extra = "（共有申請の送信に失敗しました）"; }
      } else if(added){
        extra = "（ログインすると、全員への共有を申請できます）";
      }
      msg.className="msg"; msg.textContent = `${added} 語を追加しました（重複は除外）${extra}`;
    }catch(e){ msg.className="msg err"; msg.textContent = "読み込み失敗: "+e.message; }
  };
  document.getElementById("exportBtn").onclick = ()=>{
    document.getElementById("importBox").value = JSON.stringify({state});
    const msg=document.getElementById("dataMsg"); msg.className="msg";
    msg.textContent = "上の欄の内容をコピーして保管してください";
  };
  document.getElementById("restoreBtn").onclick = async ()=>{
    const msg=document.getElementById("dataMsg");
    try{
      const o = JSON.parse(document.getElementById("importBox").value);
      if(!o.state || typeof o.state.words!=="object") throw new Error("バックアップ形式ではありません");
      state = o.state;
      if(!Array.isArray(state.custom)) state.custom = [];
      state.settings = Object.assign({newPerDay:30,rate:0.95,difficulty:1,posChunk:30}, state.settings||{});
      if(typeof state.settings.difficulty === "string"){
        state.settings.difficulty = ({easy:1,mid:2,hard:3})[state.settings.difficulty] || 1;
      }
      delete state.settings.modes;
      await saveState();
      msg.className="msg"; msg.textContent="復元しました";
      setTimeout(renderHome, 600);
    }catch(e){ msg.className="msg err"; msg.textContent="復元失敗: "+e.message; }
  };
}

    if(!sb){ msg.className="msg err"; msg.textContent="送信機能が使えません（クラウド未接続）"; return; }
    let attName=null, attType=null, attData=null;
    if(f){
      if(f.size > 2*1024*1024){ msg.className="msg err"; msg.textContent="添付は2MBまでです"; return; }
      try{
        attData = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error("読込失敗")); r.readAsDataURL(f); });
        attName = f.name; attType = f.type || null;
      }catch(_){ msg.className="msg err"; msg.textContent="添付の読み込みに失敗しました"; return; }
    }
    msg.className="msg"; msg.textContent="送信中…";
    if(nick){ state.settings.nickname = nick; await saveState(); }
    try{
      const { error } = await sb.from("feedback").insert({
        message: text, attachment_name: attName, attachment_type: attType, attachment_data: attData,
        submitter_email: (currentUser && currentUser.email) ? currentUser.email : null,
        submitter_nickname: nick || null,
        submitted_by: (currentUser ? currentUser.id : null)
      });
      if(error){ msg.className="msg err"; msg.textContent="送信に失敗しました: "+error.message; return; }
      document.getElementById("fbBox").value=""; fileEl.value="";
      msg.className="msg"; msg.textContent="送信しました。ありがとうございます。";
      await refreshOwnFeedbackHistory();
    }catch(e){ msg.className="msg err"; msg.textContent="送信に失敗しました: "+e.message; }
  };
  refreshOwnFeedbackHistory();
}

/* ---- セッション ----
   各語を選択式→(誤答/スキップ時のみ確認)→記述式→判定 の順で処理する。
   判定(SRSの間隔更新)は記述式の結果のみで行う。 */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
/* --- 語義データの正規化（新旧両構造を吸収）---
   新: [品詞, [候補,...]]  候補 = "日本語" | ["原形パターン","日本語訳"]
   旧: [品詞, "訳；訳"]
   返り値: [{pos, ja:[日本語訳...], cands:[表示用候補...]}]
   ja: 選択式の正解候補（日本語のみ）  cands: 確認・参照モード用の全表示 */
const POS_ORDER = {"自動":0,"他動":1,"名":2,"形":3,"副":4,"句動":5,"熟":6};
function normEntries(w){
  const arr = w.e.map(ent=>{
    const pos = ent[0];
    const raw = ent[1];
    if(Array.isArray(raw)){
      const items = raw.map(c=>Array.isArray(c)?{ja:c[1], pat:c[0]}:{ja:c, pat:null});
      const ja = items.map(x=>x.ja);
      const cands = items.map(x=>x.pat?(x.pat+"："+x.ja):x.ja);
      return {pos, ja, cands, items};
    }else{
      const parts = String(raw).split("；").map(s=>s.trim()).filter(Boolean);
      const jaArr = parts.length?parts:[String(raw)];
      return {pos, ja:jaArr, cands:[String(raw)], items:jaArr.map(j=>({ja:j, pat:null}))};
    }
  });
  /* 品詞順に安定ソート（自動→他動→名→形→副→句動→熟） */
  return arr.map((e,idx)=>({e,idx})).sort((a,b)=>{
    const pa = POS_ORDER[a.e.pos]??99, pb = POS_ORDER[b.e.pos]??99;
    return (pa-pb) || (a.idx-b.idx);
  }).map(x=>x.e);
}
/* 確認・記述式で表示する全訳リスト（品詞ラベル＋全候補） */
function fullEntriesHtml(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`
  ).join("");
}
function promptEntries(w){
  return fullEntriesHtml(w);
}
/* 記述式の問題文用：英熟語パターンを出さず、日本語訳のみを表示 */
function jaOnlyEntries(w){
  return normEntries(w).map(e=>
    `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.ja.join("／"))}</span></div>`
  ).join("");
}
/* 空欄数を復習段階(revStage)で決める。
   revStage 0(初回): 1個以上 かつ 全区分の25%未満
   revStage 1(復習1回目): 25%以上75%未満
   revStage 2(2回目以降): 75%以上
   範囲内は個数ランダム。最低1個は絶対。 */
function blankCountByStage(posCount, revStage){
  if(posCount <= 1) return 1;
  const lo25 = posCount*0.25, hi75 = posCount*0.75;
  let min, max;
  if(revStage <= 0){          // 25%未満
    min = 1; max = Math.max(1, Math.ceil(lo25) - 1);
    if(lo25 === Math.floor(lo25)) max = Math.max(1, lo25 - 1); // ちょうど25%は含めない
    max = Math.min(max, posCount);
  }else if(revStage === 1){    // 25%以上75%未満
    min = Math.max(1, Math.ceil(lo25));
    max = Math.max(min, Math.ceil(hi75) - 1);
    if(hi75 === Math.floor(hi75)) max = Math.max(min, hi75 - 1);
    max = Math.min(max, posCount);
  }else{                       // 75%以上
    min = Math.max(1, Math.ceil(hi75));
    max = posCount;
  }
  if(min > max) min = max;
  return min + Math.floor(Math.random()*(max - min + 1)); // 範囲内ランダム
}
/* チャンク（今回出題される語群）の難易度☆(1〜5)＝設定difficulty */
function chunkStars(){
  return Math.max(1, Math.min(5, state.settings.difficulty||1));
}
function starHtml(d){
  d = Math.max(1, Math.min(5, d));
  let s = '<svg class="stars-svg" viewBox="0 0 '+(5*15)+' 15" aria-hidden="true">';
  for(let i=0;i<5;i++){
    const cx=i*15+7.5;
    const pts=starPoints(cx,7.5,6.5);
    s += '<polygon points="'+pts+'" class="'+(i<d?"star-fill":"star-empty")+'"/>';
  }
  return s+'</svg>';
}
function starPoints(cx,cy,r){
  const ri=r*0.42; let p=[];
  for(let k=0;k<10;k++){ const ang=-Math.PI/2 + k*Math.PI/5; const rad=(k%2===0)?r:ri;
    p.push((cx+rad*Math.cos(ang)).toFixed(2)+','+(cy+rad*Math.sin(ang)).toFixed(2)); }
  return p.join(' ');
}
/* 品詞ごとの訳プールを作る（誤答肢の品詞統一用）。品詞 -> [訳,...] */
function jaPoolByPos(excludeId, sameLv){
  const pool = {};
  for(const x of allWords()){
    if(x.i === excludeId) continue;
    if(sameLv!=null && (x.l===sameLv) !== true) continue;
    for(const e of normEntries(x)){
      (pool[e.pos] = pool[e.pos] || []).push(...e.ja);
    }
  }
  return pool;
}
/* 選択式の問題を生成：
   各区分から候補(items)を1つランダムに選んで正解とし、
   誤答肢3つは「同じ品詞」の他語の訳から（不足時は他品詞で補充）。
   正解候補がパターン付きなら、そのパターンを問題文表示用に保持 */
/* 訳語文字列を「意味の単位」に分解する（「・」「；」区切り＋先頭の〜／助詞を除去）。
   誤答選択肢が正解と同じ意味を含んでいないかを判定するために使う。 */
function coreSegments(str){
  return String(str).split(/[・;；]/)
    .map(s=>s.replace(/^[〜～]/,"").replace(/^(を|は|が|に|と|も)/,"").trim())
    .filter(Boolean);
}
function makePosQuiz(w){
  const norm = normEntries(w);
  const st = state.words[w.i];
  const revStage = st ? (st.revStage||0) : 0;
  const nBlank = blankCountByStage(norm.length, revStage);
  const idxs = shuffle(norm.map((_,k)=>k)).slice(0, nBlank).sort((a,b)=>a-b);
  const ownJa = new Set(norm.flatMap(e=>e.ja));
  const poolSameLv = jaPoolByPos(w.i, w.l);
  const poolAll = jaPoolByPos(w.i, null);
  const quizzes = {};   // k -> {correct, pat, opts:[...]}
  for(const k of idxs){
    const pos = norm[k].pos;
    const it = norm[k].items[Math.floor(Math.random()*norm[k].items.length)]; // 候補を1つ
    const correct = it.ja;
    const correctSegs = coreSegments(correct);
    /* 誤答肢：同品詞・同レベル → 同品詞・全レベル → 全品詞、の順で補充。
       正解と同じ意味の単位（「・」区切りの断片）を含む候補は、
       他の単語の訳であっても誤答として出さない（例：include「含む」の誤答に
       involve「含む・伴う」を出さない） */
    const distractors = [];
    const tryPush = (arr)=>{
      for(const cand of shuffle(arr.slice())){
        if(distractors.length >= 3) break;
        if(cand === correct || ownJa.has(cand) || distractors.includes(cand)) continue;
        const candSegs = coreSegments(cand);
        if(candSegs.some(cs=>correctSegs.includes(cs))) continue;
        distractors.push(cand);
      }
    };
    tryPush(poolSameLv[pos] || []);
    if(distractors.length < 3) tryPush(poolAll[pos] || []);
    if(distractors.length < 3){ // 最終フォールバック：全品詞から
      const flat = Object.values(poolAll).flat();
      tryPush(flat);
    }
    quizzes[k] = { correct, pat: it.pat || null, opts: shuffle([correct].concat(distractors)) };
  }
  return { blanks:idxs, quizzes };
}
function buildQueue(mode){
  let ids;
  if(mode === "weak"){
    const lowRate = (st)=>{
      const cr = (st.cSeen)? st.cCorrect/st.cSeen : 1;
      const wr = (st.wSeen)? st.wCorrect/st.wSeen : 1;
      return Math.min(cr, wr);
    };
    const seenAny = (st)=> (st.cSeen||0)+(st.wSeen||0);
    ids = allWords().filter(w=>{ const st=state.words[w.i]; return st && seenAny(st)>0 && !st.mastered && lowRate(st)<0.8; })
      .sort((a,b)=>{
        const sa=state.words[a.i], sb=state.words[b.i];
        const ra=lowRate(sa), rb=lowRate(sb);
        if(ra!==rb) return ra-rb;
        return seenAny(sb)-seenAny(sa);
      })
      .map(w=>({id:w.i}));
  }else{
    ids = dueReviews().map(w=>({id:w.i}));
  }
  return ids.map(x=>{
    const w = byId(x.id);
    return {
      id:x.id,
      quiz: makePosQuiz(w),
      picks:{}, confirmed:{}, choiceDone:false, choiceOk:null,
      cTries:0, cPassed:false, cFailed:false,
      answeredWrite:false, writeOk:null,
      wTries:0, wPassed:false, wFailed:false
    };
  });
}
function startSession(mode){
  const queue = buildQueue(mode||"review");
  if(queue.length===0) return;
  /* block: choice→write。各ブロックで phase: "main"(全語1回目)→"retry"(間違えた語の2回目) */
  session = { queue, block:"choice", phase:"main", order:queue.map((_,i)=>i), pos:0,
              retry:[], mode:(mode||"review"), counts:{ok:0,ng:0} };
  saveSession();
  renderCard();
}
/* セッションの途中状態を保存／復元（完全復元用） */
function curItem(){
  const s = session;
  if(!s || s.pos >= s.order.length) return null;
  return s.queue[s.order[s.pos]];
}
/* 現ブロック・フェーズを1つ進める。フェーズ/ブロックの遷移も処理 */
function advance(){
  const s = session;
  s.pos++;
  if(s.pos < s.order.length){ saveSession(); return renderCard(); }
  /* order を消化しきった */
  if(s.phase === "main"){
    if(s.retry.length){
      s.phase = "retry"; s.order = s.retry.slice(); s.retry = []; s.pos = 0;
      saveSession(); return renderCard();
    }
    // retry無し → 次ブロックへ
    return nextBlock();
  }else{ // retryフェーズ終了
    return nextBlock();
  }
}
function nextBlock(){
  const s = session;
  if(s.block === "choice"){
    s.block = "write"; s.phase = "main";
    s.order = s.queue.map((_,i)=>i); s.retry = []; s.pos = 0;
    saveSession(); return renderCard();
  }
  /* 記述式も終了 → 全語の最終判定 */
  finalizeSession();
}
/* 全語の定着/未定着を確定し、SRSへ反映 */
function finalizeSession(){
  const s = session;
  for(const item of s.queue){
    const both = item.cPassed && item.wPassed;
    if(s.mode === "review"){
      finalizeWord(item.id, item.cPassed, item.wPassed);
    }
    if(both) s.counts.ok++; else s.counts.ng++;
  }
  renderDone();
}
function saveSession(){
  state.activeSession = session ? {
    queue: session.queue, block: session.block, phase: session.phase,
    order: session.order, pos: session.pos, retry: session.retry,
    mode: session.mode, counts: session.counts
  } : null;
  scheduleSave();
}
function resumeSession(){
  const a = state.activeSession;
  if(!a) return false;
  session = { queue:a.queue, block:a.block||"choice", phase:a.phase||"main",
              order:a.order||a.queue.map((_,i)=>i), pos:a.pos||0, retry:a.retry||[],
              mode:a.mode||"review", counts:a.counts||{ok:0,ng:0} };
  renderCard();
  return true;
}
function renderCard(){
  const s = session;
  const item = curItem();
  if(!item){ return; }
  if(!item.confirmed) item.confirmed = {};   // 旧セッション復元時の保険
  const w = byId(item.id);
  const retryTag = s.phase==="retry" ? "（2回目）" : "";
  const blockLabel = (s.block==="choice" ? "① 選択式" : "② 記述式") + retryTag;
  const pct = Math.round(s.pos / Math.max(1,s.order.length) * 100);

  let body = "";
  if(s.block === "choice"){
    body = renderChoiceBody(item, w);
  }else{
    body = renderWriteBody(item, w);
  }

  const modeTag = s.mode==="weak" ? '<span class="tag" style="background:var(--shu)">苦手</span>' : '';

  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-act="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${s.pos+1} / ${s.order.length}</span>
      <span class="tag mode">${blockLabel}</span>
    </div>
    <div class="progress-track"><div class="p" style="width:${pct}%"></div></div>
    <div class="wcard">
      <div class="card-meta">
        <span class="diff-stars" title="難易度">${starHtml(chunkStars())}</span>
        ${accStatsHtml(item.id)}
        <span style="margin-left:auto"></span>${modeTag}
      </div>
      ${body}
    </div>`;

  app.querySelectorAll("[data-act]").forEach(el=>{
    el.onclick = (ev)=>{ ev.preventDefault(); handleAct(el.dataset.act, el); };
  });
  const win = document.getElementById("writeIn");
  if(win && !item.answeredWrite){
    win.focus();
    win.onkeydown = e=>{
      if(e.key!=="Enter") return;
      /* IME変換確定のEnterには一切触れない（preventDefaultもしない）＝日本語の確定を邪魔しない */
      if(e.isComposing || e.keyCode===229) return;
      /* 変換を経由しない“本物のEnter”だけ既定動作を抑えて判定へ */
      e.preventDefault();
      handleAct("writeCheck");
    };
  }
  /* 判定済みなら、下に隠していた解説へスムーズスクロールして表示 */
  const judged = (s.block==="choice" && item.choiceDone) || (s.block==="write" && item.answeredWrite);
  if(judged){
    requestAnimationFrame(()=>{
      const rz = app.querySelector(".reveal-zone.open");
      if(rz && rz.scrollIntoView) rz.scrollIntoView({behavior:"smooth", block:"start"});
    });
  }
}

/* ---- 選択式（品詞別・訳選択）の本体 ---- */
function renderChoiceBody(item, w){
  const q = item.quiz;
  const norm = normEntries(w);
  const rows = norm.map((e,k)=>{
    const isBlank = q.blanks.includes(k);
    if(!isBlank){
      return `<div class="entry"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.ja.join("／"))}</span></div>`;
    }
    const picked = item.picks[k];
    const confirmed = !!item.confirmed[k];
    const correct = q.quizzes[k].correct;
    const optHtml = q.quizzes[k].opts.map((o,oi)=>{
      let cls = "opt-btn";
      if(item.choiceDone){
        if(o===correct) cls += " correct";
        else if(o===picked) cls += " wrong";
      }else if(o===picked){ cls += " picked"; }
      const dis = (item.choiceDone || confirmed) ? "disabled" : "";
      return `<button class="${cls}" data-act="pick" data-k="${k}" data-val="${esc(o)}" ${dis}><span class="opt-num">${oi+1}</span>${esc(o)}</button>`;
    }).join("");
    const slot = confirmed ? `✓ ${esc(picked)}` : (picked?esc(picked):"〔　？　〕");
    const label = `<span class="pos-badge">${esc(e.pos)}</span>`;
    return `<div class="blank-block${confirmed?" confirmed":""}">
      <div class="entry">${label}<span class="meaning blank-slot">${slot}</span></div>
      <div class="opt-list">${optHtml}</div>
    </div>`;
  }).join("");

  const hint = item.choiceDone ? "" :
    `<div class="hint choice-hint">選択肢を2回タップで確定（PCは数字キー→もう一度／Enter）</div>`;

  let resultHtml = "";
  if(item.choiceDone){
    const wrong = q.blanks
      .filter(k=>item.picks[k] !== q.quizzes[k].correct)
      .map(k=>`<div class="wrong-line">✕ あなたの解答：${esc(item.picks[k]||"（未選択）")}</div>`).join("");
    resultHtml = `<div class="dict-result ${item.choiceOk?"ok":"ng"}">${item.choiceOk?"◎ 正解":"✕ 不正解"}</div>${wrong}`;
  }

  return `<div class="word-display">${esc(w.w)}</div>
    ${hint}
    <div class="prompt-zone">${rows}</div>
    <div class="reveal-zone ${item.choiceDone?"open":""}">
      ${revealBody(w, resultHtml, "choiceNext")}
    </div>`;
}

/* ---- 選択式：2タップ確定ロジック（クリック／キーボード共通） ---- */
function choiceSelect(k, o){
  const item = curItem();
  if(!item || item.choiceDone) return;
  if(!item.confirmed) item.confirmed = {};
  if(item.confirmed[k]) return;            // 確定済みブランクは触れない
  if(item.picks[k] === o){                 // 同じ肢を2回目 → このブランクを確定
    choiceConfirmBlank(k);
  }else{                                   // 別の肢／初回 → 選択（乗り換え）
    item.picks[k] = o;
    saveSession();
    renderCard();
  }
}
function choiceConfirmBlank(k){
  const item = curItem();
  if(!item || item.choiceDone) return;
  if(!item.picks[k]) return;               // 何も選んでいなければ確定不可
  item.confirmed[k] = true;
  const q = item.quiz;
  if(q.blanks.every(b=>item.confirmed[b])){ // 全ブランク確定 → 採点
    gradeChoice();
  }else{
    saveSession();
    renderCard();
  }
}
function gradeChoice(){
  const item = curItem();
  if(!item) return;
  const q = item.quiz;
  const w = byId(item.id);
  item.choiceDone = true;
  item.choiceOk = q.blanks.every(k=>item.picks[k] === q.quizzes[k].correct);
  item.cTries++;
  recordAnswer(item.id, "c", item.choiceOk);   // 回答回数に必ずカウント（リトライ含む）
  if(item.choiceOk) item.cPassed = true;
  else if(item.cTries >= 2) item.cFailed = true;
  saveSession();
  renderCard();
  speak(w.w);
}
/* PCキーボード：数字で先頭の未確定ブランクを選択、同数字／Enterで確定 */
function choiceKeydown(e){
  const s = session;
  if(!s || s.block !== "choice") return;
  const ae = document.activeElement;
  if(ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return; // 入力欄フォーカス中は無反応
  if(!app.querySelector(".opt-list")) return;                            // 選択式カード表示中のみ
  const item = curItem();
  if(!item || item.choiceDone) return;
  if(!item.confirmed) item.confirmed = {};
  const q = item.quiz;
  const activeK = q.blanks.find(k=>!item.confirmed[k]);
  if(activeK === undefined) return;
  if(e.key === "Enter"){
    if(item.picks[activeK]){ e.preventDefault(); choiceConfirmBlank(activeK); }
    return;
  }
  if(/^[1-9]$/.test(e.key)){
    const idx = parseInt(e.key) - 1;
    const opts = q.quizzes[activeK].opts;
    if(idx < opts.length){ e.preventDefault(); choiceSelect(activeK, opts[idx]); }
  }
}

/* ---- 確認カード共通本体 ---- */
function confirmCardBody(w, wrongHtml){

}

/* ---- 記述式の本体 ---- */
function renderWriteBody(item, w){
  const secondFail = session && session.mode==="review" && item.wTries>=2;
  const yourAnswer = item.lastInput ? esc(item.lastInput) : "（スキップ）";
  let resultHtml = "";
  if(item.answeredWrite){
    const inner = item.writeOk
      ? "◎ 正解"
      : `✕ 不正解<div class="sub-line">あなたの解答：${yourAnswer}　→　正解：${esc(w.w)}</div><div class="sub-line">${secondFail ? "翌日やり直し" : "確認しよう"}</div>`;
    resultHtml = `<div class="dict-result ${item.writeOk?"ok":"ng"}">${inner}</div>
      <div class="word-display" style="font-size:1.4rem;margin:0 0 8px">${esc(w.w)}</div>`;
  }
  return `<div class="hint">意味に合う英単語をスペルまで正確に入力（Enterで判定）</div>
    <div class="prompt-zone">${jaOnlyEntries(w)}</div>
    <div class="dict-row">
      <input id="writeIn" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" placeholder="英単語を入力" value="${item.answeredWrite?esc(item.lastInput||""):""}" class="${item.answeredWrite?(item.writeOk?"ok":"ng"):""}" ${item.answeredWrite?"disabled":""}>
      <button class="btn-sub" data-act="writeCheck" ${item.answeredWrite?"disabled":""}>判定</button>
      <button class="btn-sub" data-act="writeSkip" ${item.answeredWrite?"disabled":""}>スキップ</button>
    </div>
    <div class="reveal-zone ${item.answeredWrite?"open":""}">
      ${revealBody(w, resultHtml, "writeNext")}
    </div>`;
}
function handleAct(act, el){
  const s = session;
  const item = curItem();
  if(!item) return;
  const w = byId(item.id);
  if(act==="speak"){ speak(w.w); return; }
  if(act==="exit"){ saveSession(); flushSave(); renderHome(); return; }

  /* ==== ブロックA：選択式（2タップ確定） ==== */
  if(act==="pick"){
    choiceSelect(parseInt(el.dataset.k), el.dataset.val);
    return;
  }
  if(act==="choiceNext"){
    /* 選択式の1問終了。誤答かつ1回目(main)なら retry に積む */
    if(!item.choiceOk && s.phase==="main" && !item.cPassed){
      s.retry.push(s.order[s.pos]);
    }
    // 次問へ進む前に、選択式の状態をリセット（2回目再挑戦に備える）
    item.choiceDone = false; item.choiceOk = null; item.picks = {}; item.confirmed = {};
    if(s.phase==="retry"){ item.quiz = makePosQuiz(w); } // 2回目は新しい問題を作る
    advance();
    return;
  }

  /* ==== ブロックB：記述式 ==== */
  if(act==="writeCheck"){ // 「判定」
    if(item.answeredWrite) return; // キーボード経由の二重発火に対する保険
    const v = (document.getElementById("writeIn").value||"").trim().toLowerCase();
    if(!v) return;
    item.answeredWrite = true;
    item.writeOk = (v === w.w.toLowerCase());
    item.lastInput = v;
    item.wTries++;
    recordAnswer(item.id, "w", item.writeOk);
    if(item.writeOk) item.wPassed = true;
    else if(item.wTries >= 2) item.wFailed = true;
    saveSession();
    renderCard();
    speak(w.w);
    return;
  }
  if(act==="writeSkip"){
    if(item.answeredWrite) return;
    item.answeredWrite = true;
    item.writeOk = false;
    item.lastInput = "";
    item.wTries++;
    recordAnswer(item.id, "w", false);
    if(item.wTries >= 2) item.wFailed = true;
    saveSession();
    renderCard();
    return;
  }
  if(act==="writeNext"){
    if(!item.writeOk && s.phase==="main" && !item.wPassed){
      s.retry.push(s.order[s.pos]);
    }
    item.answeredWrite = false; item.writeOk = null;
    advance();
    return;
  }
}

/* ---- 参照モード（判定に一切関与しない全単語一覧）---- */
let refFilter = { lv:"all", q:"", sort:"std" };
function renderReference(){
  session = null;
  const words = allWords().slice().sort((a,b)=>a.i-b.i);
  const q = refFilter.q.trim().toLowerCase();
  let list = words.filter(w=>{
    if(refFilter.lv!=="all" && w.l!==parseInt(refFilter.lv)) return false;
    if(q){
      const hay = (w.w+" "+normEntries(w).flatMap(e=>e.cands).join(" ")+" "+(w.c||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  /* ⑥ 正答率ソート（選択式・記述式の合算）。未回答は末尾 */
  const combined = (w)=>{
    const st=state.words[w.i]; if(!st) return null;
    const seen=(st.cSeen||0)+(st.wSeen||0); if(!seen) return null;
    return Math.round(((st.cCorrect||0)+(st.wCorrect||0))/seen*100);
  };
  if(refFilter.sort==="desc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return rb-ra||a.i-b.i; });
  }else if(refFilter.sort==="asc"){
    list = list.slice().sort((a,b)=>{ const ra=combined(a), rb=combined(b);
      if(ra==null&&rb==null) return a.i-b.i; if(ra==null) return 1; if(rb==null) return -1; return ra-rb||a.i-b.i; });
  }
  const items = list.map(w=>{
    const [cls,label] = wordStatus(w);
    const a = accuracy(w.i);
    const rate = combined(w);
    const gcol = rate==null ? "transparent" : rate>=80 ? "var(--midori)" : rate>=60 ? "#C9A227" : "var(--shu)";
    const accHtml = a
      ? `<span class="ref-acc">出題${a.reps}回</span>`
        + (a.cRate!=null?`<span class="ref-acc ${a.cRate<60?"low":""}">選 ${a.cRate}%</span>`:"")
        + (a.wRate!=null?`<span class="ref-acc ${a.wRate<60?"low":""}">記 ${a.wRate}%</span>`:"")
      : "";
    return `<div class="ref-item">
      <div class="ref-head">
        <span class="ref-lv" style="background:${LV_COLORS[w.l]}">Lv.${w.l}</span>
        <span class="ref-word">${esc(w.w)}</span>
        <button class="ref-play" data-play="${esc(w.w)}">🔊</button>
        <span class="ref-status ${cls}">${label}</span>
      </div>
      <div class="acc-gauge" title="正答率${rate==null?"（未回答）":" "+rate+"%"}"><div class="g" style="width:${rate||0}%;background:${gcol}"></div></div>
      ${accHtml?`<div style="margin:2px 0 6px">${accHtml}</div>`:""}
      ${w.c ? `<div class="ref-core">${esc(w.c)}</div>` : ""}
      ${normEntries(w).map(e=>`<div class="ref-ent"><span class="pos-badge">${esc(e.pos)}</span><span class="meaning">${esc(e.cands.join("／"))}</span></div>`).join("")}
    </div>`;
  }).join("");

  app.innerHTML = `
    <header>
      <div><h1>単語帳（参照モード）</h1>
      <div class="date-line">判定なし・閲覧のみ</div></div>
      <a class="streak" href="#" id="backHome" style="text-decoration:underline">戻る</a>
    </header>
    <div class="panel">
      <div class="ref-controls">
        <select id="refLv">
          <option value="all" ${refFilter.lv==="all"?"selected":""}>全レベル</option>
          ${[1,2,3,4,5].map(l=>`<option value="${l}" ${refFilter.lv==String(l)?"selected":""}>Lv.${l} のみ</option>`).join("")}
        </select>
        <select id="refSort">
          <option value="std" ${refFilter.sort==="std"?"selected":""}>番号順</option>
          <option value="asc" ${refFilter.sort==="asc"?"selected":""}>正答率が低い順</option>
          <option value="desc" ${refFilter.sort==="desc"?"selected":""}>正答率が高い順</option>
        </select>
        <input id="refQ" placeholder="単語・意味で検索" value="${esc(refFilter.q)}">
      </div>
      <div class="ref-count">該当 ${list.length} 語 / 全 ${words.length} 語</div>
      ${items || `<div class="note">該当する単語がありません。</div>`}
    </div>`;

  document.getElementById("backHome").onclick = (e)=>{ e.preventDefault(); renderHome(); };
  document.getElementById("refLv").onchange = (e)=>{ refFilter.lv = e.target.value; renderReference(); };
  document.getElementById("refSort").onchange = (e)=>{ refFilter.sort = e.target.value; renderReference(); };
  const qi = document.getElementById("refQ");
  qi.oninput = (e)=>{ refFilter.q = e.target.value; };
  qi.onkeydown = (e)=>{ if(e.key==="Enter") renderReference(); };
  app.querySelectorAll("[data-play]").forEach(b=>{ b.onclick = ()=>speak(b.dataset.play); });
}

/* ==== 追加機能：ステータス・格言・品詞モード・設定・説明 ==== */
/* 語の記録を作成/昇格。inReview=true でノルマ（復習候補）入り */
function ensureWordRecord(id, inReview){
  if(!state.words[id]){
    state.words[id] = { step:0, due:todayStr(), reps:0, lapses:0, mastered:false,
      learnedOn:todayStr(), revStage:0, failStreak:0, okStreak:0,
      cSeen:0, cCorrect:0, wSeen:0, wCorrect:0, inReview:!!inReview };
  }else if(inReview && state.words[id].inReview===false){
    state.words[id].inReview = true;
    if(!state.words[id].due || state.words[id].due > todayStr()) state.words[id].due = todayStr();
  }
  return state.words[id];
}
/* ステータス4段階: 未学習/出題済/復習中/定着済
   ・一度も回答していない語は、ストック済みでも「未学習」
   ・復習候補外だが回答済み → 出題済
   ・復習候補内で回答済み → 復習中
   ・3回連続定着 → 定着済 */
function wordStatus(w){
  const st = state.words[w.i];
  if(!st) return ["n","未学習"];
  if(st.mastered) return ["m","定着済"];
  const answered = ((st.cSeen||0)+(st.wSeen||0)) > 0;
  if(!answered) return ["n","未学習"];      // ストックされただけ＝まだ未学習
  if(st.inReview===false) return ["s","出題済"];
  return ["l","復習中"];
}

/* ==== 品詞モード（判定・集計なし） ==== */
const POS5 = ["自動","他動","名","形","副"];
const POS5_LABEL = {"自動":"自動詞","他動":"他動詞","名":"名詞","形":"形容詞","副":"副詞"};
function posEligibleWords(){
  /* メインモードのノルマで既に導入された単語（state.wordsに記録がある語）のみを対象にする。
     未学習（メインモードで一度も出題されていない）語は品詞モードにも出題しない。 */
  return allWords().filter(w=> state.words[w.i] && normEntries(w).some(e=>POS5.includes(e.pos)));
}
function correctPosSet(w){
  const s=new Set();
  normEntries(w).forEach(e=>{ if(POS5.includes(e.pos)) s.add(e.pos); });
  return s;
}
function startPosSession(fresh){
  if(fresh || !state.posSession){
    const n = Math.max(5, Math.min(100, state.settings.posChunk||30));
    const ids = shuffle(posEligibleWords().slice()).slice(0,n).map(w=>w.i);
    state.posSession = { ids, pos:0, sel:[], checked:false, ok:null, confirming:false };
  }
  scheduleSave();
  renderPosCard();
}
function renderPosCard(){
  const ps = state.posSession;
  if(!ps || ps.pos >= ps.ids.length){ return renderPosDone(); }
  const w = byId(ps.ids[ps.pos]);
  const correct = correctPosSet(w);
  let body="";
  if(ps.confirming){
    const wrongHtml = `<div class="wrong-line">✕ あなたの選択：${ps.sel.length?ps.sel.map(p=>POS5_LABEL[p]).join("・"):"（なし）"}</div>
      <div class="ok-line">正解：${[...correct].map(p=>POS5_LABEL[p]).join("・")}</div>`;
    body = `${confirmCardBody(w, wrongHtml)}
      <button class="btn-primary" data-pact="next">Next</button>`;
  }else{
    const btns = POS5.map(p=>{
      let cls="pos-toggle"+(ps.sel.includes(p)?" on":"");
      if(ps.checked){ if(correct.has(p)) cls+=" correct"; else if(ps.sel.includes(p)) cls+=" wrong"; }
      return `<button class="${cls}" data-pact="tog" data-p="${p}" ${ps.checked?"disabled":""}>${POS5_LABEL[p]}</button>`;
    }).join("");
    let footer;
    if(ps.checked){
      footer = `<div class="dict-result ${ps.ok?"ok":"ng"}">${ps.ok?"◎ 正解":"✕ 不正解"}</div>
        ${ps.ok?`<button class="btn-primary" data-pact="next">Next</button>`:`<button class="btn-primary" data-pact="check">Check</button>`}`;
    }else{
      footer = `<button class="btn-primary" data-pact="ans" ${ps.sel.length?"":"disabled"}>解答</button>`;
    }
    body = `<div class="word-display">${esc(w.w)}</div>
      <div class="hint" style="text-align:center">該当する品詞をすべて選択</div>
      <div class="pos-toggle-row">${btns}</div>
      ${footer}`;
  }
  app.innerHTML = `
    <div class="session-head">
      <button class="home-ico" data-pact="exit" title="ホームに戻る（進捗保存）"><svg viewBox="0 0 24 24" class="home-svg" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5V20a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1z"/></svg></button>
      <span>${ps.pos+1} / ${ps.ids.length}</span>
      <span class="tag mode">品詞モード（判定なし）</span>
    </div>
    <div class="wcard">${body}</div>`;
  app.querySelectorAll("[data-pact]").forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); posHandle(el.dataset.pact, el); }; });
  app.querySelectorAll('[data-act="speak"]').forEach(el=>{ el.onclick=(ev)=>{ ev.preventDefault(); speak(w.w); }; });
}
function posHandle(act, el){
  const ps = state.posSession;
  if(!ps) return;
  const w = byId(ps.ids[ps.pos]);
  if(act==="exit"){ flushSave(); renderHome(); return; }
  if(act==="tog"){
    if(ps.checked) return;
    const p = el.dataset.p;
    const i = ps.sel.indexOf(p);
    if(i>=0) ps.sel.splice(i,1); else ps.sel.push(p);
    renderPosCard(); return;
  }
  if(act==="ans"){
    if(!ps.sel.length) return;
    const correct = correctPosSet(w);
    ps.checked = true;
    ps.ok = ps.sel.length===correct.size && ps.sel.every(p=>correct.has(p));
    scheduleSave(); renderPosCard(); speak(w.w); return;
  }
  if(act==="check"){ ps.confirming = true; scheduleSave(); renderPosCard(); return; }
  if(act==="next"){
    ps.pos++; ps.sel=[]; ps.checked=false; ps.ok=null; ps.confirming=false;
    scheduleSave(); renderPosCard(); return;
  }
}
