function openAuthModal(){
  if(!cloudConfigured()){ alert("クラウド保存は未設定です。SUPABASE_URL と SUPABASE_ANON_KEY を設定すると有効になります。"); return; }
  document.getElementById("authMsg").textContent = "";
  document.getElementById("authmodal").className = "";
}
function closeAuthModal(){ document.getElementById("authmodal").className = "auth-hidden"; }

function redirectTarget(){ return location.href.split("#")[0]; }

async function oauthLogin(provider){
  if(!sb) return;
  await sb.auth.signInWithOAuth({ provider, options:{ redirectTo: redirectTarget() } });
}
let otpEmail = "";
async function emailLogin(){
  if(!sb) return;
  const email = (document.getElementById("authEmail").value || "").trim();
  const msg = document.getElementById("authMsg");
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTarget(), shouldCreateUser: true } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = "送信に失敗しました：" + error.message; return; }
  otpEmail = email;
  const row = document.getElementById("authCodeRow");
  if(row) row.style.display = "";
  msg.style.color = "var(--midori)"; msg.textContent = "メールを送りました。届いたリンクを開くか、メール内の6桁コードを下に入力してください。";
}
/* メールの6桁コードを検証（マジックリンクと併用）。成功で true。 */
async function verifyOtpCode(email, code){
  if(!sb) return false;
  try{
    const r = await sb.auth.verifyOtp({ email, token: code, type: "email" });
    if(r && r.error) throw r.error;
    return true;
  }catch(_){ return false; }
}
async function submitOtpCode(){
  const msg = document.getElementById("authMsg");
  const code = (document.getElementById("authCode").value || "").trim();
  const email = otpEmail || (document.getElementById("authEmail").value || "").trim();
  if(!/^\d{6}$/.test(code)){ msg.style.color = "var(--shu)"; msg.textContent = "6桁の数字コードを入力してください。"; return; }
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "先にメールアドレスを入力し、確認メールを送ってください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "確認中…";
  const ok = await verifyOtpCode(email, code);
  if(ok){ msg.style.color = "var(--midori)"; msg.textContent = "ログインしました。"; closeAuthModal(); }
  else{ msg.style.color = "var(--shu)"; msg.textContent = "コードが正しくないか、期限切れです。もう一度お試しください。"; }
}
/* ==== C-P：メール＋パスワード認証（既存のGoogle/コード方式に併用追加） ==== */
/* Supabaseの英語エラーを日本語に寄せる（未知はそのまま添える） */
function jaAuthError(err){
  const m = (err && err.message) ? String(err.message) : "";
  if(/Invalid login credentials/i.test(m)) return "メールアドレスかパスワードが正しくありません。";
  if(/Email not confirmed/i.test(m)) return "メール確認が未完了です。確認メールのリンクを開いてください。";
  if(/User already registered/i.test(m)) return "このメールアドレスは登録済みです。ログインするか、パスワードをお忘れの場合は再設定してください。";
  if(/Password should be at least/i.test(m)) return "パスワードが短すぎます。8文字以上にしてください。";
  if(/rate limit|too many/i.test(m)) return "回数制限に達しました。しばらく待ってから再度お試しください。";
  return "うまくいきませんでした：" + m;
}
async function passwordLogin(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  const pw = document.getElementById("authPw").value || "";
  if(!email || !pw){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスとパスワードを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "ログイン中…";
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "ログインしました。"; closeAuthModal();
  /* 以降は既存の onAuthStateChange → syncOnAuthChange → maybeMigrateOnLogin に自動で乗る（C-3不変） */
}
async function passwordSignup(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  const pw = document.getElementById("authPwNew").value || "";
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  if(pw.length < 8){ msg.style.color = "var(--shu)"; msg.textContent = "パスワードは8文字以上にしてください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "登録中…";
  const { error } = await sb.auth.signUp({ email, password: pw, options:{ emailRedirectTo: redirectTarget() } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "確認メールを送りました。メール内のリンクで確認するとログインできます。";
}
/* ==== 方式A：新規登録＝コード入力式（signInWithOtp → verifyOtp → updateUser({password})） ====
   既存の emailLogin / submitOtpCode（コード・リンクタブ）とは別UI・別関数に分離し、
   既存のログイン経路には一切干渉しない。C-3（統合確認）は verifyOtp 成立時に
   onAuthStateChange の uid 変化で1回だけ走る（後続の updateUser は uid 不変のため再発火しない）。 */
let pendingSignup = false;
let signupEmail = "";
/* 案件1：新規登録の「PW設定待ち」を localStorage に永続化する。
   理由：signupSendCode は emailRedirectTo を渡すため、届くメールにはコードとマジックリンクの両方が載る。
   リンクをタップされるとアプリがリロードで開き直され、メモリ変数の pendingSignup は失われる。
   その結果ログインだけ成立してPW設定が出ず、パスワード未設定ユーザーが生まれていた。 */
const PENDING_SIGNUP_KEY = "amateras_pending_signup";
function setPendingSignup(email){
  try{ localStorage.setItem(PENDING_SIGNUP_KEY, email || "1"); }catch(_){}
}
function getPendingSignup(){
  try{ return localStorage.getItem(PENDING_SIGNUP_KEY); }catch(_){ return null; }
}
function clearPendingSignup(){
  try{ localStorage.removeItem(PENDING_SIGNUP_KEY); }catch(_){}
}
let signupPromptShown = false;   /* 同一ページ内での二重発火ガード */
/* 案件1：ログイン成立後（renderHome の後）にパスワード設定を提示する。
   syncOnAuthChange 末尾（コード入力経由）と起動IIFE末尾（マジックリンク経由のリロード）の
   2箇所から呼ばれる。syncOnAuthChange 本体のロジックには手を入れない（C-3不変）。 */
function maybePromptSignupPassword(){
  if(signupPromptShown) return;                 /* 同一ページ内の二重発火を防ぐ */
  if(!(sb && currentUser)) return;              /* ログイン成立時のみ */
  if(IS_RECOVERY) return;                       /* PWリセット到来時は別フロー（P-4）に譲る */
  if(!getPendingSignup()) return;               /* 新規登録の途中でなければ何もしない */
  signupPromptShown = true;
  clearPendingSignup();                         /* 提示は1回きり：入り口で即クリア */
  ensureAuthDom();
  /* パスワードペインの新規登録フォームを開き、PW設定行だけを見せる */
  const paneCode   = document.getElementById("paneCode");
  const panePw     = document.getElementById("panePw");
  const tabCode    = document.getElementById("tabCode");
  const tabPw      = document.getElementById("tabPw");
  const loginForm  = document.getElementById("pwLoginForm");
  const signupForm = document.getElementById("pwSignupForm");
  const sendBtn    = document.getElementById("signupSendBtn");
  const codeRow    = document.getElementById("signupCodeRow");
  const pwRow      = document.getElementById("signupPwRow");
  if(paneCode)   paneCode.style.display   = "none";
  if(panePw)     panePw.style.display     = "";
  if(tabCode)    tabCode.classList.remove("active");
  if(tabPw)      tabPw.classList.add("active");
  if(loginForm)  loginForm.style.display  = "none";
  if(signupForm) signupForm.style.display = "";
  if(sendBtn)    sendBtn.style.display    = "none";
  if(codeRow)    codeRow.style.display    = "none";
  if(pwRow)      pwRow.style.display      = "";
  const modal = document.getElementById("authmodal");
  if(modal) modal.className = "";
  const msg = document.getElementById("authMsg");
  if(msg){ msg.style.color = "var(--midori)"; msg.textContent = "認証できました。最後にパスワードを設定してください。"; }
}
/* 「あとで設定する」：スキップしても再ログイン手段が分かるように案内する */
function skipSignupPassword(){
  clearPendingSignup();
  resetSignupSteps();
  const msg = document.getElementById("authMsg");
  if(msg){
    msg.style.color = "var(--sub)";
    msg.textContent = "パスワード未設定でも、次回はメールに届く認証コードでログインできます（ログイン画面の「コード／リンク」タブ）。設定画面からいつでもパスワードを設定できます。";
  }
  setTimeout(()=>{ closeAuthModal(); }, 2600);
}
function resetSignupSteps(){
  pendingSignup = false; signupEmail = "";
  const codeRow = document.getElementById("signupCodeRow");
  const pwRow   = document.getElementById("signupPwRow");
  const sendBtn = document.getElementById("signupSendBtn");
  const code    = document.getElementById("signupCode");
  const pwNew   = document.getElementById("signupPwNew");
  if(codeRow) codeRow.style.display = "none";
  if(pwRow)   pwRow.style.display   = "none";
  if(sendBtn) sendBtn.style.display = "";
  if(code)  code.value  = "";
  if(pwNew) pwNew.value = "";
}
/* ① メールのみ入力 →「認証コードを送信する」 */
async function signupSendCode(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: redirectTarget(), shouldCreateUser: true } });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  pendingSignup = true;
  signupEmail = email;
  setPendingSignup(email);   /* リンク経由でリロードされてもPW設定を提示できるよう永続化 */
  const row = document.getElementById("signupCodeRow");
  if(row) row.style.display = "";
  msg.style.color = "var(--midori)"; msg.textContent = "認証コードを送りました。メールの6桁コードを入力してください。";
}
/* ② 6桁コードを検証（既存 verifyOtpCode をそのまま利用） */
async function signupVerifyCode(){
  const msg = document.getElementById("authMsg");
  const code = (document.getElementById("signupCode").value || "").trim();
  const email = signupEmail || (document.getElementById("authEmail").value || "").trim();
  if(!/^\d{6}$/.test(code)){ msg.style.color = "var(--shu)"; msg.textContent = "6桁の数字コードを入力してください。"; return; }
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "先にメールアドレスを入力し、認証コードを送信してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "確認中…";
  const ok = await verifyOtpCode(email, code);
  if(!ok){ msg.style.color = "var(--shu)"; msg.textContent = "コードが正しくないか、期限切れです。もう一度お試しください。"; return; }
  /* 認証成立。ここではモーダルを閉じず、パスワード設定ステップへ進む */
  const codeRow = document.getElementById("signupCodeRow");
  const sendBtn = document.getElementById("signupSendBtn");
  const pwRow   = document.getElementById("signupPwRow");
  if(codeRow) codeRow.style.display = "none";
  if(sendBtn) sendBtn.style.display = "none";
  if(pwRow)   pwRow.style.display   = "";
  msg.style.color = "var(--midori)"; msg.textContent = "確認できました。最後にパスワードを設定してください。";
}
/* ③ パスワードを設定して登録完了（既存 updateUser({password}) を利用） */
async function signupSetPassword(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const pw = document.getElementById("signupPwNew").value || "";
  if(pw.length < 8){ msg.style.color = "var(--shu)"; msg.textContent = "パスワードは8文字以上にしてください。"; return; }
  if(!currentUser){ msg.style.color = "var(--shu)"; msg.textContent = "認証が切れています。もう一度コードを送信してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "設定中…";
  const { error } = await sb.auth.updateUser({ password: pw });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "登録が完了しました。次回からメール＋パスワードでもログインできます。";
  clearPendingSignup();          /* PW設定済み → 提示フラグを確実に落とす */
  resetSignupSteps();
  setTimeout(()=>{ closeAuthModal(); }, 900);
}
async function passwordForgot(){
  if(!sb) return;
  const msg = document.getElementById("authMsg");
  const email = (document.getElementById("authEmail").value || "").trim();
  if(!email){ msg.style.color = "var(--shu)"; msg.textContent = "メールアドレスを入力してから「パスワードを忘れた」を押してください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "送信中…";
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectTarget() });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "パスワード再設定用のメールを送りました。メール内のリンクを開いてください。";
}
/* P-4：リセットリンクで戻ってきたときの新パスワード入力UI */
function ensurePwResetDom(){
  if(document.getElementById("pwresetmodal")) return;
  const style = document.createElement("style");
  style.textContent = `
    #pwresetmodal{position:fixed;inset:0;z-index:70;background:rgba(31,44,56,.45);
      display:flex;align-items:center;justify-content:center;padding:16px}
    #pwresetmodal.pr-hidden{display:none}
    #pwresetmodal .card{background:var(--card);border:1px solid var(--line);border-radius:12px;width:100%;max-width:340px;padding:22px 20px}
    #pwresetmodal h3{font-family:var(--serif);font-size:1.05rem;margin-bottom:4px}
    #pwresetmodal p.sub{font-size:.74rem;color:var(--sub);margin-bottom:16px}
    #pwresetmodal input{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:16px;margin-bottom:9px;font-family:var(--sans)}
    #pwresetmodal .send{width:100%;padding:11px;border-radius:8px;background:var(--ink);color:#fff;font-weight:700;font-size:.9rem}
    #pwresetmodal .msg{font-size:.74rem;color:var(--midori);margin-top:10px;min-height:1em}
  `;
  document.head.appendChild(style);
  const modal = document.createElement("div");
  modal.id = "pwresetmodal";
  modal.innerHTML = `
    <div class="card">
      <h3>新しいパスワードの設定</h3>
      <p class="sub">再設定リンクから開きました。新しいパスワードを入力してください。</p>
      <input type="password" id="pwResetInput" autocomplete="new-password" placeholder="パスワード（8文字以上）">
      <button class="send" id="pwResetBtn">パスワードを更新する</button>
      <div class="msg" id="pwResetMsg"></div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById("pwResetBtn").onclick = submitPwReset;
  const inp = document.getElementById("pwResetInput");
  inp.addEventListener("keydown", (e)=>{
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === "Enter"){ e.preventDefault(); submitPwReset(); }
  });
}
function openPwResetModal(){ ensurePwResetDom(); const m = document.getElementById("pwresetmodal"); if(m) m.classList.remove("pr-hidden"); }
async function submitPwReset(){
  if(!sb) return;
  const msg = document.getElementById("pwResetMsg");
  const pw = document.getElementById("pwResetInput").value || "";
  if(pw.length < 8){ msg.style.color = "var(--shu)"; msg.textContent = "パスワードは8文字以上にしてください。"; return; }
  msg.style.color = "var(--sub)"; msg.textContent = "更新中…";
  const { error } = await sb.auth.updateUser({ password: pw });
  if(error){ msg.style.color = "var(--shu)"; msg.textContent = jaAuthError(error); return; }
  msg.style.color = "var(--midori)"; msg.textContent = "パスワードを更新しました。ログインします…";
  setTimeout(()=>{ location.reload(); }, 900);   /* 更新後は通常ログインとして進める（reloadでIS_RECOVERYが解け、以降はC-3が通常どおり働く） */
}
async function doLogout(){
  /* 【P29】ログアウト時にローカルの学習データを必ず消す。
     これをしないと、signOut 後の loadState が localStorage から前の利用者の進捗を読み戻し、
     同じ端末を共有した別人に進捗が見えてしまう（プライバシー事故）。
     手順の順序が重要：
       1) 保留中のデバウンス保存を取り消す（dirty=false）。
          これをしないと、ログアウト直後に currentUser=null の状態で保存が発火し、
          クラウドではなく localStorage に前の利用者のデータが書き戻される競合が起きる。
       2) localStorage の進捗キーを消し、メモリ上の state を初期状態へ戻す。
          signOut() が発火させる onAuthStateChange → loadState より【前】に、同期的に消す。
     クラウドへは一切書き込まない（backendSet は currentUser が無いとクラウドを触らないため、
     空stateがクラウドへ上書きされる事故は構造的に起きない）。 */
  if(saveTimer){ clearTimeout(saveTimer); saveTimer = null; }
  dirty = false;
  try{ localStorage.removeItem(STORE_KEY); }catch(_){}
  clearPendingState();            /* 【P51】復旧待ちの退避も必ず消す。残すと別人がログインした端末に前の利用者の進捗が残る（P29と同じ理由） */
  state = { settings:{ newPerDay:30, rate:0.95, difficulty:1, blankCount:"auto", dailyNew:30 }, words:{}, log:{}, custom:[], stamps:{}, activeSession:null };
  clearLastUid();                 /* C-3：ログアウトで記録を消し、再ログイン時に再度確認できるようにする */
  if(sb) await sb.auth.signOut();
}
/* ログイン／ログアウト時：未ログイン中の進捗をアカウントへ統合 → 読み直して再描画 */
async function syncOnAuthChange(){
  const merged = await maybeMigrateOnLogin();
  state = { settings:{ newPerDay:30, rate:0.95, difficulty:1, blankCount:"auto", dailyNew:30 }, words:{}, log:{}, custom:[], stamps:{}, activeSession:null };
  await loadState();
  if(merged && cloudReadOk){ state = merged; scheduleSave(); }   /* (A-safe) 統合結果を確実に反映し、失敗時も次回saveでクラウドへ／【第3バッチ】クラウドを読めていないときは適用も保存もしない */
  migrateReviveOldRecords();   /* 一度きりの旧データ救済（既存レコードのみ・冪等）。ログアウト時は state.words 空で空回り */
  migrateCustomIds();          /* 【第4バッチ】カスタム語のIDを専用レンジへ（冪等） */
  ensureTodayStamp();          /* 【P34】ログイン成立日をスタンプ（冪等・ゲスト対象外） */
  if(!currentUser) skipLanding = false;   /* 【P19】ログアウトしたら入口画面に戻す */
  renderEntry();                          /* 【P19】ログイン成立ならホーム、ログアウトなら入口画面 */
  maybePromptSignupPassword();   /* 案件1：再描画の後に提示する（コード入力経由をカバー） */
  refreshNotifDots();            /* 赤ドット：ログイン成立直後に未読を判定 */
}

/* ---- 起動 ---- */
(async ()=>{
  await initSupabase();
  stripCacheBuster();   /* 追加1の副作用対策：?v= を除去してURLを正規に戻す。
                           ※detectSessionInUrl がURLを読み終えた initSupabase の【後】に置く。
                             認証クエリ（code / token_hash / type=recovery 等）は温存し、v= だけを消す。 */
  let merged = null;
  if(!IS_RECOVERY) merged = await maybeMigrateOnLogin();   /* C-3：id変化時だけ確認（リセット到来時は出さない）／統合結果を受け取る */
  await loadSharedWords();
  ensureAuthDom();
  ensureUpdateFloat();            /* 追加2：画面に依存しない更新ボタンを常設 */
  await loadState();
  if(merged && cloudReadOk){ state = merged; scheduleSave(); }  /* (A-safe) 統合結果を確実に反映し、失敗時も次回saveでクラウドへ／【第3バッチ】クラウドを読めていないときは適用も保存もしない */
  migrateReviveOldRecords();   /* 一度きりの旧データ救済（既存レコードのみ・冪等・強制保存はしない） */
  migrateCustomIds();          /* 【第4バッチ】カスタム語のIDを専用レンジへ（冪等・state.custom が空なら空回り） */
  ensureTodayStamp();          /* 【P34】起動時にログイン済みならスタンプ（冪等・ゲスト対象外） */
  renderEntry();   /* 【P19】未ログインなら入口画面（アプリ説明を常設）。ログイン済みならホーム */
  startUpdateWatcher();           // 新バージョン公開の監視を開始
  { const vt = document.getElementById("versionTag"); if(vt) vt.textContent = "v." + APP_VERSION.replace(/-/g,"."); }  /* E-2：バージョン表示（値は不変・表示のみ） */
  if(IS_RECOVERY) openPwResetModal();   /* P-4：リセットリンク到来時は新PW入力UIを出す（イベント取りこぼしの保険） */
  maybePromptSignupPassword();          /* 案件1：マジックリンク経由でリロードされた場合もPW設定を提示する */
})();
</script>
